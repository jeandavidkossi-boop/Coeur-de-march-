<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bureau - Cœur de Marché</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f9fafb; }
    </style>
</head>
<body class="font-sans text-gray-900 antialiased">

    <div id="contenuBureau" class="pb-10 max-w-md mx-auto">
        
        <div class="bg-gradient-to-br from-blue-950 via-blue-900 to-purple-800 text-white p-6 rounded-b-[40px] shadow-lg mb-8 border-b-4 border-orange-500">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="https://szhxxohizqnwcmsltjtq.supabase.co/storage/v1/object/public/images/1769121566036.png" 
                         alt="Logo" 
                         class="w-14 h-14 rounded-full border-2 border-white shadow-md object-cover bg-white">
                    <div>
                        <h1 class="font-black text-xl uppercase tracking-tight">Mon Bureau</h1>
                        <p id="emailMarchand" class="text-[10px] text-orange-200 font-bold tracking-widest uppercase">Vérification...</p>
                    </div>
                </div>
                <button onclick="deconnexion()" class="text-white opacity-80 text-[10px] uppercase font-black bg-blue-950/50 px-3 py-1 rounded-full">
                    Quitter
                </button>
            </div>
        </div>

        <div class="px-4">
            <div class="bg-white p-6 rounded-[30px] shadow-xl border-t-8 border-red-600">
                <h2 class="text-lg font-black text-gray-800 mb-6 text-center uppercase">Mettre un article en vente</h2>

                <form id="formAjout" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-black text-blue-950 uppercase mb-1 ml-2">Nom de l'article</label>
                        <input type="text" id="nomArticle" placeholder="Ex: Chaussures Nike" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-orange-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-blue-950 uppercase mb-1 ml-2">Prix (FCFA)</label>
                        <input type="number" id="prixArticle" placeholder="Ex: 5000" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-orange-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-blue-950 uppercase mb-1 ml-2">Catégorie</label>
                        <select id="catArticle" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-orange-500 outline-none">
                            <option value="Mode">👕 Mode & Chaussures</option>
                            <option value="Mercerie">✂️ Mercerie & Couture</option>
                            <option value="Alimentation">🍲 Alimentation</option>
                            <option value="Vivrier">🍅 Marché Vivrier</option>
                            <option value="Resto">🍽️ Restaurants & Maquis</option>
                            <option value="Sante">💊 Santé & Hygiène</option>
                            <option value="Beaute">💄 Beauté & Cosmétique</option>
                            <option value="Electronique">📱 Électronique</option>
                            <option value="Quincaillerie">🛠️ Quincaillerie</option>
                            <option value="Agricole">🚜 Agriculture</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-blue-950 uppercase mb-1 ml-2">Description</label>
                        <textarea id="descriptionArticle" rows="3" placeholder="Infos sur le produit..." class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-orange-500 outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-blue-950 uppercase mb-1 ml-2">Photo de l'article</label>
                        <input type="file" id="photoArticle" accept="image/*" capture="environment" class="w-full p-3 rounded-2xl bg-gray-50 border-2 border-gray-100" required>
                    </div>

                    <button type="button" onclick="ajouterProduit()" id="btnSubmit" class="w-full mt-4 bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase transition-all">
                        Valider l'article
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let emailVendeurActuel = "";

        window.onload = async function() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (data?.session) {
                    emailVendeurActuel = data.session.user.email;
                    document.getElementById('emailMarchand').innerText = emailVendeurActuel;
                } else {
                    window.location.replace("vendre.html");
                }
            } catch (err) {
                window.location.replace("vendre.html");
            }
        };

        async function deconnexion() {
            await supabase.auth.signOut();
            window.location.replace("vendre.html");
        }

        async function ajouterProduit() {
            const btn = document.getElementById('btnSubmit');
            const nom = document.getElementById('nomArticle').value.trim();
            const prix = document.getElementById('prixArticle').value.trim();
            const photoInput = document.getElementById('photoArticle');

            if (!nom || !prix || photoInput.files.length === 0) {
                alert("Remplissez les champs obligatoires !");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ ENREGISTREMENT...";

            try {
                const photoFile = photoInput.files[0];
                const nomFichierUnique = `${Date.now()}_${photoFile.name.replace(/\s/g, '_')}`;

                const { error: upError } = await supabase.storage.from('images').upload(nomFichierUnique, photoFile);
                if (upError) throw upError;

                const { data: urlData } = supabase.storage.from('images').getPublicUrl(nomFichierUnique);

                const { error: insError } = await supabase.from('produits').insert([{
                    nom: nom,
                    prix: Number(prix),
                    categorie: document.getElementById('catArticle').value,
                    description: document.getElementById('descriptionArticle').value,
                    image: urlData.publicUrl,
                    vendeur: emailVendeurActuel,
                    dateAjout: new Date().toISOString()
                }]);

                if (insError) throw insError;

                alert("✅ Article ajouté !");
                document.getElementById('formAjout').reset();
            } catch (error) {
                alert("❌ Erreur : " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "VALIDER L'ARTICLE";
            }
        }
    </script>
</body>
</html>
