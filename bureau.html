<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bureau - Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .btn-gradient { background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%); }
    </style>
</head>
<body class="pb-24">

    <div class="btn-gradient text-white p-6 rounded-b-[40px] shadow-lg mb-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black italic uppercase">Mon Bureau</h1>
            <button onclick="deconnexion()" class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <p class="text-purple-100 font-bold" id="bienvenue">Chargement du profil...</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-white rounded-[30px] p-6 shadow-xl space-y-4 border border-gray-100">
            <h2 class="text-center font-black text-gray-800 uppercase italic border-b pb-2">Ajouter un produit</h2>
            
            <input type="text" id="nomP" placeholder="Nom de l'article" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
            
            <div class="flex gap-2">
                <input type="number" id="prixP" placeholder="Prix (FCFA)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
                <select id="catP" class="p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none font-bold text-sm">
                    <option value="Vivrier">Marché & Vivrier</option>
                    <option value="Alimentation">Alimentation & Boissons</option>
                    <option value="Habillement">Habillement & Beaux Pagnes</option>
                    <option value="Mercerie">Mercerie & Couture</option>
                    <option value="Maison">Maison & Vaisselle</option>
                    <option value="Electronique">Électronique & Ménager</option>
                    <option value="Construction">Construction & Matériaux</option>
                    <option value="Motos">Motos & Mécanique</option>
                    <option value="Agro">Agro-Élevage</option>
                    <option value="Librairie">Librairie & École</option>
                    <option value="Beaute">Beauté & Cosmétique</option>
                    <option value="Evenementiel">Événementiel & Services</option>
                </select>
            </div>

            <div id="previewContainer" class="hidden w-full h-48 rounded-2xl overflow-hidden border-2 border-dashed border-purple-200">
                <img id="imgPreview" class="w-full h-full object-cover">
            </div>

            <label class="flex items-center justify-center gap-3 w-full p-4 bg-purple-50 text-purple-700 border-2 border-dashed border-purple-200 rounded-2xl cursor-pointer hover:bg-purple-100 transition">
                <i class="fas fa-camera text-xl"></i>
                <span class="font-black uppercase text-sm">Prendre une photo</span>
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="apercuImage(this)">
            </label>

            <button id="btnPublier" onclick="publierProduit()" class="w-full btn-gradient text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95 uppercase">
                Mettre en vente
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://szhsohizqwcsnxltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHNvaGl6cXdjc254bHRqdHEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxMTY1Njg0MWh2N2hpenF3Y3NueGx0anFudWd2N2c2I1';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let userSession = null;
        let userData = null;

        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.replace("vendre.html");
                return;
            }
            userSession = session.user;
            userData = userSession.user_metadata;
            
            const nomBoutique = userData.shop_name || "Ma Boutique";
            const nomProprio = userData.full_name || "Commerçant";
            document.getElementById('bienvenue').innerText = `${nomBoutique} (${nomProprio})`;
        }
        checkUser();

        function apercuImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                    };
                };
            });
        }

        async function publierProduit() {
            const nom = document.getElementById('nomP').value;
            const prix = document.getElementById('prixP').value;
            const cat = document.getElementById('catP').value;
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('btnPublier');

            if (!nom || !prix || !fileInput.files[0]) {
                alert("Erreur : Veuillez remplir tous les champs.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Chargement...";

            try {
                const compressedBlob = await compressImage(fileInput.files[0]);
                const fileName = `${Date.now()}_${userSession.id}.jpg`;

                const { data: storageData, error: storageError } = await supabase.storage
                    .from('images')
                    .upload(fileName, compressedBlob);

                if (storageError) throw storageError;

                const publicUrl = `${supabaseUrl}/storage/v1/object/public/images/${fileName}`;

                const { error: dbError } = await supabase
                    .from('produits')
                    .insert([{
                        nom: nom,
                        prix: parseInt(prix),
                        categorie: cat,
                        image_url: publicUrl,
                        vendeur_email: userSession.email,
                        vendeur_nom: userData.shop_name,
                        vendeur_tel: userData.telephone
                    }]);

                if (dbError) throw dbError;

                alert("Succès ! Votre article est en ligne à Bouaflé.");
                location.reload();

            } catch (err) {
                alert("Erreur critique : " + err.message);
                btn.disabled = false;
                btn.innerText = "Mettre en vente";
            }
        }

        async function deconnexion() {
            await supabase.auth.signOut();
            window.location.replace("vendre.html");
        }
    </script>
</body>
</html>
