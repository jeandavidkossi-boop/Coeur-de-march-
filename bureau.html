<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bureau - Cœur de Marché</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f3f4f6; }
        /* Animation de chargement locale */
        .loader { border-top-color: #ef4444; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased">

    <div id="chargement" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-gray-200 border-t-red-600 rounded-full loader mb-4"></div>
        <p id="statut" class="text-gray-500 font-medium">Connexion au réseau en cours...</p>
        <button id="btnForcer" onclick="forcerEntree()" class="hidden mt-6 bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">
            ⚠️ Forcer l'entrée du bureau
        </button>
    </div>

    <div id="contenuBureau" class="hidden pb-10 max-w-md mx-auto">
        
        <div class="bg-gray-900 text-white p-6 rounded-b-[40px] shadow-lg mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center overflow-hidden border-2 border-white text-gray-900 font-bold">
                        CM
                    </div>
                    <div>
                        <h1 class="font-black text-lg leading-tight uppercase">Mon Bureau</h1>
                        <p id="emailMarchand" class="text-[10px] text-orange-300 font-bold tracking-widest">Connecté</p>
                    </div>
                </div>
                <button onclick="deconnexion()" class="text-white opacity-80 hover:opacity-100 text-[10px] uppercase font-black">
                    Quitter
                </button>
            </div>
        </div>

        <div class="px-4">
            <div class="bg-white p-6 rounded-[30px] shadow-xl border-t-8 border-red-500">
                <h2 class="text-lg font-black text-gray-800 mb-6 text-center uppercase">Mettre un article en vente</h2>

                <form id="formAjout" class="space-y-4">
                    
                    <div>
                        <label class="block text-[11px] font-black text-purple-900 uppercase mb-1 ml-2">Nom de l'article</label>
                        <input type="text" id="nomArticle" placeholder="Ex: Chaussures Nike pointure 42" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-red-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-purple-900 uppercase mb-1 ml-2">Prix (FCFA)</label>
                        <input type="number" id="prixArticle" placeholder="Ex: 5000" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-red-500 outline-none" required>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-purple-900 uppercase mb-1 ml-2">Catégorie du produit</label>
                        <select id="catArticle" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-red-500 outline-none">
                            <option value="Mode">👕 Mode & Chaussures</option>
                            <option value="Mercerie">✂️ Mercerie & Couture</option>
                            <option value="Alimentation">🍲 Alimentation (Gros & Détail)</option>
                            <option value="Vivrier">🍅 Marché Vivrier (Frais)</option>
                            <option value="Resto">🍽️ Restaurants & Maquis</option>
                            <option value="Sante">💊 Santé, Hygiène & Parapharmacie</option>
                            <option value="Beaute">💄 Beauté & Cosmétique</option>
                            <option value="Bebe">🍼 Univers Bébé & Maternité</option>
                            <option value="Electronique">📱 Téléphones & Électroménager</option>
                            <option value="Maison">🏠 Maison, Déco & Ameublement</option>
                            <option value="Vaisselle">🍽️ Vaisselle & Ustensiles</option>
                            <option value="Librairie">📚 Librairie & Fournitures</option>
                            <option value="Quincaillerie">🛠️ Quincaillerie & Construction</option>
                            <option value="Agricole">🚜 Agriculture, Élevage & Intrants</option>
                            <option value="Pieces">⚙️ Pièces Détachées (Moto/Auto)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-purple-900 uppercase mb-1 ml-2">Description</label>
                        <textarea id="descriptionArticle" rows="3" placeholder="Ex: Très bonne qualité..." class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:border-red-500 outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-purple-900 uppercase mb-1 ml-2">Photo de l'article</label>
                        <input type="file" id="photoArticle" accept="image/*" capture="environment" class="w-full p-3 rounded-2xl bg-gray-50 border-2 border-gray-100" required>
                    </div>

                    <button type="button" onclick="ajouterProduit()" id="btnSubmit" class="w-full mt-4 bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg transition-colors uppercase">
                        Valider l'article
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION SUPABASE ---
                // --- CONFIGURATION SUPABASE ---
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let emailVendeurActuel = "mode_bas_debit@coeurdemarche.com";

        // --- GESTION DE L'AFFICHAGE ---
        function forcerEntree() {
            document.getElementById('chargement').style.display = 'none';
            document.getElementById('contenuBureau').style.display = 'block';
            document.getElementById('emailMarchand').innerText = emailVendeurActuel;
        }

        // Affichage du bouton de forçage si le réseau est lent
        setTimeout(() => {
            const btnForcer = document.getElementById('btnForcer');
            const statut = document.getElementById('statut');
            if (btnForcer && statut) {
                btnForcer.classList.remove('hidden');
                statut.innerText = "⚠️ Le réseau bloque. Utilisez le bouton rouge !";
                statut.classList.add('text-red-500');
            }
        }, 4000);

        // --- INITIALISATION DE LA SESSION ---
        window.onload = async function() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (data && data.session) {
                    emailVendeurActuel = data.session.user.email;
                    forcerEntree();
                } else {
                    window.location.replace("vendre.html");
                }
                      } catch (err) {
                console.log("Erreur de session :", err);
                alert("⚠️ Problème de connexion au réseau. Redirection...");
                window.location.replace("vendre.html");
            }
        };

        // --- DÉCONNEXION ---
        async function deconnexion() {
            if(supabase) await supabase.auth.signOut();
            window.location.replace("vendre.html");
        }

        // --- AJOUT DU PRODUIT ---
        async function ajouterProduit() {
            const btn = document.getElementById('btnSubmit');
            const nom = document.getElementById('nomArticle').value.trim();
            const prix = document.getElementById('prixArticle').value.trim();
            const cat = document.getElementById('catArticle').value;
            const desc = document.getElementById('descriptionArticle').value.trim();
            const photoInput = document.getElementById('photoArticle');

            // 1. Validation des champs
            if (!nom || !prix || photoInput.files.length === 0) {
                alert("⚠️ Attention : Le nom, le prix et la photo sont obligatoires pour vendre !");
                return;
            }

            // 2. Mise à jour de l'interface utilisateur pendant l'envoi
            btn.disabled = true;
            btn.innerText = "⏳ ENREGISTREMENT EN COURS...";
            btn.classList.replace('bg-orange-500', 'bg-gray-400');
            btn.classList.replace('hover:bg-orange-600', 'bg-gray-400');

            try {
                if (!supabase) throw new Error("Le moteur n'est pas connecté. Vérifiez votre réseau.");

                const photoFile = photoInput.files[0];
                // Nettoyage du nom du fichier pour éviter les erreurs d'URL
                const nomNettoye = photoFile.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
                const nomFichierUnique = `${Date.now()}_${nomNettoye}`;

                // 3. Upload de l'image
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('images')
                    .upload(nomFichierUnique, photoFile);

                if (uploadError) throw uploadError;

                // 4. Récupération de l'URL publique de l'image
                const { data: urlData } = supabase.storage
                    .from('images')
                    .getPublicUrl(nomFichierUnique);
                
                const lienImage = urlData.publicUrl;

                // 5. Insertion dans la base de données
                const { error: insertError } = await supabase
                    .from('produits')
                    .insert([{
                        nom: nom,
                        prix: Number(prix),
                        categorie: cat,
                        description: desc,
                        image: lienImage,
                        vendeur: emailVendeurActuel,
                        dateAjout: new Date().toISOString()
                    }]);

                if (insertError) throw insertError;

                // 6. Succès
                alert("✅ MAGNIFIQUE ! L'article est en ligne sur Cœur de Marché.");
                document.getElementById('formAjout').reset();

            } catch (error) {
                alert("❌ ERREUR : " + error.message);
            } finally {
                // 7. Retour à la normale du bouton
                btn.disabled = false;
                btn.innerText = "VALIDER L'ARTICLE";
                btn.classList.replace('bg-gray-400', 'bg-orange-500');
                btn.classList.replace('bg-gray-400', 'hover:bg-orange-600');
            }
        }
    </script>
</body>
</html>
