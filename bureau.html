<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Bureau - Coeur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .bg-cdm-purple { background-color: #5b21b6; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-cdm-purple text-white p-6 rounded-b-[35px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="1769121566036.png" class="w-12 h-12 rounded-full border-2 border-orange-500 bg-white" alt="Logo">
                <div>
                    <h1 class="text-lg font-black uppercase tracking-tighter">Coeur de Marché</h1>
                    <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Bouaflé</p>
                </div>
            </div>
            <button onclick="deconnecter()" class="bg-white/10 p-3 rounded-2xl active:scale-90 transition-all">
                <i class="fas fa-power-off text-white"></i>
            </button>
        </div>
        
        <div class="bg-white/10 p-5 rounded-2xl backdrop-blur-md border border-white/10">
            <p id="nom-vendeur" class="text-[10px] uppercase font-black opacity-60 tracking-widest italic">Chargement du gérant...</p>
            <p id="nom-boutique" class="text-2xl font-black uppercase tracking-tight text-white mt-1">VÉRIFICATION...</p>
        </div>
    </nav>

    <main class="p-6 -mt-6">
        <div class="bg-white rounded-[30px] shadow-xl p-7 border border-gray-100">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center">
                    <i class="fas fa-plus"></i>
                </div>
                <h2 class="font-black text-gray-800 uppercase text-sm tracking-wide">Ajouter un article</h2>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Désignation</label>
                    <input type="text" id="pNom" placeholder="Ex: Pagne Baoulé, Manioc..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-orange-500">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Prix de vente (FCFA)</label>
                    <input type="number" id="pPrix" placeholder="0" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-black text-orange-600 focus:border-orange-500">
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Rayon du marché</label>
                    <select id="pCat" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-500">
                        <option value="Marché & Vivrier">Marché & Vivrier</option>
                        <option value="Alimentation & Boissons">Alimentation & Boissons</option>
                        <option value="Habillement & Pagnes">Habillement & Pagnes</option>
                        <option value="Mercerie & Couture">Mercerie & Couture</option>
                        <option value="Maison & Vaisselle">Maison & Vaisselle</option>
                        <option value="Électronique & Ménager">Électronique & Ménager</option>
                        <option value="Construction & Quincaillerie">Construction & Quincaillerie</option>
                        <option value="Motos & Mécanique">Motos & Mécanique</option>
                        <option value="Agro-Élevage">Agro-Élevage</option>
                        <option value="Librairie & École">Librairie & École</option>
                        <option value="Beauté & Cosmétique">Beauté & Cosmétique</option>
                        <option value="Événementiel & Location">Événementiel & Location</option>
                    </select>
                </div>

                <button type="button" onclick="document.getElementById('photoInput').click()" class="w-full py-8 border-2 border-dashed border-purple-100 rounded-2xl bg-purple-50/50 text-purple-600 flex flex-col items-center active:bg-purple-100 transition-all">
                    <i class="fas fa-camera text-3xl mb-2" id="iconPhoto"></i>
                    <span id="btnPhotoText" class="font-black text-[10px] uppercase text-center px-4">Prendre une photo</span>
                    <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden">
                </button>

                <button type="button" onclick="publierAnnonce()" id="btnPublier" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-orange-200 uppercase tracking-widest mt-4 active:scale-95 transition-all">
                    Publier sur le marché
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let selectedFile = null;

        // DÉMARRAGE SÉCURISÉ (Empêche les boutons de bloquer)
        window.addEventListener('load', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "vendre.html";
                return;
            }
            currentUser = user; 
            chargerProfil();
        });

        async function chargerProfil() {
            try {
                const { data: vendeur } = await supabase
                    .from('vendeurs')
                    .select('nom_boutique, proprietaire')
                    .eq('id', currentUser.id)
                    .single();

                if (vendeur) {
                    document.getElementById('nom-boutique').innerText = vendeur.nom_boutique;
                    document.getElementById('nom-vendeur').innerText = "Gérant : " + vendeur.proprietaire;
                }
            } catch (e) {
                console.log("Erreur profil");
            }
        }

        // GESTION DE LA PHOTO 
        document.getElementById('photoInput').addEventListener('change', function(e) {
            if(e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                document.getElementById('btnPhotoText').innerText = "IMAGE PRÊTE ✅";
                document.getElementById('btnPhotoText').style.color = "#16a34a";
                document.getElementById('iconPhoto').style.color = "#16a34a";
            }
        });

        // PUBLICATION
        async function publierAnnonce() {
            const nomProd = document.getElementById('pNom').value;
            const prixProd = document.getElementById('pPrix').value;
            const catProd = document.getElementById('pCat').value;
            const btn = document.getElementById('btnPublier');

            if (!nomProd || !prixProd || !selectedFile) {
                alert("Erreur : Remplissez le nom, le prix et prenez une photo !");
                return;
            }

            btn.innerText = "ENVOI EN COURS...";
            btn.disabled = true;

            try {
                const fileName = `prod_${Date.now()}.jpg`;
                const { error: uploadError } = await supabase.storage
                    .from('images')
                    .upload(fileName, selectedFile);

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabase.storage
                    .from('images')
                    .getPublicUrl(fileName);

                const { error: dbError } = await supabase.from('produits').insert([
                    {
                        nom: nomProd,
                        prix: prixProd,
                        categorie: catProd,
                        vendeur: currentUser.id,
                        image: publicUrl
                    }
                ]);

                if (dbError) throw dbError;

                alert("Succès ! Votre produit est sur le marché.");
                location.reload(); 

            } catch (err) {
                alert("Erreur : " + err.message);
                btn.innerText = "PUBLIER SUR LE MARCHÉ";
                btn.disabled = false;
            }
        }

        async function deconnecter() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
