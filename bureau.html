<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Bureau - Coeur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .bg-cdm-purple { background-color: #5b21b6; }
        .badge-standard { background-color: #9ca3af; color: white; }
        .badge-pro { background-color: #2563eb; color: white; }
        .badge-vip { background-color: #f59e0b; color: white; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        
        /* Styles pour les belles fenêtres d'alerte */
        .modal-bg { transition: opacity 0.3s ease; }
        .modal-box { transition: transform 0.3s ease; }
    </style>
</head>
<body class="pb-24">

    <div id="modal-alerte" class="fixed inset-0 bg-black/80 z-[300] hidden items-center justify-center opacity-0 modal-bg">
        <div id="modal-alerte-content" class="bg-white w-[85%] rounded-[25px] p-6 text-center transform scale-90 modal-box">
            <div id="alerte-icon" class="w-16 h-16 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"></div>
            <h3 id="alerte-titre" class="font-black text-lg uppercase mb-2"></h3>
            <p id="alerte-message" class="text-gray-500 text-xs font-bold mb-6"></p>
            <button onclick="fermerAlerte()" class="w-full bg-[#5b21b6] text-white font-black py-3 rounded-xl uppercase text-[10px] active:scale-95 transition-transform">J'ai compris</button>
        </div>
    </div>

    <div id="modal-confirm" class="fixed inset-0 bg-black/80 z-[300] hidden items-center justify-center opacity-0 modal-bg">
        <div id="modal-confirm-content" class="bg-white w-[85%] rounded-[25px] p-6 text-center transform scale-90 modal-box">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-trash-alt"></i></div>
            <h3 class="font-black text-lg text-gray-800 uppercase mb-2">Retirer l'article ?</h3>
            <p class="text-gray-500 text-xs font-bold mb-6">Cet article sera effacé de votre boutique.</p>
            <div class="flex gap-3">
                <button onclick="fermerConfirm()" class="flex-1 bg-gray-100 text-gray-600 font-black py-3 rounded-xl uppercase text-[10px] active:scale-95 transition-transform">Annuler</button>
                <button id="btn-confirm-action" class="flex-1 bg-red-500 text-white font-black py-3 rounded-xl uppercase text-[10px] shadow-lg shadow-red-200 active:scale-95 transition-transform">Oui, effacer</button>
            </div>
        </div>
    </div>

    <nav class="bg-cdm-purple text-white p-6 rounded-b-[35px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="1769121566036.png" class="w-12 h-12 rounded-full border-2 border-orange-500 bg-white" alt="Logo">
                <div>
                    <h1 class="text-lg font-black uppercase tracking-tighter">Mon Bureau</h1>
                    <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">Bouaflé</p>
                </div>
            </div>
            <button onclick="deconnecter()" class="bg-white/10 p-3 rounded-2xl active:scale-90 transition-all">
                <i class="fas fa-power-off text-white"></i>
            </button>
        </div>
        
        <div class="bg-white/10 p-5 rounded-2xl backdrop-blur-md border border-white/10">
            <div class="flex justify-between items-start">
                <div>
                    <p id="nom-vendeur" class="text-[10px] uppercase font-black opacity-60 tracking-widest italic">Chargement...</p>
                    <p id="nom-boutique" class="text-2xl font-black uppercase tracking-tight text-white mt-1">VÉRIFICATION...</p>
                </div>
                <span id="badge-abonnement" class="text-[9px] font-black uppercase px-3 py-1 rounded-full shadow-sm">...</span>
            </div>
        </div>
    </nav>

    <main class="p-6 -mt-6">
        <div id="bloc-ajouter" class="bg-white rounded-[30px] shadow-xl p-7 border border-gray-100">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-plus"></i>
                    </div>
                    <h2 class="font-black text-gray-800 uppercase text-sm tracking-wide">Ajouter un article</h2>
                </div>
                <span id="compteur-articles" class="text-[10px] font-black text-gray-400 bg-gray-50 px-3 py-1 rounded-lg">--/--</span>
            </div>

            <div id="formulaire-annonce" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Désignation</label>
                    <input type="text" id="pNom" placeholder="Ex: Pagne Baoulé, iPhone 13..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-orange-500">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Prix (FCFA)</label>
                    <input type="number" id="pPrix" placeholder="0" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-black text-orange-600 focus:border-orange-500">
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Rayon</label>
                    <select id="pCat" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-500">
                        <option value="Marché & Vivrier">Marché & Vivrier</option>
                        <option value="Alimentation & Boissons">Alimentation & Boissons</option>
                        <option value="Habillement & Pagnes">Habillement & Pagnes</option>
                        <option value="Mercerie & Couture">Mercerie & Couture</option>
                        <option value="Maison & Vaisselle">Maison & Vaisselle</option>
                        <option value="Électronique & Ménager">Électronique & Ménager</option>
                        <option value="Construction & Quincaillerie">Construction & Quincaillerie</option>
                        <option value="Motos & Mécanique">Motos & Mécanique</option>
                        <option value="Agro-Élevage">Agro-Élevage</option>
                        <option value="Librairie & École">Librairie & École</option>
                        <option value="Beauté & Cosmétique">Beauté & Cosmétique</option>
                        <option value="Événementiel & Location">Événementiel & Location</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Description</label>
                    <textarea id="pDesc" placeholder="Détails de l'article..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-orange-500" rows="3"></textarea>
                </div>

                <button type="button" onclick="document.getElementById('photoInput').click()" class="w-full py-8 border-2 border-dashed border-purple-100 rounded-2xl bg-purple-50/50 text-purple-600 flex flex-col items-center active:bg-purple-100 transition-all">
                    <i class="fas fa-camera text-3xl mb-2" id="iconPhoto"></i>
                    <span id="btnPhotoText" class="font-black text-[10px] uppercase text-center px-4">Prendre la photo</span>
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                </button>

                <button type="button" onclick="publierAnnonce()" id="btnPublier" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-orange-200 uppercase tracking-widest mt-4 active:scale-95 transition-all">
                    Publier l'article
                </button>
            </div>

            <div id="message-limite" class="hidden text-center py-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-lock"></i>
                </div>
                <h3 class="font-black text-gray-800 uppercase text-xs mb-2">Limite Gratuite Atteinte</h3>
                <p class="text-gray-500 text-[10px] font-bold mb-6 px-4">Pour ajouter plus de 10 articles et vendre sans limite, passez au forfait Pro !</p>
                <button onclick="window.open('https://wa.me/2250576326645?text=Je souhaite passer mon compte au forfait PRO')" class="bg-blue-600 text-white font-black px-8 py-3 rounded-xl uppercase text-[10px] shadow-lg">Devenir PRO (2000 F)</button>
            </div>
        </div>

        <div class="mt-10 mb-8">
            <h2 class="font-black text-[#4c1d95] text-lg uppercase mb-4 border-b-2 border-purple-200 pb-2 flex items-center gap-2">
                <i class="fas fa-boxes text-orange-500"></i> Stock en Ligne
            </h2>
            <div id="mes-articles" class="grid grid-cols-2 gap-4">
                <p class="text-gray-400 text-sm italic col-span-2">Chargement...</p>
            </div>
        </div>
    </main>
