<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Bureau - Coeur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-cdm-purple { background-color: #5b21b6; }
        .modal-bg { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="pb-24">

    <div id="modal-alerte" class="fixed inset-0 bg-black/80 z-[300] hidden items-center justify-center opacity-0 modal-bg">
        <div class="bg-white w-[85%] max-w-sm rounded-[25px] p-6 text-center">
            <div id="alerte-icon" class="w-16 h-16 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"></div>
            <h3 id="alerte-titre" class="font-black text-lg uppercase mb-2"></h3>
            <p id="alerte-message" class="text-gray-500 text-xs font-bold mb-6"></p>
            <button onclick="fermerAlerte()" class="w-full bg-[#5b21b6] text-white font-black py-4 rounded-xl uppercase text-[10px]">OK</button>
        </div>
    </div>

    <div id="modal-confirm" class="fixed inset-0 bg-black/80 z-[300] hidden items-center justify-center opacity-0 modal-bg">
        <div class="bg-white w-[85%] max-w-sm rounded-[25px] p-6 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-trash"></i></div>
            <h3 class="font-black text-lg uppercase mb-2">Supprimer ?</h3>
            <p class="text-gray-500 text-xs font-bold mb-6">Cet article sera retiré du marché.</p>
            <div class="flex gap-3">
                <button onclick="fermerConfirm()" class="flex-1 bg-gray-100 text-gray-600 font-black py-3 rounded-xl uppercase text-[10px]">Annuler</button>
                <button id="btn-confirm-action" class="flex-1 bg-red-500 text-white font-black py-3 rounded-xl uppercase text-[10px]">Confirmer</button>
            </div>
        </div>
    </div>

    <nav class="bg-[#5b21b6] text-white p-6 rounded-b-[35px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="1769121566036.png" class="w-12 h-12 rounded-full border-2 border-orange-500 bg-white">
                <div><h1 class="text-lg font-black uppercase">Mon Bureau</h1><p class="text-[10px] text-orange-400 font-bold uppercase">Bouaflé</p></div>
            </div>
            <button onclick="deconnecter()" class="bg-white/10 p-3 rounded-2xl"><i class="fas fa-power-off"></i></button>
        </div>
        <div class="bg-white/10 p-5 rounded-2xl border border-white/10 flex justify-between items-center">
            <div><p id="nom-vendeur" class="text-[10px] uppercase font-black opacity-60 italic">Chargement...</p><p id="nom-boutique" class="text-xl font-black uppercase text-white mt-1">VÉRIFICATION...</p></div>
            <span id="badge-abonnement" class="text-[9px] font-black uppercase bg-white/20 px-3 py-1 rounded-full">STANDARD</span>
        </div>
    </nav>

    <main class="p-6 -mt-6">
        <div class="bg-white rounded-[30px] shadow-xl p-7 border border-gray-100">
            <h2 class="font-black text-gray-800 uppercase text-sm mb-6 flex items-center gap-2"><i class="fas fa-plus text-orange-500"></i> Ajouter un article</h2>
            <div class="space-y-4">
                <input type="text" id="pNom" placeholder="Nom de l'article" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold">
                <input type="number" id="pPrix" placeholder="Prix (FCFA)" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-black text-orange-600">
                <select id="pCat" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-500">
                    <option value="Marché & Vivrier">Marché & Vivrier</option>
                    <option value="Beauté & Cosmétique">Beauté & Cosmétique</option>
                    <option value="Habillement & Pagnes">Habillement & Pagnes</option>
                </select>
                <textarea id="pDesc" placeholder="Description..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold" rows="3"></textarea>
                <button type="button" onclick="document.getElementById('photoInput').click()" class="w-full py-6 border-2 border-dashed border-purple-100 rounded-2xl bg-purple-50 text-purple-600 flex flex-col items-center">
                    <i class="fas fa-camera text-2xl mb-2" id="iconPhoto"></i>
                    <span id="btnPhotoText" class="font-black text-[10px] uppercase">Ajouter la photo</span>
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                </button>
                <button onclick="publierAnnonce()" id="btnPublier" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest mt-4">Publier sur le marché</button>
            </div>
        </div>

        <div class="mt-10 mb-8">
            <h2 class="font-black text-[#4c1d95] text-lg uppercase mb-4 flex items-center gap-2"><i class="fas fa-boxes text-orange-500"></i> Mon Stock</h2>
            <div id="mes-articles" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const dbUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(dbUrl, dbKey);
        let myUser, myPhoto, myWhatsapp, monAbonnement, articleASupprimer;

        function afficherAlerte(t, m, type) {
            document.getElementById('alerte-titre').innerText = t; document.getElementById('alerte-message').innerText = m;
            const modal = document.getElementById('modal-alerte'); const icon = document.getElementById('alerte-icon');
            if(type === 'succes') { icon.className = "w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"; icon.innerHTML = '<i class="fas fa-check"></i>'; }
            else { icon.className = "w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"; icon.innerHTML = '<i class="fas fa-exclamation"></i>'; }
            modal.style.display = 'flex'; setTimeout(() => modal.classList.add('opacity-100'), 10);
        }
        function fermerAlerte() { document.getElementById('modal-alerte').classList.remove('opacity-100'); setTimeout(() => document.getElementById('modal-alerte').style.display='none', 300); }
        function fermerConfirm() { document.getElementById('modal-confirm').classList.remove('opacity-100'); setTimeout(() => document.getElementById('modal-confirm').style.display='none', 300); }

        async function publierAnnonce() {
            const nom = document.getElementById('pNom').value; const prix = document.getElementById('pPrix').value;
            if (!nom || !prix || !myPhoto) { afficherAlerte("Oups", "Veuillez mettre le nom, le prix et la photo.", "erreur"); return; }
            const btn = document.getElementById('btnPublier'); btn.innerText = "ENVOI EN COURS..."; btn.disabled = true;
            try {
                const fileName = `${myUser.id}_${Date.now()}.jpg`;
                await supabase.storage.from('images').upload(fileName, myPhoto);
                const { data: { publicUrl } } = supabase.storage.from('images').getPublicUrl(fileName);
                let st = (monAbonnement === 'vip' || monAbonnement === 'pro') ? 'actif' : 'attente';
                await supabase.from('produits').insert([{ nom, prix, categorie: document.getElementById('pCat').value, description: document.getElementById('pDesc').value, vendeur: myWhatsapp, image: publicUrl, statut: st }]);
                afficherAlerte("Succès", "L'article est enregistré !", "succes"); setTimeout(() => window.location.reload(), 1500);
            } catch (e) { btn.innerText = "Publier"; btn.disabled = false; }
        }

        async function chargerMesArticles() {
            const { data } = await supabase.from('produits').select('*').eq('vendeur', myWhatsapp).order('dateajout', { ascending: false });
            const container = document.getElementById('mes-articles');
            if (!data || data.length === 0) { container.innerHTML = "<p class='col-span-2 text-center text-gray-400'>Aucun article.</p>"; }
            else {
                container.innerHTML = data.map(p => `<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col relative">${p.statut === 'attente' ? '<span class="absolute top-1 left-1 bg-black text-white text-[7px] px-2 py-1 rounded">ATTENTE</span>' : ''}<img src="${p.image}" class="w-full h-24 object-cover"><div class="p-2"><h4 class="font-black text-[10px] truncate">${p.nom}</h4><span class="text-orange-500 font-black text-xs">${p.prix} F</span><button onclick="demanderSuppr('${p.id}')" class="mt-2 w-full bg-red-100 text-red-600 font-bold py-1 rounded-lg text-[9px]">RETIRER</button></div></div>`).join('');
            }
        }

        function demanderSuppr(id) { articleASupprimer = id; document.getElementById('modal-confirm').style.display='flex'; setTimeout(() => document.getElementById('modal-confirm').classList.add('opacity-100'), 10); }
        document.getElementById('btn-confirm-action').onclick = async () => { await supabase.from('produits').delete().eq('id', articleASupprimer); fermerConfirm(); chargerMesArticles(); };

        document.getElementById('photoInput').onchange = (e) => { myPhoto = e.target.files[0]; document.getElementById('btnPhotoText').innerText="IMAGE PRÊTE ✅"; };
        async function deconnecter() { await supabase.auth.signOut(); window.location.href="vendre.html"; }

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "vendre.html"; return; }
            myUser = session.user;
            const { data: v } = await supabase.from('vendeurs').select('*').eq('id', myUser.id).single();
            if (v) {
                document.getElementById('nom-boutique').innerText = v.nom_boutique;
                document.getElementById('nom-vendeur').innerText = v.proprietaire;
                myWhatsapp = v.whatsapp; monAbonnement = v.abonnement || 'standard';
                document.getElementById('badge-abonnement').innerText = monAbonnement.toUpperCase();
                chargerMesArticles();
            }
        }
        init();
    </script>
</body>
</html>
