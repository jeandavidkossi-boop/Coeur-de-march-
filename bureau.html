<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Bureau - Cœur de Marché</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .header { background-color: #EA1D2C; color: white; padding: 15px; text-align: center; }
        .header img { width: 50px; margin-bottom: 5px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #FF6600; text-align: center; font-size: 1.2rem; margin-top: 0; }
        label { font-weight: bold; font-size: 0.9rem; color: #333; margin-top: 15px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #FF9800; border: none; color: white; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 20px; }
        .logout { text-align: center; margin-top: 20px; display: block; color: #EA1D2C; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <img src="IMG_20260218_162430.jpg" alt="Logo" style="border-radius: 50%;">
    <h1 style="margin: 0;">Mon Bureau Marchand</h1>
</div>

<div class="container">
    <div class="card">
        <h2>Ajouter un article</h2>

        <label>Nom de l'article</label>
        <input type="text" id="nomArticle" placeholder="Ex: Chaussures Nike pointure 42">

        <label>Prix (FCFA)</label>
        <input type="number" id="prixArticle" placeholder="Ex: 5000">

        <label>Catégorie de votre produit</label>
        <select id="catArticle">
            <option value="Alimentation">🛒 Alimentation (Gros & Détail)</option>
            <option value="Vivrier">🥕 Marché Vivrier (Frais)</option>
            <option value="Resto">🍲 Restaurants & Maquis</option>
            <option value="Sante">💊 Santé, Hygiène & Parapharmacie</option>
            <option value="Mode">👕 Mode & Chaussures</option>
            <option value="Mercerie">✂️ Mercerie, Tissus & Couture</option>
            <option value="Beaute">💄 Beauté & Cosmétique</option>
            <option value="Bebe">👶 Univers Bébé & Maternité</option>
            <option value="Electronique">💻 Téléphones & Électroménager</option>
            <option value="Maison">🏠 Maison, Déco & Ameublement</option>
            <option value="Vaisselle">🍽️ Vaisselle & Ustensiles</option>
            <option value="Librairie">📚 Librairie & Fournitures</option>
            <option value="Quincaillerie">🧱 Quincaillerie & Construction</option>
            <option value="Agricole">🚜 Agriculture, Élevage & Intrants</option>
            <option value="Pieces">⚙️ Pièces Détachées (Moto/Auto)</option>
        </select>

        <label>Description de l'article</label>
        <textarea id="descriptionArticle" rows="3" placeholder="Ex: Très bonne qualité, disponible en plusieurs couleurs..."></textarea>

        <label>Photo de l'article (Prendre une photo)</label>
        <input type="file" id="photoArticle" accept="image/*" capture="environment">

        <button onclick="ajouterProduit()">Mettre en vente sur le marché</button>
    </div>
    
    <a href="index.html" class="logout">Fermer mon bureau (Retour à l'accueil)</a>
</div>

<script type="module">
    // 1. On garde l'authentification Firebase pour savoir quel marchand se connecte
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTsoV6DNP6v2mTM97rSHUrB4a-EUGUVTQ",
        authDomain: "coeur-de-marche-a3f31.firebaseapp.com",
        projectId: "coeur-de-marche-a3f31",
        storageBucket: "coeur-de-marche-a3f31.appspot.com",
        messagingSenderId: "463834578884",
        appId: "1:463834578884:web:6d103245302e5a08322e0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let emailVendeur = "inconnu";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            emailVendeur = user.email;
        } else {
            setTimeout(() => {
                if (!auth.currentUser) {
                    window.location.href = "vendre.html";
                }
            }, 2000);
        }
    });

    // 2. NOUVEAU MOTEUR SUPABASE
    const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
    const supabaseKey = 'Sb_publishable_hfQrBZ4OYrkHjUxvtzCL_g_mi05THSO';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // 3. Fonction pour envoyer le produit
    window.ajouterProduit = async function() {
        const nom = document.getElementById('nomArticle').value;
        const prix = document.getElementById('prixArticle').value;
        const cat = document.getElementById('catArticle').value;
        const desc = document.getElementById('descriptionArticle').value;
        const photoInput = document.getElementById('photoArticle');
        const bouton = document.querySelector('button');

        if (!nom || !prix || photoInput.files.length === 0) {
            alert("⚠️ Veuillez remplir le nom, le prix et ajouter une photo !");
            return;
        }

        const photoFile = photoInput.files[0];
        bouton.innerText = "⏳ Envoi en cours sur le marché...";
        bouton.disabled = true;
        bouton.style.backgroundColor = "#ccc";

        try {
            // A. Envoi de la photo
            const nomFichierUnique = Date.now() + '_' + photoFile.name;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('images')
                .upload(nomFichierUnique, photoFile);

            if (uploadError) throw uploadError;

            // B. Récupération du lien
            const { data: urlData } = supabase.storage
                .from('images')
                .getPublicUrl(nomFichierUnique);
            const lienImage = urlData.publicUrl;

            // C. Enregistrement des informations
            const { error: insertError } = await supabase
                .from('produits')
                .insert([{ 
                        nom: nom, 
                        prix: Number(prix), 
                        categorie: cat, 
                        description: desc,
                        image: lienImage, 
                        vendeur: emailVendeur, 
                        dateAjout: Date.now() 
                }]);

            if (insertError) throw insertError;

            alert("✅ Produit mis en vente avec succès !");

            // On vide le formulaire
            document.getElementById('nomArticle').value = "";
            document.getElementById('prixArticle').value = "";
            document.getElementById('descriptionArticle').value = "";
            photoInput.value = "";

            bouton.innerText = "Mettre en vente sur le marché";
            bouton.disabled = false;
            bouton.style.backgroundColor = "#FF9800";

        } catch (error) {
            alert("❌ Erreur lors de l'envoi : " + error.message);
            bouton.innerText = "Mettre en vente sur le marché";
            bouton.disabled = false;
            bouton.style.backgroundColor = "#FF9800";
        }
    };
</script>
</body>
</html>
