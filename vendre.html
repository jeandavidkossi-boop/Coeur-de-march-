<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Espace Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // ON PLACE LA LOGIQUE ICI POUR QU'ELLE SOIT PRÊTE AVANT LE BOUTON
        let isRegister = false;

        function basculer() {
            // On récupère les éléments par ID
            const extra = document.getElementById('zoneExtra');
            const titre = document.getElementById('titre');
            const btnP = document.getElementById('btnP');
            const btnS = document.getElementById('btnS');

            if (!isRegister) {
                // PASSAGE EN MODE CRÉATION
                extra.style.display = 'block';
                titre.innerText = "CRÉER MA BOUTIQUE";
                btnP.innerText = "OUVRIR MA BOUTIQUE";
                btnP.style.backgroundColor = "#f97316"; // Orange
                btnS.innerText = "DÉJÀ INSCRIT ? SE CONNECTER";
                isRegister = true;
            } else {
                // RETOUR EN MODE CONNEXION
                extra.style.display = 'none';
                titre.innerText = "CONNEXION";
                btnP.innerText = "ACCÉDER AU BUREAU";
                btnP.style.backgroundColor = "#4c1d95"; // Violet
                btnS.innerText = "PAS ENCORE DE BOUTIQUE ? CRÉER MON ESPACE";
                isRegister = false;
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4 m-0 font-sans">

    <div class="bg-white rounded-[40px] p-8 w-full max-w-[400px] shadow-2xl border-t-[10px] border-[#f97316]">
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-gray-100 shadow-md">
            <h1 id="titre" class="text-2xl font-black text-[#4c1d95] uppercase">Connexion</h1>
        </div>

        <div class="space-y-3">
            <div id="zoneExtra" style="display: none;">
                <input type="text" id="nomB" placeholder="NOM DE LA BOUTIQUE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm mb-2 focus:border-orange-500 outline-none">
                <input type="text" id="nomP" placeholder="NOM DU PROPRIÉTAIRE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm mb-2 focus:border-orange-500 outline-none">
            </div>

            <input type="email" id="email" placeholder="EMAIL" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm outline-none">
            <input type="password" id="pass" placeholder="MOT DE PASSE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm outline-none">

            <button onclick="valider()" id="btnP" class="w-full bg-[#4c1d95] text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-4">
                Accéder au bureau
            </button>

            <div class="text-center mt-6">
                <div onclick="basculer()" id="btnS" class="text-[#f97316] font-black text-[11px] uppercase cursor-pointer py-4 px-2">
                    Pas encore de boutique ? Créer mon espace
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialisation Supabase
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function valider() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email || !password) { alert("Remplissez tout !"); return; }

            try {
                if(isRegister) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if(error) throw error;
                    alert("Boutique créée ! Connectez-vous.");
                    basculer();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    window.location.href = "bureau.html";
                }
            } catch(e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
