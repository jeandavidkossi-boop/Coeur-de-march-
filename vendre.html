<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Marchand - Cœur de Marché</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        img { width: 80px; border-radius: 50%; margin-bottom: 10px; }
        h2 { color: #EA1D2C; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #FF9800; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle { margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <img src="IMG_20260218_162430.jpg" alt="Logo">
    <h2 id="titre">Connexion Marchand</h2>

    <div id="form-inscription" style="display: none;">
        <input type="text" id="nomBoutique" placeholder="Nom de la Boutique (ex: Nina Fashion)">
        <input type="text" id="nomProprio" placeholder="Nom du propriétaire">
        <input type="text" id="tel" placeholder="N° de téléphone">
    </div>

    <input type="email" id="email" placeholder="Votre Email">
    <input type="password" id="pass" placeholder="Mot de passe">

    <button id="btnAction" onclick="gererAuth()">Se connecter</button>
    <p class="toggle" id="btnToggle" onclick="basculer()">Pas encore inscrit ? Créer un compte</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCTsoV6DNP6v2mTM97rSHUrB4a-EUGUVTQ",
        authDomain: "coeur-de-marche-a3f31.firebaseapp.com",
        projectId: "coeur-de-marche-a3f31",
        appId: "1:463834578884:web:6d103245302e5a08322e0f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // CONFIGURATION SUPABASE
    const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let modeInscription = false;

    window.basculer = function() {
        modeInscription = !modeInscription;
        document.getElementById('form-inscription').style.display = modeInscription ? 'block' : 'none';
        document.getElementById('titre').innerText = modeInscription ? 'Créer mon compte' : 'Connexion Marchand';
        document.getElementById('btnAction').innerText = modeInscription ? "S'inscrire" : 'Se connecter';
        document.getElementById('btnToggle').innerText = modeInscription ? 'Déjà inscrit ? Se connecter' : 'Pas encore inscrit ? Créer un compte';
    };

    window.gererAuth = async function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnAction');

        if (!email || !pass) { alert("Remplissez tous les champs !"); return; }
        btn.disabled = true;
        btn.innerText = "Patientez...";

        if (modeInscription) {
            const boutique = document.getElementById('nomBoutique').value;
            const proprio = document.getElementById('nomProprio').value;
            const tel = document.getElementById('tel').value;

            createUserWithEmailAndPassword(auth, email, pass)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    // Enregistrement gratuit chez Supabase
                    await supabase.from('vendeurs').insert([{
                        id: user.uid,
                        nom_boutique: boutique,
                        proprietaire: proprio,
                        telephone: tel,
                        email: email,
                        date_inscription: Date.now()
                    }]);
                    window.location.href = "bureau.html";
                })
                .catch(err => { alert("Erreur: " + err.message); btn.disabled = false; });
        } else {
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { window.location.href = "bureau.html"; })
                .catch(err => { alert("Erreur: " + err.message); btn.disabled = false; });
        }
    };
</script>
</body>
</html>
