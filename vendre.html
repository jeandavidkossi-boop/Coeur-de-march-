<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espace Pro - Cœur de Marché</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4 m-0 font-sans">

    <div class="bg-white rounded-[40px] p-8 w-full max-w-[400px] shadow-2xl border-t-[10px] border-[#f97316]">
        
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-lg">
            <h1 id="titrePrincipal" class="text-2xl font-black text-[#4c1d95] uppercase">Connexion</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase mt-1">Accès Partenaire</p>
        </div>

        <div class="space-y-4">
            <div id="zoneInscription" style="display: none;" class="space-y-3">
                <input type="text" id="nomB" placeholder="NOM DE LA BOUTIQUE" class="w-full p-4 rounded-2xl bg-gray-100 border-2 border-transparent font-bold text-sm outline-none">
                <input type="text" id="nomP" placeholder="NOM DU PROPRIÉTAIRE" class="w-full p-4 rounded-2xl bg-gray-100 border-2 border-transparent font-bold text-sm outline-none">
            </div>

            <input type="email" id="email" placeholder="EMAIL PROFESSIONNEL" class="w-full p-4 rounded-2xl bg-gray-100 border-2 border-transparent font-bold text-sm outline-none">
            <input type="password" id="pass" placeholder="MOT DE PASSE" class="w-full p-4 rounded-2xl bg-gray-100 border-2 border-transparent font-bold text-sm outline-none">

            <button type="button" id="btnAction" class="w-full bg-[#4c1d95] text-white font-black py-5 rounded-2xl shadow-xl uppercase mt-4 text-sm tracking-widest active:scale-95 transition-all">
                Se connecter
            </button>

            <div class="text-center mt-6">
                <button type="button" id="btnSwitch" class="w-full text-[#f97316] font-black text-[12px] uppercase p-4 bg-transparent border-none outline-none">
                    Pas encore de boutique ? Créer mon espace
                </button>
            </div>
        </div>
    </div>

    <script>
        // LE MOTEUR SE CHARGE APRÈS L'AFFICHAGE
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            let estEnModeInscription = false;

            const zone = document.getElementById('zoneInscription');
            const titre = document.getElementById('titrePrincipal');
            const btnAction = document.getElementById('btnAction');
            const btnSwitch = document.getElementById('btnSwitch');
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('pass');

            // ON ATTACHE L'ÉVÉNEMENT DU CLIC ICI DE FORCE
            btnSwitch.addEventListener('click', () => {
                estEnModeInscription = !estEnModeInscription;

                if (estEnModeInscription) {
                    zone.style.display = 'block';
                    titre.innerText = "Créer ma Boutique";
                    btnAction.innerText = "Ouvrir ma boutique";
                    btnAction.style.backgroundColor = "#f97316";
                    btnSwitch.innerText = "Déjà inscrit ? Se connecter";
                } else {
                    zone.style.display = 'none';
                    titre.innerText = "Connexion";
                    btnAction.innerText = "Se connecter";
                    btnAction.style.backgroundColor = "#4c1d95";
                    btnSwitch.innerText = "Pas encore de boutique ? Créer mon espace";
                }
            });

            // ON ATTACHE L'ACTION PRINCIPALE
            btnAction.addEventListener('click', async () => {
                const email = emailInput.value;
                const password = passInput.value;

                if(!email || !password) {
                    alert("⚠️ Remplissez l'email et le mot de passe.");
                    return;
                }

                btnAction.disabled = true;
                btnAction.innerText = "TRAITEMENT EN COURS...";

                try {
                    if(estEnModeInscription) {
                        const { error } = await supabase.auth.signUp({ email, password });
                        if(error) throw error;
                        alert("✅ Boutique créée ! Vous pouvez maintenant vous connecter.");
                        btnSwitch.click(); // Retour au mode connexion
                    } else {
                        const { error } = await supabase.auth.signInWithPassword({ email, password });
                        if(error) throw error;
                        window.location.replace("bureau.html");
                    }
                } catch(err) {
                    alert("❌ ERREUR : " + err.message);
                } finally {
                    btnAction.disabled = false;
                    btnAction.innerText = estEnModeInscription ? "Ouvrir ma boutique" : "Se connecter";
                }
            });
        });
    </script>
</body>
</html>
