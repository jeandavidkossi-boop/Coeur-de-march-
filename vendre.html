<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre - Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* Gris clair stable */
            margin: 0;
            padding: 0;
        }
        .text-cdm-purple { color: #5b21b6; }
        .bg-cdm-orange { background-color: #f97316; }
        .border-cdm-orange { border-color: #f97316; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-200 p-8">
        
        <div class="text-center mb-8">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-cdm-orange shadow-sm" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=CDM'">
            <h1 class="text-2xl font-extrabold text-cdm-purple uppercase tracking-tight">Cœur de Marché</h1>
            <p class="text-cdm-orange font-bold text-xs uppercase tracking-widest">Bouaflé</p>
            <div class="h-1 w-12 bg-cdm-orange mx-auto mt-2 rounded-full"></div>
            <p id="form-titre" class="text-gray-500 font-semibold text-sm mt-4">Connectez-vous à votre boutique</p>
        </div>

        <div class="space-y-4">
            
            <div id="extra-fields" style="display: none;" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-store absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="nomB" placeholder="Nom de la boutique" class="w-full p-3.5 pl-11 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium">
                </div>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="nomP" placeholder="Nom du propriétaire" class="w-full p-3.5 pl-11 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium">
                </div>
                <div class="relative">
                    <i class="fab fa-whatsapp absolute left-4 top-4 text-gray-400"></i>
                    <input type="tel" id="telephone" placeholder="Numéro WhatsApp" class="w-full p-3.5 pl-11 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium">
                </div>
            </div>

            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-4 text-gray-400"></i>
                <input type="email" id="email" placeholder="Adresse Email" class="w-full p-3.5 pl-11 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
                <input type="password" id="password" placeholder="Mot de passe" class="w-full p-3.5 pl-11 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-medium">
            </div>
            
            <button id="btnAction" class="w-full bg-cdm-orange text-white font-bold py-4 rounded-xl shadow-md hover:opacity-90 active:scale-95 transition-all uppercase tracking-wider mt-4">
                Se connecter
            </button>
        </div>

        <div class="mt-8 flex justify-center gap-8 border-t border-gray-100 pt-6">
            <button id="switchConnexion" class="text-cdm-purple font-bold text-xs uppercase border-b-2 border-cdm-orange pb-1">Connexion</button>
            <button id="switchInscription" class="text-gray-400 font-bold text-xs uppercase pb-1">Créer un compte</button>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-400 font-bold text-[10px] uppercase hover:text-cdm-orange transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Retour au marché
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration Supabase
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Éléments du DOM
        const extraFields = document.getElementById('extra-fields');
        const formTitre = document.getElementById('form-titre');
        const btnAction = document.getElementById('btnAction');
        const sConn = document.getElementById('switchConnexion');
        const sInsc = document.getElementById('switchInscription');

        let isSignupMode = false;

        // Passer en mode INSCRIPTION
        sInsc.addEventListener('click', () => {
            isSignupMode = true;
            extraFields.style.display = 'block';
            formTitre.innerText = "Inscription nouveau vendeur";
            btnAction.innerText = "Créer ma boutique";
            sInsc.className = "text-cdm-purple font-bold text-xs uppercase border-b-2 border-cdm-orange pb-1";
            sConn.className = "text-gray-400 font-bold text-xs uppercase pb-1";
        });

        // Passer en mode CONNEXION
        sConn.addEventListener('click', () => {
            isSignupMode = false;
            extraFields.style.display = 'none';
            formTitre.innerText = "Connectez-vous à votre boutique";
            btnAction.innerText = "Se connecter";
            sConn.className = "text-cdm-purple font-bold text-xs uppercase border-b-2 border-cdm-orange pb-1";
            sInsc.className = "text-gray-400 font-bold text-xs uppercase pb-1";
        });

        // Gestion du clic sur le bouton principal
        btnAction.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                alert("Veuillez remplir les champs obligatoires.");
                return;
            }

            btnAction.innerText = "Traitement en cours...";

            if (isSignupMode) {
                const nomB = document.getElementById('nomB').value;
                const nomP = document.getElementById('nomP').value;
                const tel = document.getElementById('telephone').value;

                if (!nomB || !nomP || !tel) {
                    alert("Tous les champs sont nécessaires pour l'inscription.");
                    btnAction.innerText = "Créer ma boutique";
                    return;
                }

                const { error } = await supabase.auth.signUp({
                    email,
                    password: pass,
                    options: { data: { shop_name: nomB, full_name: nomP, telephone: tel } }
                });

                if (error) {
                    alert("Erreur d'inscription : " + error.message);
                    btnAction.innerText = "Créer ma boutique";
                } else {
                    alert("Inscription réussie ! Connectez-vous maintenant.");
                    sConn.click();
                }
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) {
                    alert("Identifiants incorrects.");
                    btnAction.innerText = "Se connecter";
                } else {
                    // Redirection vers le bureau de gestion
                    window.location.href = "bureau.html";
                }
            }
        });
    </script>
</body>
</html>
