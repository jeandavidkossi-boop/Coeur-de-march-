<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre sur Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[30px] shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-purple-900 uppercase italic">Vendre</h1>
            <p class="text-gray-500 font-bold text-sm" id="form-titre">Connectez-vous à votre espace</p>
        </div>

        <div class="space-y-4">
            <div id="extra-fields" class="hidden space-y-4">
                <input type="text" id="nomB" placeholder="Nom de votre boutique" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
                <input type="text" id="nomP" placeholder="Votre nom complet" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
                <input type="tel" id="telephone" placeholder="Numéro WhatsApp" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
            </div>

            <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
            <input type="password" id="password" placeholder="Mot de passe" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 font-bold">
            
            <button id="btnAction" class="w-full bg-purple-900 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-purple-800 transition transform active:scale-95 uppercase">
                Se connecter
            </button>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button id="switchConnexion" class="text-purple-900 font-black text-xs uppercase border-b-2 border-purple-900 pb-1">Connexion</button>
            <button id="switchInscription" class="text-gray-400 font-black text-xs uppercase pb-1">Créer mon espace</button>
        </div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-orange-500 font-bold text-xs uppercase italic"><i class="fas fa-arrow-left mr-2"></i>Retour au marché</a>
        </div>
    </div>

    <script src="https://urpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://szhsohizqwcsnxltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHNvaGl6cXdjc254bHRqdHEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxMTY1Njg0MWh2N2hpenF3Y3NueGx0anFudWd2N2c2I1';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const btnAction = document.getElementById('btnAction');
        const extraFields = document.getElementById('extra-fields');
        const formTitre = document.getElementById('form-titre');
        const switchConnexion = document.getElementById('switchConnexion');
        const switchInscription = document.getElementById('switchInscription');

        let isSignup = false;

        switchInscription.onclick = () => {
            isSignup = true;
            extraFields.classList.remove('hidden');
            formTitre.innerText = "Créez votre boutique en 1 minute";
            btnAction.innerText = "Créer mon espace";
            switchInscription.classList.add('text-purple-900', 'border-b-2', 'border-purple-900');
            switchInscription.classList.remove('text-gray-400');
            switchConnexion.classList.remove('text-purple-900', 'border-b-2', 'border-purple-900');
            switchConnexion.classList.add('text-gray-400');
        };

        switchConnexion.onclick = () => {
            isSignup = false;
            extraFields.classList.add('hidden');
            formTitre.innerText = "Connectez-vous à votre espace";
            btnAction.innerText = "Se connecter";
            switchConnexion.classList.add('text-purple-900', 'border-b-2', 'border-purple-900');
            switchConnexion.classList.remove('text-gray-400');
            switchInscription.classList.remove('text-purple-900', 'border-b-2', 'border-purple-900');
            switchInscription.classList.add('text-gray-400');
        };

        btnAction.onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nomB = document.getElementById('nomB') ? document.getElementById('nomB').value : '';
            const nomP = document.getElementById('nomP') ? document.getElementById('nomP').value : '';
            const telephone = document.getElementById('telephone') ? document.getElementById('telephone').value : '';

            if (!email || !password) return alert("Veuillez remplir tous les champs.");

            if (isSignup) {
                if (!nomB || !nomP || !telephone) return alert("Le nom de la boutique, du propriétaire et le numéro WhatsApp sont requis.");
                
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            shop_name: nomB,
                            full_name: nomP,
                            telephone: telephone
                        }
                    }
                });

                if (error) {
                    alert("Erreur : " + error.message);
                } else {
                    alert("Compte créé avec succès ! Connectez-vous maintenant.");
                    switchConnexion.click();
                }
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    alert("Identifiants incorrects.");
                } else {
                    window.location.replace("bureau.html");
                }
            }
        };
    </script>
</body>
</html>
