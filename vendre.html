<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Marchand - Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-[30px] shadow-2xl w-full max-w-md border border-purple-100">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-purple-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-store text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-purple-900 uppercase">Espace Marchand</h1>
            <p class="text-gray-500 text-sm mt-2">Connectez-vous pour gérer vos articles</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-purple-900 uppercase ml-2 mb-1">Email</label>
                <input type="email" id="email" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-900 text-sm" placeholder="votre@email.com">
            </div>
            <div>
                <label class="block text-[10px] font-black text-purple-900 uppercase ml-2 mb-1">Mot de passe</label>
                <input type="password" id="password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-900 text-sm" placeholder="••••••••">
            </div>
            <button onclick="connexion()" id="btnConnexion" class="w-full bg-purple-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-4 uppercase text-sm">
                Se connecter
            </button>
            <p id="message" class="text-center text-xs font-bold mt-4"></p>
        </div>
    </div>

    <script>
        // CONFIGURATION UNIQUE SUPABASE
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function connexion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnConnexion');
            const msg = document.getElementById('message');

            if (!email || !password) {
                msg.innerText = "Veuillez remplir tous les champs.";
                msg.className = "text-center text-xs font-bold mt-4 text-red-500";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Vérification...";
            msg.innerText = "";

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                msg.innerText = "Connexion réussie !";
                msg.className = "text-center text-xs font-bold mt-4 text-green-500";
                
                // On attend une seconde et on va au bureau
                setTimeout(() => {
                    window.location.href = "bureau.html";
                }, 1000);

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Se connecter";
                msg.innerText = "Erreur : Identifiants incorrects.";
                msg.className = "text-center text-xs font-bold mt-4 text-red-500";
            }
        }
    </script>
</body>
</html>
