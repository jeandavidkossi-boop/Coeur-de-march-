<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cœur de Marché - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4 m-0 font-sans">

    <div class="bg-white rounded-[40px] p-8 w-full max-w-[400px] shadow-2xl border-t-[10px] border-[#f97316]">
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-lg">
            <h1 id="titre" class="text-2xl font-black text-[#4c1d95] uppercase">Connexion</h1>
        </div>

        <div class="space-y-4">
            <div id="zoneExtra" style="display: none;">
                <input type="text" id="nomB" placeholder="NOM DE LA BOUTIQUE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm outline-none focus:border-orange-500">
                <input type="text" id="nomP" placeholder="NOM DU PROPRIÉTAIRE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm mt-2 outline-none focus:border-orange-500">
            </div>

            <input type="email" id="email" placeholder="EMAIL" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm outline-none focus:border-[#4c1d95]">
            <input type="password" id="pass" placeholder="MOT DE PASSE" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-gray-100 font-bold text-sm outline-none focus:border-[#4c1d95]">

            <button onclick="gererBoutique(event)" id="btnP" class="w-full bg-[#4c1d95] text-white font-black py-5 rounded-2xl shadow-xl uppercase mt-4 text-sm tracking-widest">
                Accéder au bureau
            </button>

            <div class="text-center mt-6">
                <div onclick="basculer()" id="btnS" class="text-[#f97316] font-black text-[11px] uppercase cursor-pointer py-2 decoration-none">
                    Pas encore de boutique ? Créer mon espace
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isRegister = false;

        function basculer() {
            const extra = document.getElementById('zoneExtra');
            const titre = document.getElementById('titre');
            const btnP = document.getElementById('btnP');
            const btnS = document.getElementById('btnS');
            isRegister = !isRegister;

            if (isRegister) {
                extra.style.display = 'block';
                titre.innerText = "CRÉER MA BOUTIQUE";
                btnP.innerText = "OUVRIR MA BOUTIQUE";
                btnP.style.backgroundColor = "#f97316";
                btnS.innerText = "DÉJÀ INSCRIT ? SE CONNECTER";
            } else {
                extra.style.display = 'none';
                titre.innerText = "CONNEXION";
                btnP.innerText = "ACCÉDER AU BUREAU";
                btnP.style.backgroundColor = "#4c1d95";
                btnS.innerText = "PAS ENCORE DE BOUTIQUE ? CRÉER MON ESPACE";
            }
        }

        async function gererBoutique(e) {
            if(e) e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('btnP');

            if(!email || !password) { alert("⚠️ Remplissez tous les champs !"); return; }

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION...";

            try {
                if(isRegister) {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if(error) throw error;
                    alert("✅ Félicitations ! Boutique créée. Connectez-vous maintenant.");
                    basculer();
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    
                    // ON BALANCE SUR LE BUREAU
                    window.location.replace("bureau.html");
                }
            } catch(err) {
                alert("❌ INFO : " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = isRegister ? "OUVRIR MA BOUTIQUE" : "ACCÉDER AU BUREAU";
            }
        }
    </script>
</body>
</html>
