<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cœur de Marché - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4 m-0 font-sans">

    <div class="bg-white rounded-[40px] p-8 w-full max-w-[400px] shadow-2xl border-t-[10px] border-[#f97316]">
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-gray-100 shadow-md">
            <h1 id="titre" class="text-2xl font-black text-[#4c1d95] uppercase">Connexion</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase mt-1">Cœur de Marché Bouaflé</p>
        </div>

        <div class="space-y-3">
            <div id="zoneExtra" style="display: none;">
                <input type="text" id="nomB" placeholder="NOM DE LA BOUTIQUE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm mb-2 focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="text" id="nomP" placeholder="NOM DU PROPRIÉTAIRE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm mb-2 focus:ring-2 focus:ring-orange-500 outline-none">
            </div>

            <input type="email" id="email" placeholder="VOTRE EMAIL" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm focus:ring-2 focus:ring-[#4c1d95] outline-none">
            <input type="password" id="pass" placeholder="MOT DE PASSE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm focus:ring-2 focus:ring-[#4c1d95] outline-none">

            <button onclick="valider()" id="btnP" class="w-full bg-[#4c1d95] text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-4 active:scale-95 transition-all">
                Se connecter
            </button>

            <div class="text-center mt-6">
                <button onclick="basculer()" id="btnS" class="text-[#f97316] font-black text-[11px] uppercase tracking-tighter">
                    Pas encore de boutique ? Créer mon espace
                </button>
            </div>
        </div>

        <p id="msg" class="text-center text-[10px] font-black mt-4 uppercase text-red-600"></p>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isRegister = false;

        function basculer() {
            isRegister = !isRegister;
            const extra = document.getElementById('zoneExtra');
            const titre = document.getElementById('titre');
            const btnP = document.getElementById('btnP');
            const btnS = document.getElementById('btnS');

            if(isRegister) {
                extra.style.display = 'block';
                titre.innerText = "Création Boutique";
                btnP.innerText = "Ouvrir ma boutique";
                btnP.style.backgroundColor = "#f97316";
                btnS.innerText = "Déjà inscrit ? Se connecter";
            } else {
                extra.style.display = 'none';
                titre.innerText = "Connexion";
                btnP.innerText = "Se connecter";
                btnP.style.backgroundColor = "#4c1d95";
                btnS.innerText = "Pas encore de boutique ? Créer mon espace";
            }
        }

        async function valider() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('btnP');
            const msg = document.getElementById('message');

            if(!email || !password) { alert("Champs vides !"); return; }
            btn.disabled = true;
            btn.innerText = "PATIENTEZ...";

            try {
                if(isRegister) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if(error) throw error;
                    alert("Compte créé ! Connectez-vous.");
                    basculer();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    window.location.href = "bureau.html";
                }
            } catch(e) {
                alert("Erreur: " + e.message);
                btn.disabled = false;
                btn.innerText = isRegister ? "Ouvrir ma boutique" : "Se connecter";
            }
        }
    </script>
</body>
</html>
