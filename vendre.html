<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Marchand - Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.98); border-radius: 40px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border-top: 8px solid #f97316; }
        .input-style { width: 100%; padding: 12px 20px; border-radius: 15px; background: #f3f4f6; border: 2px solid transparent; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .input-style:focus { border-color: #f97316; background: white; outline: none; }
    </style>
</head>
<body>

    <div class="glass mx-4">
        <div class="text-center mb-6">
            <img src="1769121566036.png" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-3 border-4 border-white shadow-lg object-cover">
            <h1 id="titrePage" class="text-xl font-black text-purple-900 uppercase">Connexion Marchand</h1>
            <p id="sousTitre" class="text-gray-400 text-[10px] font-bold uppercase mt-1">Cœur de Marché Bouaflé</p>
        </div>

        <div id="zoneInscription" style="display: none;">
            <input type="text" id="nomBoutique" placeholder="NOM DE LA BOUTIQUE" class="input-style">
            <input type="text" id="nomProprio" placeholder="NOM DU PROPRIÉTAIRE" class="input-style">
        </div>

        <input type="email" id="email" placeholder="VOTRE EMAIL" class="input-style">
        <input type="password" id="password" placeholder="MOT DE PASSE" class="input-style">
        
        <button onclick="gererAction()" id="btnAction" class="w-full bg-purple-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-2 uppercase text-sm">
            Se connecter
        </button>

        <div class="text-center mt-6">
            <button onclick="basculer()" id="btnBasculer" class="text-orange-600 text-[10px] font-black uppercase tracking-tighter">
                Pas encore de boutique ? Créer mon espace
            </button>
        </div>

        <p id="message" class="text-center text-[10px] font-black mt-4 uppercase text-red-600"></p>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let modeInscription = false;

        function basculer() {
            modeInscription = !modeInscription;
            const zone = document.getElementById('zoneInscription');
            const titre = document.getElementById('titrePage');
            const btn = document.getElementById('btnAction');
            const btnB = document.getElementById('btnBasculer');

            if(modeInscription) {
                zone.style.display = 'block';
                titre.innerText = "Créer ma Boutique";
                btn.innerText = "Ouvrir ma boutique";
                btnB.innerText = "Déjà inscrit ? Se connecter";
                btn.style.backgroundColor = "#f97316";
            } else {
                zone.style.display = 'none';
                titre.innerText = "Connexion Marchand";
                btn.innerText = "Se connecter";
                btnB.innerText = "Pas encore de boutique ? Créer mon espace";
                btn.style.backgroundColor = "#4c1d95";
            }
        }

        async function gererAction() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btnAction');
            const msg = document.getElementById('message');

            if (!email || !pass) { alert("Remplissez tout !"); return; }

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION...";

            try {
                if (modeInscription) {
                    const { error } = await supabase.auth.signUp({ email, password: pass });
                    if (error) throw error;
                    alert("Compte créé ! Connectez-vous maintenant.");
                    basculer();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                    if (error) throw error;
                    
                    // LA BASCULE AUTOMATIQUE ICI :
                    window.location.replace("bureau.html");
                }
            } catch (err) {
                msg.innerText = "ERREUR : " + err.message;
                btn.disabled = false;
                btn.innerText = modeInscription ? "Ouvrir ma boutique" : "Se connecter";
            }
        }
    </script>
</body>
</html>
