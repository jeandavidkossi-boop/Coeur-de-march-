<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre - Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-200">
        
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-2 border-2 border-orange-500" onerror="this.src='https://via.placeholder.com/80'">
            <h1 class="text-xl font-black text-purple-900 uppercase">Cœur de Marché</h1>
            <p id="form-titre" class="text-gray-500 text-sm font-bold">Connexion Vendeur</p>
        </div>

        <div class="space-y-4">
            <div id="champs-inscription" style="display: none;" class="space-y-4">
                <input type="text" id="nomB" placeholder="Nom Boutique" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
                <input type="text" id="nomP" placeholder="Votre Nom" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
                <input type="tel" id="telephone" placeholder="WhatsApp" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
            </div>

            <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
            <input type="password" id="password" placeholder="Mot de passe" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
            
            <button id="btnAction" onclick="executerAction()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 uppercase">
                Se connecter
            </button>
        </div>

        <div class="mt-8 flex justify-center gap-6 border-t pt-6">
            <button id="swConn" onclick="modeC()" class="text-purple-900 font-bold text-xs border-b-2 border-orange-500 pb-1">CONNEXION</button>
            <button id="swInsc" onclick="modeI()" class="text-gray-400 font-bold text-xs pb-1">CRÉER COMPTE</button>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-400 font-bold text-xs uppercase"><i class="fas fa-arrow-left"></i> Retour Marché</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // On vérifie si Supabase charge bien
        let supabase;
        try {
            const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        } catch(e) { console.error("Erreur chargement Supabase"); }

        let estEnInscription = false;

        function modeI() {
            estEnInscription = true;
            document.getElementById('champs-inscription').style.display = 'block';
            document.getElementById('form-titre').innerText = "Créer votre boutique";
            document.getElementById('btnAction').innerText = "Créer ma boutique";
            document.getElementById('swInsc').className = "text-purple-900 font-bold text-xs border-b-2 border-orange-500 pb-1";
            document.getElementById('swConn').className = "text-gray-400 font-bold text-xs pb-1";
        }

        function modeC() {
            estEnInscription = false;
            document.getElementById('champs-inscription').style.display = 'none';
            document.getElementById('form-titre').innerText = "Connexion Vendeur";
            document.getElementById('btnAction').innerText = "Se connecter";
            document.getElementById('swConn').className = "text-purple-900 font-bold text-xs border-b-2 border-orange-500 pb-1";
            document.getElementById('swInsc').className = "text-gray-400 font-bold text-xs pb-1";
        }

        async function executerAction() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Remplissez tout !");

            if(!supabase) return alert("Le système de connexion ne charge pas. Vérifiez votre connexion internet.");

            document.getElementById('btnAction').innerText = "Patientez...";

            if(estEnInscription) {
                const { error } = await supabase.auth.signUp({
                    email, password: pass,
                    options: { data: { shop_name: document.getElementById('nomB').value } }
                });
                if(error) { alert(error.message); document.getElementById('btnAction').innerText = "Créer ma boutique"; }
                else { alert("Compte créé ! Connectez-vous."); modeC(); }
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if(error) { alert("Erreur: " + error.message); document.getElementById('btnAction').innerText = "Se connecter"; }
                else { window.location.href = "bureau.html"; }
            }
        }
    </script>
</body>
</html>
