<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO - Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; margin: 0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 30px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-top: 10px solid #f97316; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 2px solid #e2e8f0; font-weight: bold; -webkit-appearance: none; }
        button { cursor: pointer; transition: 0.2s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-gray-200">
            <h1 id="monTitre" class="text-2xl font-black text-purple-900 uppercase">Connexion</h1>
        </div>

        <div id="champsExtra" class="hidden">
            <input type="text" id="nomBoutique" placeholder="NOM DE LA BOUTIQUE">
            <input type="text" id="nomProprio" placeholder="NOM DU PROPRIÉTAIRE">
            <input type="tel" id="tel" placeholder="TÉLÉPHONE">
        </div>

        <input type="email" id="email" placeholder="VOTRE EMAIL">
        <input type="password" id="pass" placeholder="MOT DE PASSE">

        <button onclick="valider()" id="btnPrincipal" class="w-full bg-purple-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase mt-4">
            Se connecter
        </button>

        <div class="text-center mt-6">
            <button onclick="basculer()" id="btnSwitch" class="text-orange-600 font-black text-[11px] uppercase tracking-tighter p-4">
                Pas encore de boutique ? Créer mon espace
            </button>
        </div>

        <p id="info" class="text-center text-[10px] font-bold mt-4 uppercase text-red-500"></p>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isRegister = false;

        // CETTE FONCTION EST LE MOTEUR
        function basculer() {
            console.log("Clic détecté");
            isRegister = !isRegister;
            const extra = document.getElementById('champsExtra');
            const titre = document.getElementById('monTitre');
            const btnP = document.getElementById('btnPrincipal');
            const btnS = document.getElementById('btnSwitch');

            if(isRegister) {
                extra.classList.remove('hidden');
                titre.innerText = "Créer Boutique";
                btnP.innerText = "Ouvrir ma boutique";
                btnP.style.backgroundColor = "#f97316";
                btnS.innerText = "Déjà inscrit ? Se connecter";
            } else {
                extra.classList.add('hidden');
                titre.innerText = "Connexion";
                btnP.innerText = "Se connecter";
                btnP.style.backgroundColor = "#4c1d95";
                btnS.innerText = "Pas encore de boutique ? Créer mon espace";
            }
        }

        async function valider() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('btnPrincipal');
            const info = document.getElementById('info');

            if(!email || !password) { alert("Remplissez les champs !"); return; }

            btn.innerText = "CHARGEMENT...";
            btn.disabled = true;

            try {
                if(isRegister) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if(error) throw error;
                    alert("Succès ! Connectez-vous maintenant.");
                    basculer();
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    window.location.href = "bureau.html";
                }
            } catch(e) {
                alert("Erreur : " + e.message);
                btn.disabled = false;
                btn.innerText = isRegister ? "Ouvrir ma boutique" : "Se connecter";
            }
        }
    </script>
</body>
</html>
