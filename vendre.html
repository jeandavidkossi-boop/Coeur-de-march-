<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Marchand - Cœur de Marché Bouaflé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 1rem; }
        h2 { color: #6A1B9A; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #FF9800; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #e68a00; }
        .switch-btn { color: #6A1B9A; font-size: 0.9rem; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; }
        .error { color: red; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="IMG_20260218_162430.jpg" alt="Logo Cœur de Marché" class="logo">
    <h2 id="form-title">Connexion Marchand</h2>
    
    <input type="email" id="email" placeholder="Votre E-mail" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    
    <button id="main-btn" onclick="gererAuth()">Se connecter</button>
    <p id="error-msg" class="error"></p>

    <span class="switch-btn" id="switch-link" onclick="basculerMode()">Pas encore de boutique ? Créer mon compte gratuitement</span>
    
    <a href="index.html" style="display:block; margin-top: 20px; font-size: 0.8rem; color: #666;">Retour au marché</a>
    <div id="message-succes" style="display: none; background: #FAF5FF; border: 2px solid #6A1B9A; color: #6A1B9A; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center;">
        <h3 style="margin: 0 0 5px 0; font-size: 16px; color: #FF9800;">🎉 Félicitations !</h3>
        <p style="margin: 0; font-size: 14px; font-weight: bold;">Boutique créée avec succès ! Bienvenue à Bouaflé.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Ta config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCIsoV6DNP6v7Nm79R7r5hUrB4a-0U6vi0",
        authDomain: "coeur-de-marche-a3f31.firebaseapp.com",
        projectId: "coeur-de-marche-a3f31",
        storageBucket: "coeur-de-marche-a3f31.firebasestorage.app",
        messagingSenderId: "463834578884",
        appId: "1:463834578884:web:64083245392e5e98322e91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let modeInscription = false;

    window.basculerMode = function() {
        modeInscription = !modeInscription;
        document.getElementById('form-title').innerText = modeInscription ? "Créer ma Boutique" : "Connexion Marchand";
        document.getElementById('main-btn').innerText = modeInscription ? "Créer mon compte" : "Se connecter";
        document.getElementById('switch-link').innerText = modeInscription ? "Déjà une boutique ? Se connecter" : "Pas encore de boutique ? Créer mon compte gratuitement";
    };

    window.gererAuth = function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        if(modeInscription) {
            createUserWithEmailAndPassword(auth, email, password)
                        .then(() => {
                    document.getElementById('message-succes').style.display = 'block';
                    document.getElementById('error-msg').style.display = 'none';
                })
                .catch(err => { errorMsg.innerText = "Erreur : " + err.message; errorMsg.style.display = 'block'; });
        } else {
            signInWithEmailAndPassword(auth, email, password)
                                .then(() => {
                    document.getElementById('message-succes').innerHTML = "<h3 style='margin: 0 0 5px 0; font-size: 16px; color: #FF9800;'>✅ Succès !</h3><p style='margin: 0; font-size: 14px; font-weight: bold;'>Connexion réussie au marché !</p>";
                    document.getElementById('message-succes').style.display = 'block';
                    document.getElementById('error-msg').style.display = 'none';
                })
                .catch(err => { errorMsg.innerText = "Email ou mot de passe incorrect."; errorMsg.style.display = 'block'; });
        }
    };
</script>

</body>
</html>
