<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espace Pro - Cœur de Marché</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4 m-0 font-sans">

    <div class="bg-white rounded-[40px] p-8 w-full max-w-[400px] shadow-2xl border-t-[10px] border-[#f97316]">
        <div class="text-center mb-6">
            <img src="1769121566036.png" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-gray-100 shadow-md">
            <h1 id="titre" class="text-2xl font-black text-[#4c1d95] uppercase">Connexion</h1>
        </div>

        <div class="space-y-3">
            <div id="zoneExtra" style="display: none;">
                <input type="text" id="nomB" placeholder="NOM DE LA BOUTIQUE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm mb-2 outline-none">
                <input type="text" id="nomP" placeholder="NOM DU PROPRIÉTAIRE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm mb-2 outline-none">
            </div>

            <input type="email" id="email" placeholder="VOTRE EMAIL" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm outline-none">
            <input type="password" id="pass" placeholder="MOT DE PASSE" class="w-full p-4 rounded-2xl bg-gray-100 border-none font-bold text-sm outline-none">

            <button onclick="lancerAction()" id="btnP" class="w-full bg-[#4c1d95] text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-4">
                Accéder au bureau
            </button>

            <div class="text-center mt-6">
                <button type="button" onclick="basculer()" id="btnS" class="text-[#f97316] font-black text-[11px] uppercase p-4 w-full text-center bg-transparent border-none">
                    Pas encore de boutique ? Créer mon espace
                </button>
            </div>
        </div>
        <p id="message" class="text-center text-[10px] font-black mt-4 uppercase text-red-600"></p>
    </div>

    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isRegister = false;

        function basculer() {
            isRegister = !isRegister;
            const extra = document.getElementById('zoneExtra');
            const titre = document.getElementById('titre');
            const btnP = document.getElementById('btnP');
            const btnS = document.getElementById('btnS');

            if(isRegister) {
                extra.style.display = 'block';
                titre.innerText = "Création Boutique";
                btnP.innerText = "Ouvrir ma boutique";
                btnP.style.backgroundColor = "#f97316";
                btnS.innerText = "Déjà inscrit ? Se connecter";
            } else {
                extra.style.display = 'none';
                titre.innerText = "Connexion";
                btnP.innerText = "Accéder au bureau";
                btnP.style.backgroundColor = "#4c1d95";
                btnS.innerText = "Pas encore de boutique ? Créer mon espace";
            }
        }

        async function lancerAction() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btnP');

            if(!email || !pass) { alert("Veuillez remplir Email et Mot de passe !"); return; }

            btn.disabled = true;
            btn.innerText = "TRAITEMENT...";

            try {
                if(isRegister) {
                    const { data, error } = await supabase.auth.signUp({ 
                        email: email, 
                        password: pass 
                    });
                    if(error) throw error;
                    alert("✅ Boutique créée ! Connectez-vous maintenant.");
                    basculer(); 
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ 
                        email: email, 
                        password: pass 
                    });
                    if(error) throw error;
                    window.location.href = "bureau.html";
                }
            } catch (err) {
                alert("❌ ERREUR : " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = isRegister ? "Ouvrir ma boutique" : "Accéder au bureau";
            }
        }
    </script>
</body>
</html>
