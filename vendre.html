<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendre - Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-cdm-purple { background-color: #5b21b6; }
        .text-cdm-purple { color: #5b21b6; }
        .bg-cdm-orange { background-color: #f97316; }
        .text-cdm-orange { color: #f97316; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-cdm-purple min-h-screen flex items-center justify-center p-6 pb-20 relative overflow-x-hidden">

    <div class="w-full max-w-md bg-white rounded-[40px] shadow-2xl p-10 border border-gray-100 relative z-10 fade-in">
        
        <div class="text-center mb-10">
            <div class="inline-block p-1 bg-white rounded-full mb-6 shadow-2xl transform rotate-3 border-4 border-cdm-orange">
                <img src="1769121566036.png" class="w-24 h-24 rounded-full" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
            </div>
            <h1 class="text-[32px] font-black tracking-tighter italic uppercase text-cdm-purple leading-none mb-1">COEUR DE MARCHE</h1>
            <p class="text-cdm-orange font-bold text-xs italic tracking-widest uppercase mb-4">Bouaflé - Marahoué</p>
            <div class="w-16 h-1 bg-cdm-orange mx-auto rounded-full mb-6"></div>
            <p class="text-gray-500 font-bold text-sm" id="form-titre">Espace Vendeur : Connectez-vous</p>
        </div>

        <div class="space-y-4">
            <div id="extra-fields" class="hidden space-y-4">
                <div class="relative">
                    <i class="fas fa-store absolute left-4 top-1/2 -translate-y-1/2 text-cdm-purple"></i>
                    <input type="text" id="nomB" placeholder="Nom de votre boutique" class="w-full p-4 pl-12 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cdm-orange font-bold text-sm">
                </div>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-cdm-purple"></i>
                    <input type="text" id="nomP" placeholder="Votre nom complet" class="w-full p-4 pl-12 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cdm-orange font-bold text-sm">
                </div>
                <div class="relative">
                    <i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-cdm-purple"></i>
                    <input type="tel" id="telephone" placeholder="Numéro WhatsApp (ex: 225...)" class="w-full p-4 pl-12 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cdm-orange font-bold text-sm">
                </div>
            </div>

            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-cdm-purple"></i>
                <input type="email" id="email" placeholder="Email de connexion" class="w-full p-4 pl-12 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cdm-orange font-bold text-sm">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-cdm-purple"></i>
                <input type="password" id="password" placeholder="Mot de passe" class="w-full p-4 pl-12 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cdm-orange font-bold text-sm">
            </div>
            
            <button id="btnAction" class="w-full bg-cdm-orange text-white font-black py-4 rounded-full shadow-lg hover:bg-orange-600 transition transform active:scale-95 uppercase text-xs tracking-widest mt-6">
                Se connecter
            </button>
        </div>

        <div class="mt-10 flex justify-center gap-6 border-t border-gray-100 pt-6">
            <button id="switchConnexion" class="text-cdm-purple font-black text-xs uppercase border-b-2 border-cdm-orange pb-1 tracking-wider">Connexion</button>
            <button id="switchInscription" class="text-gray-400 font-black text-xs uppercase pb-1 tracking-wider">Créer ma boutique</button>
        </div>
        
        <div class="mt-8 text-center bg-gray-50 rounded-full p-2">
            <a href="index.html" class="text-cdm-purple font-bold text-xs uppercase italic"><i class="fas fa-arrow-left mr-2"></i>Retour au marché de Bouaflé</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const btnAction = document.getElementById('btnAction');
        const extraFields = document.getElementById('extra-fields');
        const formTitre = document.getElementById('form-titre'); // Correction effectuée ici
        const switchConnexion = document.getElementById('switchConnexion');
        const switchInscription = document.getElementById('switchInscription');

        let isSignup = false;

        // Fonction pour passer en mode INSCRIPTION
        switchInscription.onclick = () => {
            isSignup = true;
            extraFields.classList.remove('hidden');
            formTitre.innerText = "Créez votre boutique en 1 minute";
            btnAction.innerText = "Créer ma boutique";
            switchInscription.classList.add('text-cdm-purple', 'border-b-2', 'border-cdm-orange');
            switchInscription.classList.remove('text-gray-400');
            switchConnexion.classList.remove('text-cdm-purple', 'border-b-2', 'border-cdm-orange');
            switchConnexion.classList.add('text-gray-400');
        };

        // Fonction pour passer en mode CONNEXION
        switchConnexion.onclick = () => {
            isSignup = false;
            extraFields.classList.add('hidden');
            formTitre.innerText = "Espace Vendeur : Connectez-vous";
            btnAction.innerText = "Se connecter";
            switchConnexion.classList.add('text-cdm-purple', 'border-b-2', 'border-cdm-orange');
            switchConnexion.classList.remove('text-gray-400');
            switchInscription.classList.remove('text-cdm-purple', 'border-b-2', 'border-cdm-orange');
            switchInscription.classList.add('text-gray-400');
        };

        // Action du bouton principal (Connexion ou Inscription)
        btnAction.onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("Email et mot de passe requis.");

            btnAction.innerText = "Chargement...";

            if (isSignup) {
                const nomB = document.getElementById('nomB').value;
                const nomP = document.getElementById('nomP').value;
                const telephone = document.getElementById('telephone').value;

                if (!nomB || !nomP || !telephone) {
                    btnAction.innerText = "Créer ma boutique";
                    return alert("Tous les champs sont requis.");
                }
                
                const { error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { shop_name: nomB, full_name: nomP, telephone: telephone } }
                });

                if (error) {
                    btnAction.innerText = "Créer ma boutique";
                    alert("Erreur : " + error.message);
                } else {
                    alert("Succès ! Vous pouvez maintenant vous connecter.");
                    switchConnexion.click();
                }
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    btnAction.innerText = "Se connecter";
                    alert("Identifiants incorrects.");
                } else {
                    // Redirection vers le bureau
                    window.location.href = "bureau.html";
                }
            }
        };
    </script>
</body>
</html>
