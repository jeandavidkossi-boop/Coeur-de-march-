<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coeur de Marche Bouafle</title>
    <link rel="canonical" href="https://jeandavidkossi-boop.github.io/Coeur-de-march-/">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4c1d95">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee-container { background: #6b21a8; color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 700; border-bottom: 2px solid #f97316; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #modalZoom img { max-width: 90%; max-height: 80vh; border-radius: 15px; border: 3px solid white; }
        .btn-action-call { background: #f97316; color: white; width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-action-order { background: #22c55e; color: white; padding: 0 15px; height: 42px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; flex: 1; }
        .bubble-cat { min-width: 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .bubble-icon { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #f3f4f6; color: #6b21a8; font-size: 18px; }
    </style>
</head>
<body class="pb-32 text-gray-900">
    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>
    <div id="modalPanier" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 16px;">
        <div class="bg-white w-full max-w-md rounded-[30px] overflow-hidden flex flex-col max-h-[80vh]">
            <div class="bg-purple-900 p-6 text-white flex justify-between items-center text-sm font-black italic">
                <span>MON PANIER</span><button onclick="fermerPanier()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="contenuPanier" class="p-6 overflow-y-auto flex-1 space-y-4"></div>
            <div class="p-6 border-t border-gray-100 bg-gray-50">
                <div class="flex justify-between items-center mb-4 text-purple-900 font-black"><span class="text-[10px]">TOTAL</span><span id="totalPanier" class="text-xl">0 F</span></div>
                <button onclick="envoyerPanierWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-3"><i class="fab fa-whatsapp text-lg"></i> Envoyer commande</button>
            </div>
        </div>
    </div>
    <header class="bg-purple-900 pt-8 rounded-b-[40px] shadow-2xl text-center">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-2 flex items-center justify-center border-2 border-orange-100 overflow-hidden"><img src="1769121566036.png" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=CMB'"></div>
        <h1 class="text-white text-xl font-black uppercase italic tracking-wider">Coeur de Marche</h1>
        <p class="text-orange-400 text-[8px] font-bold uppercase italic mb-4">Bouafle - Marahoue</p>
        <div class="marquee-container"><span class="marquee-text" id="texteBandeAnnonce">Initialisation...</span></div>
    </header>
    <section id="accueil" class="active px-4 mt-6">
        <div class="bg-white p-5 rounded-[30px] shadow-xl border border-gray-100 mb-4 flex gap-2"><input type="text" id="inputRecherche" onkeyup="if(event.key==='Enter') rechercherProduit()" placeholder="Rechercher..." class="flex-1 bg-gray-100 border-none rounded-xl py-3 px-4 text-[10px] outline-none"><button onclick="lancerMicro()" class="bg-purple-900 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-microphone" id="iconMicro"></i></button></div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-8 px-2 py-2">
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Vivrier')"><div class="bubble-icon"><i class="fas fa-leaf"></i></div><span class="text-[7px] font-black uppercase">Vivrier</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Beaute')"><div class="bubble-icon"><i class="fas fa-magic"></i></div><span class="text-[7px] font-black uppercase">Beaute</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Resto')"><div class="bubble-icon"><i class="fas fa-utensils"></i></div><span class="text-[7px] font-black uppercase">Resto</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Mode')"><div class="bubble-icon"><i class="fas fa-tshirt"></i></div><span class="text-[7px] font-black uppercase">Mode</span></div>
        </div>
        <div class="mb-8"><h3 class="text-purple-900 font-black text-[10px] uppercase mb-3 px-2 flex items-center gap-2"><i class="fas fa-fire text-orange-500"></i> A la Une</h3><div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1"></div></div>
    </section>
    <section id="boutique" class="px-4 mt-8">
        <div id="vue-rayons">
            <h2 class="text-purple-900 font-black text-xl mb-6 uppercase italic text-center underline decoration-orange-500 underline-offset-4">Nos Marches</h2>
            <div class="grid grid-cols-2 gap-3 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors text-orange-600 mb-2"></i><p class="text-[8px] font-black uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beaute')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-magic text-pink-600 mb-2"></i><p class="text-[8px] font-black uppercase">Beaute</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-leaf text-green-600 mb-2"></i><p class="text-[8px] font-black uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt text-blue-600 mb-2"></i><p class="text-[8px] font-black uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-red-500 flex flex-col items-center"><i class="fas fa-shopping-basket text-red-600 mb-2"></i><p class="text-[8px] font-black uppercase">Alimentation</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-400 flex flex-col items-center"><i class="fas fa-utensils text-orange-400 mb-2"></i><p class="text-[8px] font-black uppercase">Resto</p></button>
                <button onclick="ouvrirRayon('Electromenager')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-gray-500 flex flex-col items-center"><i class="fas fa-plug text-gray-600 mb-2"></i><p class="text-[8px] font-black uppercase">Electro.</p></button>
                <button onclick="ouvrirRayon('Electronique')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-indigo-500 flex flex-col items-center"><i class="fas fa-laptop text-indigo-600 mb-2"></i><p class="text-[8px] font-black uppercase">Electronique</p></button>
                <button onclick="ouvrirRayon('Sante')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-red-400 flex flex-col items-center"><i class="fas fa-heartbeat text-red-400 mb-2"></i><p class="text-[8px] font-black uppercase">Sante</p></button>
                <button onclick="ouvrirRayon('Immobilier')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-yellow-800 flex flex-col items-center"><i class="fas fa-home text-yellow-800 mb-2"></i><p class="text-[8px] font-black uppercase">Immo.</p></button>
                <button onclick="ouvrirRayon('Agricole')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-green-700 flex flex-col items-center"><i class="fas fa-tractor text-green-700 mb-2"></i><p class="text-[8px] font-black uppercase">Agricole</p></button>
                <button onclick="ouvrirRayon('Elevage')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-900 flex flex-col items-center"><i class="fas fa-paw text-orange-900 mb-2"></i><p class="text-[8px] font-black uppercase">Elevage</p></button>
                <button onclick="ouvrirRayon('Transport')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-600 flex flex-col items-center"><i class="fas fa-motorcycle text-blue-600 mb-2"></i><p class="text-[8px] font-black uppercase">Transport</p></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-purple-500 flex flex-col items-center"><i class="fas fa-concierge-bell text-purple-500 mb-2"></i><p class="text-[8px] font-black uppercase">Services</p></button>
            </div>
        </div>
        <div id="vue-produits" class="hidden">
            <button onclick="retourRayons()" class="mb-4 text-orange-600 font-black text-[10px] uppercase flex items-center gap-2"><i class="fas fa-chevron-left"></i> Retour</button>
            <p id="compteur-articles" class="text-[8px] font-bold text-gray-400 mb-2 px-2 italic"></p>
            <div id="liste-produits" class="space-y-4"></div>
        </div>
    </section>
    <button id="btn-panier-flottant" onclick="ouvrirPanier()" class="hidden fixed bottom-24 right-6 bg-orange-600 text-white p-4 rounded-full shadow-2xl z-[60] animate-bounce"><i class="fas fa-shopping-basket text-xl"></i><span id="count-panier" class="absolute -top-1 -right-1 bg-white text-orange-600 w-5 h-5 rounded-full flex items-center justify-center font-black text-[10px]">0</span></button>
    <nav class="fixed bottom-6 left-6 right-6 bg-white rounded-full shadow-2xl p-3 flex justify-around items-center z-50 border border-gray-100">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-600 flex flex-col items-center"><i class="fas fa-home text-lg"></i><span class="text-[7px] font-black uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-gray-400 flex flex-col items-center"><i class="fas fa-store text-lg"></i><span class="text-[7px] font-black uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center -mt-12 border-4 border-white shadow-lg"><i class="fab fa-whatsapp text-xl"></i></a>
    </nav>
    <script>
        /* Le reste du script reste inchangé */
    </script>
</body>
    </html>
