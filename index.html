<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coeur de Marché Bouaflé</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fd; overflow-x: hidden; }
        .header-bg { background-color: #5b21b6; padding-bottom: 25px; }
        .scrolling-banner { background-color: #ffedd5; color: #d97706; font-size: 11px; font-weight: 900; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .scrolling-banner p { display: inline-block; animation: defilement 15s linear infinite; }
        @keyframes defilement { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .search-container { margin-top: 0; position: relative; z-index: 50; padding: 0 24px; }
        .search-box { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 6px; display: flex; align-items: center; }
        .mic-btn { background-color: #5b21b6; color: white; width: 45px; height: 45px; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .price-badge { background-color: #f97316; color: white; position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 900; z-index: 10; box-shadow: 0 4px 10px rgba(249,115,22,0.3); }
        .btn-ajouter { background-color: #5b21b6; color: white; width: 100%; padding: 12px 0; border-radius: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; margin-top: 8px; }
        .nav-bar { background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .active-nav { color: #f97316 !important; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 20px; }
        .nav-text { font-size: 9px; font-weight: 900; text-transform: capitalize; margin-top: 4px; }
        .wa-btn { background: #22c55e; width: 65px; height: 65px; border-radius: 50%; border: 6px solid #f8f9fd; margin-top: -35px; display: flex; justify-content: center; align-items: center; color: white; font-size: 28px; box-shadow: 0 10px 20px rgba(34,197,94,0.3); }
        #panier-flottant { transition: all 0.4s ease; transform: translateY(150px); opacity: 0; }
        #panier-flottant.show { transform: translateY(0); opacity: 1; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-content { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active { opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        #ecran-chargement { position: fixed; inset: 0; background-color: #f8f9fd; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e5e7eb; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">
    <div id="ecran-chargement"><div class="spinner mb-6"></div><p class="font-black text-[#5b21b6] text-sm uppercase animate-pulse">Chargement...</p></div>

    <header class="header-bg text-center pt-8 px-6 relative">
        <div class="inline-block p-1 bg-white rounded-2xl mb-3"><img src="1769121566036.png" class="w-16 h-16 rounded-xl"></div>
        <h1 class="text-white text-[26px] font-black italic uppercase tracking-tighter leading-none">COEUR DE MARCHE</h1>
        <p class="text-orange-400 font-bold text-[10px] italic tracking-widest uppercase">Bouaflé</p>
    </header>

    <div class="scrolling-banner"><p id="texte-annonce">Bienvenue sur le marché officiel de Bouaflé !</p></div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="inputRecherche" onkeyup="rechercherProduit()" placeholder="Rechercher..." class="w-full p-4 bg-transparent outline-none font-bold text-sm">
            <button onclick="lancerMicro()" class="mic-btn"><i id="iconMicro" class="fas fa-microphone"></i></button>
        </div>
    </div>

    <div id="vue-accueil">
        <div class="px-6 mt-6">
            <h2 class="font-black text-[#4c1d95] text-[11px] mb-3 uppercase tracking-widest">
                <i class="fas fa-crown text-yellow-500"></i> Boutiques Officielles
            </h2>
            <div id="avenue-boutiques-vip" class="flex gap-4 overflow-x-auto hide-scroll py-2" style="scroll-behavior: smooth;"></div>
        </div>

        <div class="flex justify-between px-8 mt-6">
            <button onclick="filtrerAccueil('Vivrier')" class="flex flex-col items-center"><div class="w-16 h-16 bg-[#ffedd5] rounded-2xl flex items-center justify-center text-[#d97706] text-2xl shadow-sm"><i class="fas fa-carrot"></i></div><span class="text-[9px] font-black uppercase text-gray-600">Vivrier</span></button>
            <button onclick="filtrerAccueil('Beauté')" class="flex flex-col items-center"><div class="w-16 h-16 bg-[#fce7f3] rounded-2xl flex items-center justify-center text-[#db2777] text-2xl shadow-sm"><i class="fas fa-magic"></i></div><span class="text-[9px] font-black uppercase text-gray-600">Beauté</span></button>
            <button onclick="filtrerAccueil('Alimentation')" class="flex flex-col items-center"><div class="w-16 h-16 bg-[#e0e7ff] rounded-2xl flex items-center justify-center text-[#4f46e5] text-2xl shadow-sm"><i class="fas fa-shopping-bag"></i></div><span class="text-[9px] font-black uppercase text-gray-600">Superette</span></button>
            <button onclick="filtrerAccueil('Habillement')" class="flex flex-col items-center"><div class="w-16 h-16 bg-[#dcfce7] rounded-2xl flex items-center justify-center text-[#16a34a] text-2xl shadow-sm"><i class="fas fa-tshirt"></i></div><span class="text-[9px] font-black uppercase text-gray-600">Mode</span></button>
        </div>
    </div>
        <div id="vue-boutique" class="hidden mt-8 px-6">
        <div id="liste-boutique" class="grid grid-cols-2 gap-4 pb-10"></div>
    </div>

    <div id="panier-flottant" onclick="ouvrirPanier()" class="fixed bottom-24 right-6 bg-[#5b21b6] text-white p-4 rounded-full shadow-2xl flex items-center gap-3 z-50">
        <i class="fas fa-shopping-cart text-xl"></i>
        <div class="flex flex-col"><span class="text-[9px] font-bold uppercase">Mon Panier</span><span id="panier-count" class="font-black text-sm">0 article</span></div>
    </div>

    <div id="modal-panier" class="modal-overlay" onclick="fermerPanier()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-xl text-[#5b21b6] uppercase">Mon Panier</h2>
                <button onclick="fermerPanier()" class="text-gray-400 text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="panier-liste" class="space-y-4 mb-6"></div>
            <div class="flex justify-between items-center pt-4 border-t border-gray-100 mb-6">
                <span class="font-black text-gray-400 text-xs uppercase">Total Global</span>
                <span id="panier-total" class="font-black text-xl text-orange-600">0 FCFA</span>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button onclick="changerVue('accueil')" id="nav-accueil" class="nav-item active-nav"><i class="fas fa-home"></i><span class="nav-text">Accueil</span></button>
        <button onclick="changerVue('boutique')" id="nav-boutique" class="nav-item"><i class="fas fa-store-alt"></i><span class="nav-text">Marché</span></button>
        <button onclick="window.open('https://wa.me/2250576326645')" class="wa-btn"><i class="fab fa-whatsapp"></i></button>
        <a href="vendre.html" class="nav-item"><i class="fas fa-store"></i><span class="nav-text">Vendre</span></a>
        <button onclick="ouvrirAide()" class="nav-item"><i class="fas fa-question-circle"></i><span class="nav-text">Aide</span></button>
    </nav>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let articles = []; let panier = [];
        const dbUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(dbUrl, dbKey);

        async function init() {
            const { data: produitsData } = await supabase.from('produits').select('*').eq('statut', 'actif').order('dateajout', { ascending: false });
            if (produitsData) articles = produitsData;

            // MOTEUR VIP RÉPARÉ POUR LIER AU VENDEUR
            const { data: vendeursVip } = await supabase.from('vendeurs').select('*').eq('abonnement', 'vip');
            const conteneurBoutiques = document.getElementById('avenue-boutiques-vip');
            if (conteneurBoutiques && vendeursVip) {
                conteneurBoutiques.innerHTML = vendeursVip.map(v => {
                    const initiale = v.nom_boutique.substring(0, 1).toUpperCase();
                    const tel = v.whatsapp || v.telephone || '';
                    return `<div onclick="filtrerBoutiqueVIP('${tel}', '${v.nom_boutique.replace(/'/g, "\\'")}')" class="flex-shrink-0 flex flex-col items-center gap-1 cursor-pointer w-16">
                        <div class="w-14 h-14 rounded-full border-2 border-orange-500 p-0.5 shadow-md">
                            <div class="w-full h-full rounded-full bg-[#4c1d95] flex items-center justify-center text-white font-black text-xl">${initiale}</div>
                        </div>
                        <span class="text-[8px] font-black uppercase text-gray-700 truncate w-full text-center">${v.nom_boutique}</span>
                    </div>`;
                }).join('');
            }
            document.getElementById('ecran-chargement').style.display = 'none';
        }

        // NOUVELLE FONCTION POUR AFFICHER LES ARTICLES DE NINA
        function filtrerBoutiqueVIP(tel, nom) {
            document.getElementById('inputRecherche').value = nom;
            const shopArticles = articles.filter(a => String(a.vendeur) === String(tel));
            changerVue('boutique');
            afficherProduits(shopArticles, 'liste-boutique');
            setTimeout(() => { document.getElementById('liste-boutique').scrollIntoView({behavior: 'smooth'}); }, 300);
        }
                function afficherProduits(liste, target) {
            const container = document.getElementById(target);
            if (liste.length === 0) { container.innerHTML = '<p class="text-center py-10 font-bold text-gray-400">Aucun article</p>'; return; }
            container.innerHTML = liste.map(p => `
                <div class="bg-white rounded-[20px] shadow-sm overflow-hidden flex flex-col relative border border-gray-100">
                    <div class="price-badge">${p.prix} F</div>
                    <img src="${p.image}" onclick="ouvrirDetails('${p.nom.replace(/'/g, "\\'")}')" class="w-full h-36 object-cover">
                    <div class="px-3 pt-3 flex-1 flex flex-col text-center">
                        <h3 class="font-black text-[#4c1d95] text-[11px] uppercase truncate">${p.nom}</h3>
                        <button onclick="ajouterAuPanier('${p.nom.replace(/'/g, "\\'")}', ${p.prix}, '${p.vendeur}')" class="btn-ajouter transition">Ajouter</button>
                    </div>
                </div>`).join('');
        }

        function ouvrirPanier() {
            const container = document.getElementById('panier-liste');
            const totalElt = document.getElementById('panier-total');
            if (panier.length === 0) { container.innerHTML = '<p class="text-center py-6 font-bold">Panier vide</p>'; totalElt.innerText = "0 F"; }
            else {
                let total = 0;
                container.innerHTML = panier.map((p, i) => { 
                    total += parseInt(p.prix);
                    return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                        <div class="flex-1 pr-4"><p class="font-black text-[10px] uppercase truncate">${p.nom}</p><p class="text-orange-500 font-bold text-xs">${p.prix} F</p></div>
                        <button onclick="retirer(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>`;
                }).join('');
                totalElt.innerText = total + " FCFA";
            }
            const modal = document.getElementById('modal-panier'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('active'), 10);
        }

        function ajouterAuPanier(nom, prix, tel) {
            panier.push({nom, prix, tel}); 
            document.getElementById('panier-count').innerText = panier.length + " article(s)";
            document.getElementById('panier-flottant').classList.add('show');
        }

        function fermerPanier() { document.getElementById('modal-panier').classList.remove('active'); setTimeout(() => { document.getElementById('modal-panier').style.display = 'none'; }, 300); }
        function changerVue(v) { document.getElementById('vue-accueil').classList.add('hidden'); document.getElementById('vue-boutique').classList.add('hidden'); document.getElementById(`vue-${v}`).classList.remove('hidden'); }
        
        init();
    </script>
</body>
</html>
