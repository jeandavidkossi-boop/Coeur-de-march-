<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur de Marché Bouaflé</title>
    
    <link rel="canonical" href="https://jeandavidkossi-boop.github.io/Coeur-de-march-/">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4c1d95">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .marquee-container { background: #6b21a8; color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid #f97316; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        #modalZoom img { max-width: 90%; max-height: 80vh; border-radius: 15px; border: 3px solid white; }
        
        .btn-action-call { background: #f97316; color: white; width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-action-share { background: #6b21a8; color: white; width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-action-order { background: #22c55e; color: white; padding: 0 15px; height: 42px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .stars-gold { color: #fbbf24; font-size: 8px; }
        .scroll-categories { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; scroll-behavior: smooth; }
        .cat-pill { white-space: nowrap; background: white; padding: 6px 15px; border-radius: 20px; font-size: 8px; font-weight: 900; text-transform: uppercase; border: 1px solid #e5e7eb; color: #6b21a8; transition: all 0.2s; }
        .cat-pill.active { background: #6b21a8; color: white; border-color: #6b21a8; }
    </style>
</head>
<body class="pb-32 text-gray-900">

    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>

    <header class="bg-purple-900 pt-8 rounded-b-[40px] shadow-2xl text-center">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-2 flex items-center justify-center border-2 border-orange-100 shadow-lg">
            <img src="IMG-20260115-WA0005.jpg" alt="Logo" class="w-full h-full object-contain">
        </div>
        <h1 class="text-white text-xl font-black uppercase italic tracking-wider">Cœur de Marché</h1>
        <p class="text-orange-400 text-[8px] font-bold tracking-widest uppercase italic mb-4">Bouaflé • Marahoué</p>
        <div class="marquee-container">
            <span class="marquee-text" id="texteBandeAnnonce">Chargement des meilleures offres...</span>
        </div>
    </header>

    <section id="accueil" class="active px-4 mt-6">
        <div class="bg-white p-5 rounded-[30px] shadow-xl border border-gray-50 mb-6 text-center">
            <div class="flex gap-2">
                <input type="text" id="inputRecherche" onkeyup="if(event.key==='Enter') rechercherProduit()" placeholder="Rechercher un article..." class="flex-1 bg-gray-100 border-none rounded-xl py-3 px-4 text-[10px] outline-none">
                <button onclick="lancerMicro()" class="bg-purple-900 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-microphone" id="iconMicro"></i></button>
            </div>
        </div>
        <div class="mb-8">
            <h3 class="text-purple-900 font-black text-[10px] uppercase mb-3 px-2 flex items-center gap-2"><i class="fas fa-fire text-orange-500"></i> À la Une</h3>
            <div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1"></div>
        </div>
    </section>

    <section id="boutique" class="px-4 mt-8">
        <div id="vue-rayons">
            <h2 class="text-purple-900 font-black text-xl mb-6 uppercase italic text-center underline decoration-orange-500 underline-offset-4">Nos Marchés</h2>
            <div class="grid grid-cols-2 gap-3 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors text-orange-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beauté')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-magic text-pink-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Beauté</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-leaf text-green-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt text-blue-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-red-500 flex flex-col items-center"><i class="fas fa-shopping-basket text-red-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Alimentation</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-400 flex flex-col items-center"><i class="fas fa-utensils text-orange-400 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Resto</p></button>
                <button onclick="ouvrirRayon('Electroménager')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-gray-500 flex flex-col items-center"><i class="fas fa-plug text-gray-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Electroménager</p></button>
                <button onclick="ouvrirRayon('Electronique')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-indigo-500 flex flex-col items-center"><i class="fas fa-laptop text-indigo-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Electronique</p></button>
                
                <button onclick="ouvrirRayon('Santé')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-red-400 flex flex-col items-center"><i class="fas fa-heartbeat text-red-400 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Santé</p></button>
                <button onclick="ouvrirRayon('Immobilier')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-yellow-800 flex flex-col items-center"><i class="fas fa-home text-yellow-800 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Immobilier</p></button>
                <button onclick="ouvrirRayon('Agricole')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-green-700 flex flex-col items-center"><i class="fas fa-tractor text-green-700 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Agricole</p></button>
                <button onclick="ouvrirRayon('Élevage')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-orange-900 flex flex-col items-center"><i class="fas fa-paw text-orange-900 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Élevage</p></button>
                <button onclick="ouvrirRayon('Transport')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-blue-600 flex flex-col items-center"><i class="fas fa-motorcycle text-blue-600 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Transport</p></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-4 rounded-3xl shadow-lg border-b-4 border-purple-500 flex flex-col items-center"><i class="fas fa-concierge-bell text-purple-500 text-xl mb-2"></i><p class="text-[8px] font-black uppercase">Services</p></button>
            </div>
        </div>

        <div id="vue-produits" class="hidden">
            <button onclick="retourRayons()" class="mb-4 text-orange-600 font-black text-[10px] uppercase flex items-center gap-2"><i class="fas fa-chevron-left"></i> Retour aux marchés</button>
            <p id="compteur-articles" class="text-[8px] font-bold text-gray-400 mb-2 px-2 italic"></p>
            <div id="liste-produits" class="space-y-4"></div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 bg-white rounded-full shadow-2xl p-3 flex justify-around items-center z-50 border border-gray-100">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-600 flex flex-col items-center"><i class="fas fa-home text-lg"></i><span class="text-[7px] font-black uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-gray-400 flex flex-col items-center"><i class="fas fa-store text-lg"></i><span class="text-[7px] font-black uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center -mt-12 border-4 border-white shadow-lg"><i class="fab fa-whatsapp text-xl"></i></a>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbx6OPL8H6X_KVsCWwIZjXPWMzSdxVnS01b56bx36O5m3XWf1z_YGgJgDBx3I98PExc/exec";
        const appLink = "https://jeandavidkossi-boop.github.io/Coeur-de-march-/";
        let articles = [];

        async function chargerDonnees() {
            try {
                const reponse = await fetch(urlScript);
                articles = await reponse.json();
                const annonce = articles.find(p => String(p.nom).toUpperCase() === "ANNONCE");
                if(annonce) document.getElementById('texteBandeAnnonce').innerText = annonce.description;
                const certifiés = articles.filter(p => String(p.certifie).toUpperCase() === "OUI" && String(p.statut).toUpperCase() === "OK");
                document.getElementById('carrousel-une').innerHTML = certifiés.map(p => `
                    <div class="min-w-[130px] bg-white rounded-2xl shadow-md overflow-hidden flex flex-col border border-gray-50">
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-full h-24 object-cover">
                        <div class="p-2 flex flex-col flex-1 justify-between">
                            <h4 class="text-purple-900 text-[8px] font-black uppercase truncate mb-1">${p.nom}</h4>
                            <a href="https://wa.me/2250576326645?text=Je commande l'article à la UNE : ${encodeURIComponent(p.nom)}" 
                               class="bg-green-500 text-white text-[7px] font-black py-1.5 rounded-lg text-center uppercase shadow-sm">Commander</a>
                        </div>
                    </div>`).join('');
            } catch (e) { console.error("Erreur de chargement", e); }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-accueil').className = id === 'accueil' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
            document.getElementById('btn-boutique').className = id === 'boutique' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
        }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtrés = articles.filter(p => String(p.rayon).trim().toLowerCase() === nomRayon.toLowerCase() && String(p.statut).toUpperCase() === "OK");
            document.getElementById('compteur-articles').innerText = filtrés.length + " article(s) trouvé(s)";
            document.getElementById('liste-produits').innerHTML = filtrés.map(p => {
                const shareMsg = encodeURIComponent(`Vu sur Cœur de Marché Bouaflé !\n🛍️ *${p.nom}*\n💰 ${p.prix} FCFA\n📍 ${p.quartier || 'Bouaflé'}\n🔗 ${appLink}`);
                return `
                <div class="bg-white rounded-[25px] shadow-md p-4 border border-gray-50">
                    <div class="flex gap-4 mb-4">
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-24 h-24 rounded-2xl object-cover shadow-sm">
                        <div class="flex-1">
                            <div class="stars-gold mb-1"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                            <h4 class="font-black uppercase text-purple-900 text-[10px] mb-1">${p.nom}</h4>
                            <p class="text-orange-600 font-black text-sm">${p.prix} FCFA</p>
                            <p class="text-gray-500 text-[7px] mt-1 italic leading-tight">${p.description || ''}</p>
                            <p class="text-blue-600 text-[7px] font-bold uppercase mt-1"><i class="fas fa-map-marker-alt"></i> ${p.quartier || 'Bouaflé'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${p.telephone}" class="btn-action-call"><i class="fas fa-phone-alt"></i></a>
                        <a href="https://wa.me/?text=${shareMsg}" class="btn-action-share"><i class="fas fa-share-alt"></i></a>
                        <a href="https://wa.me/2250576326645?text=Je commande l'article : ${encodeURIComponent(p.nom)}" class="btn-action-order">COMMANDER</a>
                    </div>
                </div>`;
            }).join('');
            window.scrollTo(0,0);
        }

        function retourRayons() {
            document.getElementById('vue-rayons').classList.remove('hidden');
            document.getElementById('vue-produits').classList.add('hidden');
        }

        function rechercherProduit() {
            const saisie = document.getElementById('inputRecherche').value.toLowerCase();
            if (saisie.length > 1) {
                switchTab('boutique');
                document.getElementById('vue-rayons').classList.add('hidden');
                document.getElementById('vue-produits').classList.remove('hidden');
                const filtrés = articles.filter(p => p.nom.toLowerCase().includes(saisie) && String(p.statut).toUpperCase() === "OK");
                document.getElementById('liste-produits').innerHTML = filtrés.map(p => `
                    <div class="bg-white rounded-2xl shadow p-3 flex items-center gap-3">
                        <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1">
                            <h4 class="font-black uppercase text-purple-900 text-[8px]">${p.nom}</h4>
                            <p class="text-orange-600 font-black text-[10px]">${p.prix} FCFA</p>
                        </div>
                        <a href="https://wa.me/2250576326645?text=Je commande : ${encodeURIComponent(p.nom)}" class="bg-green-500 text-white text-[8px] font-black px-3 py-2 rounded-lg uppercase">Commander</a>
                    </div>`).join('');
            }
        }

        function lancerMicro() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech(); rec.lang = 'fr-FR';
            const icon = document.getElementById('iconMicro');
            rec.onstart = () => icon.className = "fas fa-spinner fa-spin text-red-500";
            rec.onresult = (e) => { document.getElementById('inputRecherche').value = e.results[0][0].transcript; rechercherProduit(); };
            rec.onend = () => icon.className = "fas fa-microphone";
            rec.start();
        }

        function zoom(src) { document.getElementById('imgZoomed').src = src; document.getElementById('modalZoom').style.display = 'flex'; }

        // Ajout du Service Worker sans modifier tes fonctions
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(e => console.error(e));
            });
        }

        window.onload = chargerDonnees;
    </script>
</body>
                                                                                                                                                           </html>
