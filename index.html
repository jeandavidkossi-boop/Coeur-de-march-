<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb; 
        }
        /* Gestion de l'affichage des sections */
        section { 
            display: none; 
        }
        section.active { 
            display: block; 
            animation: fadeIn 0.4s; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        /* Cacher la barre de défilement pour le carrousel */
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        /* Conteneur pour les vidéos YouTube */
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 20px; 
            width: 100%; 
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }
    </style>
</head>
<body class="pb-32 text-gray-900">

    <header class="bg-purple-900 pt-8 pb-12 rounded-b-[50px] shadow-2xl text-center border-b-4 border-orange-500">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-2 flex items-center justify-center border-2 border-orange-100 shadow-lg">
            <img src="IMG-20260115-WA0005.jpg" alt="Logo" class="w-full h-full object-contain">
        </div>
        <h1 class="text-white text-xl font-black uppercase italic tracking-wider">Cœur de Marché</h1>
        <p class="text-orange-400 text-[8px] font-bold tracking-widest uppercase">Bouaflé • Marahoué</p>
    </header>

    <section id="accueil" class="active px-4 -mt-8">
        <div class="bg-white p-5 rounded-[35px] shadow-xl border border-gray-100 mb-6 relative z-10 text-center">
            <h2 class="text-purple-900 font-black text-[11px] uppercase italic mb-1">Bienvenue chers Clients !</h2>
            <p class="text-gray-400 text-[8px] mb-3 font-medium">Trouvez tout ce qu'il vous faut à Bouaflé en un clic.</p>
            
            <div class="border-t border-gray-50 my-2"></div>
            
            <h2 class="text-orange-600 font-black text-[11px] uppercase italic mb-1 pt-2">Bienvenue chers Marchands !</h2>
            <p class="text-gray-400 text-[8px] mb-4 font-medium">Propulsez vos produits sur le marché digital.</p>

            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="inputRecherche" onkeyup="rechercherProduit()" placeholder="Rechercher un article..." 
                           class="w-full bg-gray-100 border-none rounded-xl py-3 px-10 text-[10px] outline-none focus:ring-2 focus:ring-purple-900">
                    <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                </div>
                <button onclick="lancerMicro()" class="bg-purple-900 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-all">
                    <i class="fas fa-microphone text-lg" id="iconMicro"></i>
                </button>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-purple-900 font-black text-[10px] uppercase mb-3 px-2 flex items-center gap-2">
                <i class="fas fa-fire text-orange-500"></i> À la Une
            </h3>
            <div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1">
                </div>
        </div>

        <div class="mb-8">
            <h3 class="text-purple-900 font-black text-[10px] uppercase mb-3 px-2 italic underline decoration-orange-500 underline-offset-4">
                <i class="fas fa-star text-orange-500"></i> Sous les Projecteurs
            </h3>
            <div id="zone-video" class="bg-white p-3 rounded-[30px] shadow-lg border border-gray-50 flex items-center justify-center min-h-[160px]">
                <p class="italic text-[9px] text-gray-400 text-center px-6">Découvrez les portraits de nos commerçants locaux...</p>
            </div>
        </div>
    </section>

    <section id="boutique" class="px-6 mt-10">
        <div id="vue-rayons">
            <h2 class="text-purple-900 font-black text-2xl mb-8 uppercase italic text-center underline decoration-orange-500 underline-offset-8">Les Marchés</h2>
            
            <div class="grid grid-cols-2 gap-4 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-orange-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-scissors text-orange-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Mercerie</p>
                </button>

                <button onclick="ouvrirRayon('Beauté')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-pink-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-magic text-pink-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Beauté</p>
                </button>

                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-green-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-leaf text-green-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Vivrier</p>
                </button>

                <button onclick="ouvrirRayon('Mode')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-blue-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-tshirt text-blue-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Mode</p>
                </button>

                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-red-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-shopping-basket text-red-600 text-xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Alimentation</p>
                </button>

                <button onclick="ouvrirRayon('Électronique')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-yellow-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-mobile-alt text-yellow-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Électronique</p>
                </button>

                <button onclick="ouvrirRayon('Quincaillerie')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-gray-600 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-tools text-gray-600 text-2xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Quincaillerie</p>
                </button>

                <button onclick="ouvrirRayon('Service pro')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-purple-500 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-briefcase text-purple-600 text-xl mb-2"></i>
                    <p class="text-[8px] font-black uppercase text-purple-900">Service pro</p>
                </button>

                <button onclick="ouvrirRayon('Resto')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-orange-400 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-utensils text-orange-400 text-xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Resto</p>
                </button>

                <button onclick="ouvrirRayon('Immobilier')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-indigo-600 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-home text-indigo-600 text-xl mb-2"></i>
                    <p class="text-[8px] font-black uppercase text-purple-900">Immobilier</p>
                </button>

                <button onclick="ouvrirRayon('Hôtel')" class="bg-white p-6 rounded-[35px] shadow-xl border-b-8 border-rose-600 flex flex-col items-center active:scale-95 transition-all">
                    <i class="fas fa-bed text-rose-600 text-xl mb-2"></i>
                    <p class="text-[9px] font-black uppercase text-purple-900">Hôtel</p>
                </button>
            </div>
        </div>

        <div id="vue-produits" class="hidden">
            <button onclick="retourRayons()" class="mb-6 text-orange-600 font-black text-[10px] uppercase underline flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Retour aux marchés
            </button>
            <div id="liste-produits" class="grid grid-cols-1 gap-6">
                </div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 bg-white rounded-[35px] shadow-2xl p-4 flex justify-around items-center z-50 border border-gray-100">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-600 flex flex-col items-center transition-all">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[7px] font-black uppercase mt-1">Accueil</span>
        </button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-gray-400 flex flex-col items-center transition-all">
            <i class="fas fa-store text-lg"></i>
            <span class="text-[7px] font-black uppercase mt-1">Boutique</span>
        </button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center -mt-16 border-4 border-white shadow-xl shadow-green-200">
            <i class="fab fa-whatsapp text-2xl"></i>
        </a>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbxIWaVqDIBUhkcZ1lGLaywdTANE6LQjKxqpCzk0zN1X_DhWUJZidn4DoxWj4icCP55M/exec";
        let articles = [];

        async function chargerDonnees() {
            try {
                const reponse = await fetch(urlScript);
                articles = await reponse.json();
                
                const certifiés = articles.filter(p => String(p.certifie).toUpperCase() === "OUI" && String(p.statut).toUpperCase() === "OK" && !String(p.image).includes('youtube'));
                const carrousel = document.getElementById('carrousel-une');
                
                if (certifiés.length > 0) {
                    carrousel.innerHTML = certifiés.map(p => `
                        <div class="min-w-[130px] bg-white rounded-2xl shadow-md overflow-hidden border border-gray-50">
                            <img src="${p.image}" class="w-full h-24 object-cover" onerror="this.src='https://placehold.co/400x300?text=Image+indisponible'">
                            <div class="p-2 text-center text-[7px] font-black uppercase text-purple-900 truncate">${p.nom}</div>
                        </div>`).join('');
                } else {
                    carrousel.innerHTML = '<p class="text-[8px] text-gray-400 w-full text-center py-4">Aucune nouveauté certifiée.</p>';
                }

                const videoProjet = articles.find(p => String(p.certifie).toUpperCase() === "OUI" && (String(p.image).includes('youtube')));
                if (videoProjet) {
                    let videoID = videoProjet.image.includes('v=') ? videoProjet.image.split('v=')[1].split('&')[0] : videoProjet.image.split('/').pop();
                    /* CORRECTION VIDÉO : Ajout du signe $ */
                    document.getElementById('zone-video').innerHTML = `
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${videoID}" allowfullscreen></iframe>
                        </div>`;
                }
            } catch (erreur) {
                console.error("Erreur lors du chargement des données :", erreur);
            }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const btnAccueil = document.getElementById('btn-accueil');
            const btnBoutique = document.getElementById('btn-boutique');
            
            if (id === 'accueil') {
                btnAccueil.className = 'text-orange-600 flex flex-col items-center transition-all';
                btnBoutique.className = 'text-gray-400 flex flex-col items-center transition-all';
            } else {
                btnAccueil.className = 'text-gray-400 flex flex-col items-center transition-all';
                btnBoutique.className = 'text-orange-600 flex flex-col items-center transition-all';
            }
        }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            
            const listeContainer = document.getElementById('liste-produits');
            
            /* CORRECTION RAYONS : Nettoyage automatique des espaces et majuscules */
            const filtrés = articles.filter(p => 
                String(p.rayon).trim().toLowerCase() === String(nomRayon).trim().toLowerCase() && 
                String(p.statut).trim().toUpperCase() === "OK"
            );
            
            if (filtrés.length > 0) {
                listeContainer.innerHTML = filtrés.map(p => `
                    <div class="bg-white rounded-3xl shadow-md flex items-center p-3 gap-4 border border-gray-50 mb-3">
                        <img src="${p.image}" class="w-16 h-16 rounded-xl object-cover shadow-sm" onerror="this.src='https://placehold.co/100'">
                        <div class="flex-1">
                            <h4 class="font-black uppercase text-purple-900 text-[9px]">${p.nom}</h4>
                            <p class="text-orange-600 font-black text-[10px]">${p.prix} FCFA</p>
                        </div>
                        <a href="https://wa.me/2250576326645?text=Bonjour, je souhaite commander : ${p.nom}" class="bg-green-100 text-green-600 p-3 rounded-full shadow-sm">
                            <i class="fab fa-whatsapp text-lg"></i>
                        </a>
                    </div>`).join('');
            } else {
                listeContainer.innerHTML = '<p class="text-center text-[10px] mt-20 italic text-gray-400">Aucun article dans ce marché pour le moment.</p>';
            }
        }

        function retourRayons() {
            document.getElementById('vue-rayons').classList.remove('hidden');
            document.getElementById('vue-produits').classList.add('hidden');
        }

        function rechercherProduit() {
            const saisie = document.getElementById('inputRecherche').value.toLowerCase();
            if (saisie.length > 1) {
                switchTab('boutique');
                document.getElementById('vue-rayons').classList.add('hidden');
                document.getElementById('vue-produits').classList.remove('hidden');
                
                const filtrés = articles.filter(p => p.nom.toLowerCase().includes(saisie) && String(p.statut).trim().toUpperCase() === "OK");
                const listeContainer = document.getElementById('liste-produits');
                
                if (filtrés.length > 0) {
                    listeContainer.innerHTML = filtrés.map(p => `
                        <div class="bg-white rounded-3xl shadow-md flex items-center p-3 gap-4 border border-gray-50 mb-3">
                            <img src="${p.image}" class="w-16 h-16 rounded-xl object-cover shadow-sm">
                            <div class="flex-1">
                                <h4 class="font-black uppercase text-purple-900 text-[9px]">${p.nom}</h4>
                                <p class="text-orange-600 font-black text-[10px]">${p.prix} FCFA</p>
                            </div>
                            <a href="https://wa.me/2250576326645?text=Bonjour, je souhaite commander : ${p.nom}" class="text-green-500 p-2"><i class="fab fa-whatsapp text-lg"></i></a>
                        </div>`).join('');
                } else {
                    listeContainer.innerHTML = '<p class="text-center text-[10px] mt-20 italic text-gray-400">Aucun résultat trouvé.</p>';
                }
            }
        }

        function lancerMicro() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Votre navigateur ne supporte pas la recherche vocale.");
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            const microIcon = document.getElementById('iconMicro');
            recognition.onstart = () => { microIcon.className = "fas fa-spinner fa-spin"; };
            recognition.onend = () => { microIcon.className = "fas fa-microphone text-lg"; };
            recognition.onresult = (event) => {
                const parole = event.results[0][0].transcript;
                document.getElementById('inputRecherche').value = parole;
                rechercherProduit();
            };
            recognition.start();
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
