<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-tab { color: #4c1d95; border-bottom: 3px solid #4c1d95; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 bg-white sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-black text-purple-900 italic">Cœur de Marché</h1>
            <span class="text-[10px] bg-orange-500 text-white px-2 py-1 rounded-full font-bold uppercase">Bouaflé</span>
        </div>
        <div class="relative">
            <input type="text" id="inputRecherche" onkeyup="rechercherProduit()" placeholder="Rechercher un article..." 
                class="w-full p-4 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-purple-500 font-bold">
            <button class="absolute right-4 top-4 text-gray-400"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="p-4">
        <h2 class="font-black text-gray-800 uppercase text-xs mb-3 tracking-widest">Nos Rayons</h2>
        <div class="flex gap-4 overflow-x-auto hide-scroll pb-2">
            <button onclick="ouvrirRayon('Vivrier')" class="flex-none text-center">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-leaf text-xl"></i></div>
                <span class="text-[10px] font-bold">Vivrier</span>
            </button>
            <button onclick="ouvrirRayon('Alimentation')" class="flex-none text-center">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-utensils text-xl"></i></div>
                <span class="text-[10px] font-bold">Alimentation</span>
            </button>
            <button onclick="ouvrirRayon('Habillement')" class="flex-none text-center">
                <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-tshirt text-xl"></i></div>
                <span class="text-[10px] font-bold">Habillement</span>
            </button>
            <button onclick="ouvrirRayon('Mercerie')" class="flex-none text-center">
                <div class="w-16 h-16 bg-pink-100 text-pink-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-cut text-xl"></i></div>
                <span class="text-[10px] font-bold">Mercerie</span>
            </button>
            <button onclick="ouvrirRayon('Maison')" class="flex-none text-center">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-blender text-xl"></i></div>
                <span class="text-[10px] font-bold">Maison</span>
            </button>
            <button onclick="ouvrirRayon('Construction')" class="flex-none text-center">
                <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-hammer text-xl"></i></div>
                <span class="text-[10px] font-bold">Chantier</span>
            </button>
            <button onclick="ouvrirRayon('Motos')" class="flex-none text-center">
                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-motorcycle text-xl"></i></div>
                <span class="text-[10px] font-bold">Motos</span>
            </button>
            <button onclick="ouvrirRayon('Agro')" class="flex-none text-center">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-seedling text-xl"></i></div>
                <span class="text-[10px] font-bold">Agro</span>
            </button>
            <button onclick="ouvrirRayon('Librairie')" class="flex-none text-center">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-book text-xl"></i></div>
                <span class="text-[10px] font-bold">Librairie</span>
            </button>
            <button onclick="ouvrirRayon('Electronique')" class="flex-none text-center">
                <div class="w-16 h-16 bg-gray-100 text-gray-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-mobile-alt text-xl"></i></div>
                <span class="text-[10px] font-bold">Électronique</span>
            </button>
            <button onclick="ouvrirRayon('Beaute')" class="flex-none text-center">
                <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-magic text-xl"></i></div>
                <span class="text-[10px] font-bold">Beauté</span>
            </button>
            <button onclick="ouvrirRayon('Evenementiel')" class="flex-none text-center">
                <div class="w-16 h-16 bg-cyan-100 text-cyan-600 rounded-2xl flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-microphone text-xl"></i></div>
                <span class="text-[10px] font-bold">Événements</span>
            </button>
        </div>
    </div>

    <main class="px-4">
        <div id="liste-produits" class="grid grid-cols-2 gap-4">
            </div>
        <div id="loader" class="text-center py-10 text-gray-400 font-bold uppercase text-xs">Chargement du marché...</div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-3 z-50">
        <button onclick="window.location.reload()" class="flex flex-col items-center active-tab">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Marché</span>
        </button>
        <button onclick="ouvrirPanier()" class="flex flex-col items-center text-gray-400 relative">
            <i class="fas fa-shopping-basket text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Mon Panier</span>
            <div id="badge-panier" class="hidden absolute -top-1 -right-1 bg-orange-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</div>
        </button>
        <a href="vendre.html" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-store text-lg"></i>
            <span class="text-[10px] font-bold mt-1">Vendre</span>
        </a>
    </nav>

    <div id="modalPanier" class="fixed inset-0 bg-black/60 z-[60] hidden flex-col justify-end">
        <div class="bg-white rounded-t-[40px] p-6 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl uppercase italic text-purple-900">Mon Panier</h3>
                <button onclick="fermerPanier()" class="bg-gray-100 p-2 rounded-full px-4 font-bold text-xs uppercase">Fermer</button>
            </div>
            <div id="contenuPanier" class="space-y-4 mb-6"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between text-xl font-black mb-6">
                    <span>TOTAL</span>
                    <span id="totalPanier" class="text-orange-500">0 FCFA</span>
                </div>
                <button onclick="commanderWhatsApp()" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 uppercase">
                    <i class="fab fa-whatsapp text-2xl"></i> Commander sur WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://szhsohizqwcsnxltjtq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHNvaGl6cXdjc254bHRqdHEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxMTY1Njg0MWh2N2hpenF3Y3NueGx0anFudWd2N2c2I1';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let articlesLocaux = [];
        let panier = JSON.parse(localStorage.getItem('panier_bouafle')) || [];

        // Charger les produits
        async function chargerMarche() {
            const { data, error } = await supabase.from('produits').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error(error);
                return;
            }
            articlesLocaux = data;
            afficherProduits(data);
            document.getElementById('loader').classList.add('hidden');
            majBadgePanier();
        }

        function afficherProduits(liste) {
            const container = document.getElementById('liste-produits');
            container.innerHTML = '';

            if (liste.length === 0) {
                container.innerHTML = '<p class="col-span-2 text-center py-10 font-bold text-gray-400">Aucun article ici pour le moment.</p>';
                return;
            }

            liste.forEach(p => {
                const card = `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                        <img src="${p.image_url}" class="w-full h-32 object-cover">
                        <div class="p-3 flex-1 flex flex-col">
                            <span class="text-[8px] font-black uppercase text-purple-400 mb-1">${p.vendeur_nom || 'Boutique'}</span>
                            <h3 class="font-bold text-gray-800 text-xs truncate mb-1">${p.nom}</h3>
                            <p class="text-orange-500 font-black text-sm mb-3">${p.prix.toLocaleString('fr-FR')} F</p>
                            <button onclick="ajouterAuPanier('${p.nom.replace(/'/g, "\\'")}', ${p.prix}, '${p.vendeur_tel}')" 
                                class="w-full bg-gray-900 text-white py-2 rounded-xl text-[10px] font-black uppercase mt-auto">
                                + Ajouter
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        function ajouterAuPanier(nom, prix, tel) {
            panier.push({ nom, prix, tel });
            localStorage.setItem('panier_bouafle', JSON.stringify(panier));
            majBadgePanier();
            
            // Petit effet visuel
            const badge = document.getElementById('badge-panier');
            badge.classList.add('scale-125');
            setTimeout(() => badge.classList.remove('scale-125'), 200);
        }

        function majBadgePanier() {
            const badge = document.getElementById('badge-panier');
            if (panier.length > 0) {
                badge.innerText = panier.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function ouvrirRayon(cat) {
            const filtered = articlesLocaux.filter(a => a.categorie === cat);
            afficherProduits(filtered);
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function rechercherProduit() {
            const s = document.getElementById('inputRecherche').value.toLowerCase();
            const filtered = articlesLocaux.filter(a => a.nom.toLowerCase().includes(s));
            afficherProduits(filtered);
        }

        function ouvrirPanier() {
            const container = document.getElementById('contenuPanier');
            const totalEl = document.getElementById('totalPanier');
            container.innerHTML = '';
            let total = 0;

            panier.forEach((item, index) => {
                total += parseInt(item.prix, 10) || 0;
                container.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                        <div>
                            <p class="font-bold text-xs">${item.nom}</p>
                            <p class="text-orange-500 font-black text-[10px]">${item.prix} F</p>
                        </div>
                        <button onclick="supprimerItem(${index})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `);
            });

            totalEl.innerText = `${total.toLocaleString('fr-FR')} FCFA`;
            document.getElementById('modalPanier').classList.remove('hidden');
            document.getElementById('modalPanier').classList.add('flex');
        }

        function supprimerItem(index) {
            panier.splice(index, 1);
            localStorage.setItem('panier_bouafle', JSON.stringify(panier));
            ouvrirPanier();
            majBadgePanier();
        }

        function fermerPanier() {
            document.getElementById('modalPanier').classList.add('hidden');
            document.getElementById('modalPanier').classList.remove('flex');
        }

        function commanderWhatsApp() {
            if (panier.length === 0) return;
            
            // Pour faire simple et pro : on envoie la commande au premier vendeur du panier
            // ou tu peux centraliser vers ton numéro. Ici, on prend le numéro du premier article.
            const premierVendeur = panier[0].tel || "2250576326645"; 
            let message = "Bonjour Cœur de Marché, voici ma commande :\n\n";
            let total = 0;

            panier.forEach(item => {
                message += `- ${item.nom} (${item.prix} F)\n`;
                total += parseInt(item.prix, 10);
            });

            message += `\n*TOTAL : ${total} FCFA*`;
            
            const link = `https://wa.me/${premierVendeur}?text=${encodeURIComponent(message)}`;
            window.open(link, '_blank');
        }

        chargerMarche();
    </script>
</body>
        </html>
