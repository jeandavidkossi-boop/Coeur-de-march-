<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .badge-promo { position: absolute; top: 10px; left: 0; background: #ef4444; color: white; font-size: 8px; font-weight: 800; padding: 3px 10px; border-radius: 0 15px 15px 0; z-index: 10; }
        .pulse-wa { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="pb-32 text-slate-800">

    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src="" class="max-w-full max-h-full rounded-xl shadow-2xl"></div>

    <header class="bg-purple-900 pt-8 pb-12 rounded-b-[50px] shadow-2xl text-center border-b-4 border-orange-500">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-3 flex items-center justify-center overflow-hidden">
            <img src="IMG-20260115-WA0005.jpg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-white text-xl font-black uppercase italic italic">Cœur de Marché</h1>
        <p class="text-orange-400 text-[9px] font-bold tracking-widest uppercase">Bouaflé • Marahoué</p>
    </header>

    <section id="accueil" class="active px-5 -mt-8">
        <div class="bg-white p-4 rounded-[30px] shadow-xl border border-slate-100 mb-6 relative z-10">
            <div class="relative">
                <input type="text" oninput="rechercherProduit(event)" placeholder="Rechercher un produit..." class="w-full bg-slate-50 border border-slate-100 rounded-xl py-3 px-10 text-xs outline-none focus:ring-2 focus:ring-purple-600">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
            </div>
        </div>

        <h3 class="text-slate-900 font-black text-[10px] uppercase mb-3 ml-2 italic">À la Une</h3>
        <div id="carrousel-une" class="flex gap-3 overflow-x-auto no-scrollbar pb-4">
            <p class="text-slate-400 text-[10px] italic p-4">Chargement des offres en cours...</p>
        </div>
    </section>

    <section id="boutique" class="px-5 mt-6">
        <div id="vue-rayons">
            <h2 class="text-slate-900 font-black text-lg mb-6 uppercase text-center italic">Nos Marchés</h2>
            <div class="grid grid-cols-2 gap-3 pb-10">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors text-orange-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Mercerie</span></button>
                <button onclick="ouvrirRayon('Beauté')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-sparkles text-pink-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Beauté</span></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-leaf text-green-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Vivrier</span></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt text-blue-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Mode</span></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-red-500 flex flex-col items-center"><i class="fas fa-shopping-basket text-red-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Alimentation</span></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-5 rounded-3xl shadow-md border-b-4 border-purple-600 flex flex-col items-center"><i class="fas fa-taxi text-purple-600 text-xl mb-2"></i><span class="text-[9px] font-bold uppercase">Services</span></button>
            </div>
        </div>

        <div id="vue-produits" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <button onclick="retourRayons()" class="bg-slate-200 text-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold"><i class="fas fa-arrow-left mr-1"></i> Retour</button>
                <span id="compteur-articles" class="text-[9px] font-bold text-slate-400"></span>
            </div>
            <div id="liste-produits" class="space-y-4"></div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 rounded-[25px] p-3 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-500 flex flex-col items-center gap-1"><i class="fas fa-home text-lg"></i><span class="text-[8px] font-bold uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-slate-400 flex flex-col items-center gap-1"><i class="fas fa-store text-lg"></i><span class="text-[8px] font-bold uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-12 h-12 rounded-xl flex items-center justify-center -mt-12 border-4 border-slate-900 shadow-xl pulse-wa"><i class="fab fa-whatsapp text-2xl"></i></a>
    </nav>

    <script>
        // On ajoute un paramètre de temps pour éviter le cache navigateur (Anti-blocage)
        const urlScript = "https://script.google.com/macros/s/AKfycbxIWaVqDIBUhkcZ1lGLaywdTANE6LQjKxqpCzk0zN1X_DhWUJZidn4DoxWj4icCP55M/exec?v=" + new Date().getTime();
        let articles = [];

        async function chargerDonnees() {
            try {
                const res = await fetch(urlScript);
                const data = await res.json();
                articles = data.map(p => ({
                    ...p,
                    prix: parseInt(String(p.prix).replace(/[^0-9]/g, "")) || 0,
                    statut: String(p.statut || "").toUpperCase().trim(),
                    certifie: String(p.certifie || "").toUpperCase().trim(),
                    rayon: String(p.rayon || "").trim()
                }));

                const une = articles.filter(p => p.certifie === "OUI" && p.statut === "OK");
                document.getElementById('carrousel-une').innerHTML = une.length > 0 ? une.map(p => `
                    <div class="min-w-[130px] relative bg-white rounded-2xl shadow-md overflow-hidden" onclick="zoom('${p.image}')">
                        ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                        <img src="${p.image}" class="w-full h-24 object-cover">
                        <div class="p-2 text-center text-[8px] font-bold uppercase truncate">${p.nom}</div>
                    </div>`).join('') : "<p class='text-xs italic p-4 text-slate-400'>Aucune promo aujourd'hui</p>";
            } catch (e) {
                console.error("Erreur chargement:", e);
            }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const isAcc = id === 'accueil';
            document.getElementById('btn-accueil').className = isAcc ? 'text-orange-500 flex flex-col items-center gap-1' : 'text-slate-400 flex flex-col items-center gap-1';
            document.getElementById('btn-boutique').className = isAcc ? 'text-slate-400 flex flex-col items-center gap-1' : 'text-orange-500 flex flex-col items-center gap-1';
        }

        function ouvrirRayon(nom) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtres = articles.filter(p => p.rayon.toLowerCase() === nom.toLowerCase() && p.statut === "OK");
            
            document.getElementById('compteur-articles').innerText = filtres.length + " pépites trouvées";
            document.getElementById('liste-produits').innerHTML = filtres.map(p => `
                <div class="bg-white rounded-3xl p-3 flex gap-4 shadow-sm border border-slate-50 relative">
                    ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                    <img src="${p.image}" class="w-20 h-20 rounded-2xl object-cover shadow-sm" onclick="zoom('${p.image}')">
                    <div class="flex-1">
                        <h4 class="font-black uppercase text-slate-900 text-[10px] leading-tight mb-1">${p.nom}</h4>
                        <p class="text-orange-600 font-black text-xs">${p.prix.toLocaleString()} FCFA</p>
                        <a href="https://wa.me/2250576326645?text=Commander : ${p.nom}" class="mt-2 inline-block bg-green-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase italic">WhatsApp</a>
                    </div>
                </div>`).join('');
            window.scrollTo(0,0);
        }

        function rechercherProduit(e) {
            const val = e.target.value.toLowerCase().trim();
            if(val.length > 1) {
                switchTab('boutique');
                document.getElementById('vue-rayons').classList.add('hidden');
                document.getElementById('vue-produits').classList.remove('hidden');
                const res = articles.filter(p => (p.nom.toLowerCase().includes(val) || p.rayon.toLowerCase().includes(val)) && p.statut === "OK");
                document.getElementById('liste-produits').innerHTML = res.map(p => `
                    <div class="p-3 bg-white rounded-2xl shadow-sm mb-2 flex justify-between items-center border border-slate-100">
                        <span class="text-[9px] font-bold uppercase">${p.nom}</span>
                        <span class="text-orange-600 font-black text-[10px]">${p.prix} F</span>
                    </div>`).join('');
            }
        }

        function retourRayons() {
            document.getElementById('vue-rayons').classList.remove('hidden');
            document.getElementById('vue-produits').classList.add('hidden');
        }

        function zoom(s) {
            document.getElementById('imgZoomed').src = s;
            document.getElementById('modalZoom').style.display = 'flex';
        }

        window.onload = chargerDonnees;
    </script>
</body>
</html>
