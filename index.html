<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coeur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .text-cdm-purple { color: #5b21b6; }
        .bg-cdm-orange { background-color: #f97316; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-[#5b21b6] text-white p-6 rounded-b-[35px] shadow-lg sticky top-0 z-40">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="1769121566036.png" class="w-12 h-12 rounded-full border-2 border-orange-500 bg-white" alt="Logo">
                <div>
                    <h1 class="text-xl font-black uppercase tracking-tighter">Coeur de Marché</h1>
                    <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest italic">Bouaflé</p>
                </div>
            </div>
            <a href="vendre.html" class="bg-white/10 p-3 rounded-2xl active:scale-90 transition-all">
                <i class="fas fa-store text-white"></i>
            </a>
        </div>
        
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
            <input type="text" id="inputRecherche" onkeyup="rechercherProduit()" placeholder="Que cherchez-vous à Bouaflé ?" class="w-full p-4 pl-12 bg-white text-gray-800 rounded-2xl outline-none font-bold shadow-inner">
        </div>
    </header>

    <div class="px-6 mt-8">
        <h2 class="font-black text-[#4c1d95] text-xs mb-3 flex items-center gap-2 uppercase">
            <i class="fas fa-crown text-yellow-500"></i> Boutiques Officielles
        </h2>
        <div id="carrousel-vip" class="flex gap-4 overflow-x-auto hide-scroll py-2">
            <p class="text-[10px] font-bold text-gray-400 italic">Chargement des VIP...</p>
        </div>
    </div>
        <main class="mt-4">
        <div class="px-6 mb-8">
            <div id="carrousel-alaune" class="flex gap-4 overflow-x-auto hide-scroll snap-x snap-mandatory rounded-2xl">
                </div>
        </div>

        <div class="px-6 mb-6 overflow-x-auto hide-scroll">
            <div class="flex gap-3 pb-2">
                <button onclick="filtrerCat('Tous')" class="cat-btn active bg-[#4c1d95] text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md">Tous</button>
                <button onclick="filtrerCat('Marché & Vivrier')" class="cat-btn bg-white text-gray-600 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Vivrier</button>
                <button onclick="filtrerCat('Habillement & Pagnes')" class="cat-btn bg-white text-gray-600 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Habillement</button>
                <button onclick="filtrerCat('Beauté & Cosmétique')" class="cat-btn bg-white text-gray-600 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Beauté</button>
            </div>
        </div>

        <div class="px-6 mb-24">
            <div id="grille-produits" class="grid grid-cols-2 gap-4">
                <p class="text-gray-400 text-sm italic col-span-2 text-center py-10">Chargement du marché...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-4 flex justify-around items-center z-50">
        <button onclick="changerVue('accueil')" class="flex flex-col items-center gap-1 text-cdm-purple">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[9px] font-black uppercase">Accueil</span>
        </button>
        <button onclick="changerVue('boutique')" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[9px] font-black uppercase">Marché</span>
        </button>
        <button onclick="ouvrirPanier()" class="flex flex-col items-center gap-1 text-gray-400 relative">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="badge-panier" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
            <span class="text-[9px] font-black uppercase">Panier</span>
        </button>
        <button onclick="changerVue('aide')" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-question-circle text-xl"></i>
            <span class="text-[9px] font-black uppercase">Aide</span>
        </button>
    </nav>

    <div id="modal-contact" class="fixed inset-0 bg-black/80 z-[60] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 text-center">
            <img id="modal-img" src="" class="w-32 h-32 object-cover rounded-2xl mx-auto mb-4 border-4 border-gray-100">
            <h3 id="modal-nom" class="font-black text-lg uppercase mb-1">...</h3>
            <p id="modal-prix" class="text-orange-600 font-black text-xl mb-4">... F</p>
            <p id="modal-desc" class="text-xs text-gray-500 mb-6 px-4">...</p>
            <button id="btn-whatsapp" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 uppercase mb-3">
                <i class="fab fa-whatsapp text-2xl"></i> Commander
            </button>
            <button onclick="fermerContact()" class="text-gray-400 font-bold text-xs uppercase underline">Fermer</button>
        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const dbUrl = 'https://szhxxohizqnwcmsltjtq.supabase.co';
        const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aHh4b2hpenFud2Ntc2x0anRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjE3MzcsImV4cCI6MjA5MTU5NzczN30.L0cczdas6kwaOSEehHF5s7nYU06W0u1s2_cRaytbRzw';
        const supabase = window.supabase.createClient(dbUrl, dbKey);

        let articles = [];

        async function init() {
            // 1. Récupérer les produits (FILTRE ACTIF UNIQUEMENT)
            const { data: produitsData } = await supabase
                .from('produits')
                .select('*')
                .eq('statut', 'actif')
                .order('dateajout', { ascending: false });
            
            if (produitsData) {
                articles = produitsData;
                afficherProduits(articles);
                afficherAlaUne();
            }

            // 2. Récupérer les Boutiques VIP (DANS LA TABLE VENDEURS)
            const { data: vips } = await supabase
                .from('vendeurs')
                .select('*')
                .eq('abonnement', 'vip');

            const carrousel = document.getElementById('carrousel-vip');
            if (vips && vips.length > 0) {
                carrousel.innerHTML = vips.map(v => `
                    <div onclick="document.getElementById('inputRecherche').value='${v.nom_boutique}'; rechercherProduit();" class="flex-shrink-0 flex flex-col items-center gap-1 cursor-pointer w-16">
                        <div class="w-14 h-14 rounded-full border-2 border-orange-500 p-0.5 shadow-md">
                            <div class="w-full h-full rounded-full bg-gradient-to-br from-[#4c1d95] to-[#f97316] flex items-center justify-center text-white font-black text-xl uppercase">
                                ${v.nom_boutique.substring(0, 1)}
                            </div>
                        </div>
                        <span class="text-[8px] font-black uppercase text-gray-700 truncate w-full text-center">${v.nom_boutique}</span>
                    </div>
                `).join('');
                setTimeout(demarrerCarrouselAuto, 1000);
            } else {
                carrousel.innerHTML = "<p class='text-[10px] font-bold text-gray-400 italic py-4'>Nouveaux VIP bientôt...</p>";
            }
        }

        function afficherProduits(liste) {
            const grille = document.getElementById('grille-produits');
            if (liste.length === 0) {
                grille.innerHTML = "<p class='text-gray-400 text-xs font-bold col-span-2 text-center py-10'>Aucun article.</p>";
                return;
            }
            grille.innerHTML = liste.map(p => `
                <div onclick="ouvrirContact('${p.nom}', '${p.prix}', '${p.description}', '${p.vendeur}', '${p.image}')" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col active:scale-95 transition-all">
                    <img src="${p.image}" class="w-full h-32 object-cover">
                    <div class="p-3 flex-1 flex flex-col">
                        <h4 class="font-black text-[10px] text-gray-800 uppercase truncate mb-1">${p.nom}</h4>
                        <span class="text-orange-600 font-black text-sm">${p.prix} F</span>
                    </div>
                </div>
            `).join('');
        }

        function afficherAlaUne() {
            const conteneur = document.getElementById('carrousel-alaune');
            const alaune = articles.slice(0, 5);
            conteneur.innerHTML = alaune.map(p => `
                <div onclick="ouvrirContact('${p.nom}', '${p.prix}', '${p.description}', '${p.vendeur}', '${p.image}')" class="flex-shrink-0 w-64 h-36 relative rounded-2xl overflow-hidden shadow-md">
                    <img src="${p.image}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex flex-col justify-end p-4">
                        <h3 class="text-white font-black text-sm uppercase">${p.nom}</h3>
                        <p class="text-orange-400 font-black text-xs">${p.prix} F</p>
                    </div>
                </div>
            `).join('');
        }

        function rechercherProduit() {
            const terme = document.getElementById('inputRecherche').value.toLowerCase();
            const filtres = articles.filter(p => p.nom.toLowerCase().includes(terme) || p.vendeur.toLowerCase().includes(terme));
            afficherProduits(filtres);
        }

        function filtrerCat(cat) {
            const boutons = document.querySelectorAll('.cat-btn');
            boutons.forEach(b => b.classList.remove('bg-[#4c1d95]', 'text-white'));
            event.target.classList.add('bg-[#4c1d95]', 'text-white');
            if (cat === 'Tous') {
                afficherProduits(articles);
            } else {
                afficherProduits(articles.filter(p => p.categorie === cat));
            }
        }

        function demarrerCarrouselAuto() {
            const el = document.getElementById('carrousel-vip');
            setInterval(() => {
                if (el.scrollLeft + el.clientWidth >= el.scrollWidth) {
                    el.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    el.scrollBy({ left: 80, behavior: 'smooth' });
                }
            }, 3000);
        }

        function ouvrirContact(nom, prix, desc, tel, img) {
            document.getElementById('modal-nom').innerText = nom;
            document.getElementById('modal-prix').innerText = prix;
            document.getElementById('modal-desc').innerText = desc || "Pas de détails.";
            document.getElementById('modal-img').src = img;
            const msg = encodeURIComponent("Bonjour ! Je suis intéressé par : " + nom);
            document.getElementById('btn-whatsapp').onclick = () => window.open(`https://wa.me/${tel}?text=${msg}`);
            document.getElementById('modal-contact').style.display = 'flex';
        }

        function fermerContact() { document.getElementById('modal-contact').style.display = 'none'; }
        
        function changerVue(vue) {
            if (vue === 'accueil') window.location.reload();
            else alert("Vue " + vue + " en cours de développement.");
        }

        init();
    </script>
</body>
</html>
