<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur de Marché Bouaflé</title>
    
    <link rel="canonical" href="https://jeandavidkossi-boop.github.io/Coeur-de-march-/">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4c1d95">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 24px; width: 100%; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #modalZoom img { max-width: 95%; max-height: 85vh; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); }

        .btn-call { background: linear-gradient(135deg, #f97316, #ea580c); color: white; width: 42px; height: 42px; border-radius: 14px; display: flex; items-center; justify-content: center; }
        .badge-promo { position: absolute; top: 12px; left: -5px; background: #ef4444; color: white; font-size: 9px; font-weight: 800; padding: 4px 12px; border-radius: 0 20px 20px 0; text-transform: uppercase; z-index: 10; box-shadow: 2px 4px 10px rgba(239, 68, 68, 0.3); }
        
        .stars-gold { color: #fbbf24; font-size: 10px; margin-bottom: 4px; }
        .zone-temoignage { background-color: #f0fdf4; border-left: 3px solid #22c55e; padding: 8px; border-radius: 8px; margin: 8px 0; }
        .bulle-avis { font-size: 10px; color: #166534; font-style: italic; line-height: 1.4; }
        
        .scroll-categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; margin-bottom: 15px; }
        .cat-pill { white-space: nowrap; background: white; padding: 8px 18px; border-radius: 16px; font-size: 11px; font-weight: 700; border: 1px solid #e2e8f0; color: #475569; transition: all 0.3s; }
        .cat-pill.active { background: #4c1d95; color: white; border-color: #4c1d95; transform: scale(1.05); }

        .pulse-wa { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        
        #btnBackToTop { display: none; position: fixed; bottom: 110px; right: 20px; z-index: 40; background: #4c1d95; color: white; width: 45px; height: 45px; border-radius: 15px; box-shadow: 0 8px 20px rgba(76, 29, 149, 0.3); }
    </style>
</head>
<body class="pb-32 text-slate-800">

    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>
    <button id="btnBackToTop" onclick="window.scrollTo(0,0)"><i class="fas fa-chevron-up"></i></button>

    <header class="bg-purple-900 pt-10 pb-14 rounded-b-[60px] shadow-2xl text-center border-b-4 border-orange-500 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <i class="fas fa-shopping-bag text-white text-9xl absolute -left-10 -top-10 rotate-12"></i>
        </div>
        <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center border-4 border-white/20 shadow-2xl overflow-hidden">
            <img src="IMG-20260115-WA0005.jpg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-white text-2xl font-black uppercase italic tracking-tighter">Cœur de Marché</h1>
        <p class="text-orange-400 text-[10px] font-bold tracking-[0.2em] uppercase italic">Bouaflé • Marahoué</p>
    </header>

    <section id="accueil" class="active px-5 -mt-10">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl border border-slate-100 mb-8 relative z-10">
            <div class="text-center mb-5">
                <h2 class="text-purple-950 font-black text-sm uppercase italic">Trouvez tout à Bouaflé</h2>
                <p class="text-slate-400 text-[10px] font-medium">La marketplace locale de référence</p>
            </div>
            
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="inputRecherche" onkeyup="rechercherProduit(event)" placeholder="Un article, un marchand..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 px-11 text-xs outline-none focus:ring-2 focus:ring-purple-600 transition-all">
                    <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                </div>
                <button onclick="trierParPrix()" class="bg-white border border-slate-200 text-purple-900 w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
                    <i class="fas fa-sliders-h"></i>
                </button>
                <button onclick="lancerMicro()" class="bg-purple-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i class="fas fa-microphone" id="iconMicro"></i></button>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-slate-900 font-black text-xs uppercase mb-4 px-2 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-orange-500 rounded-full"></span> À la Une
            </h3>
            <div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </div>

        <div class="mb-10">
            <h3 class="text-slate-900 font-black text-xs uppercase mb-4 px-2 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-purple-600 rounded-full"></span> En Vedette
            </h3>
            <div id="zone-video" class="bg-white p-2 rounded-[32px] shadow-xl border border-slate-50 min-h-[200px] flex items-center justify-center">
                <p class="italic text-xs text-slate-400">Chargement de la pépite du jour...</p>
            </div>
        </div>
    </section>

    <section id="boutique" class="px-5 mt-10">
        <div id="vue-rayons">
            <h2 class="text-slate-900 font-black text-xl mb-8 uppercase italic text-center">Nos Marchés</h2>
            <div class="grid grid-cols-2 gap-4 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-orange-500 flex flex-col items-center hover:bg-orange-50 transition-colors"><i class="fas fa-scissors text-orange-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beauté')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-pink-500 flex flex-col items-center hover:bg-pink-50 transition-colors"><i class="fas fa-sparkles text-pink-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Beauté</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-green-500 flex flex-col items-center hover:bg-green-50 transition-colors"><i class="fas fa-seedling text-green-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-blue-500 flex flex-col items-center hover:bg-blue-50 transition-colors"><i class="fas fa-tshirt text-blue-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-red-500 flex flex-col items-center hover:bg-red-50 transition-colors"><i class="fas fa-shopping-basket text-red-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Alimentation</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-yellow-500 flex flex-col items-center hover:bg-yellow-50 transition-colors"><i class="fas fa-utensils text-yellow-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Resto</p></button>
                
                <button onclick="ouvrirRayon('Quincaillerie')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-slate-700 flex flex-col items-center hover:bg-slate-50 transition-colors"><i class="fas fa-hammer text-slate-700 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Quincaillerie</p></button>
                <button onclick="ouvrirRayon('Électronique')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-cyan-500 flex flex-col items-center hover:bg-cyan-50 transition-colors"><i class="fas fa-plug text-cyan-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Électronique</p></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-purple-600 flex flex-col items-center hover:bg-purple-50 transition-colors"><i class="fas fa-concierge-bell text-purple-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Services & Taxi</p></button>
            </div>
        </div>

        <div id="vue-produits" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <button onclick="retourRayons()" class="text-slate-900 font-bold text-xs flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl"><i class="fas fa-arrow-left"></i> Rayons</button>
                <p id="compteur-articles" class="text-[10px] font-bold text-slate-400 italic"></p>
            </div>
            <div class="scroll-categories no-scrollbar" id="barre-rapide">
                <button onclick="ouvrirRayon('Mercerie')" class="cat-pill" id="pill-Mercerie">Mercerie</button>
                <button onclick="ouvrirRayon('Beauté')" class="cat-pill" id="pill-Beauté">Beauté</button>
                <button onclick="ouvrirRayon('Vivrier')" class="cat-pill" id="pill-Vivrier">Vivrier</button>
                <button onclick="ouvrirRayon('Mode')" class="cat-pill" id="pill-Mode">Mode</button>
                <button onclick="ouvrirRayon('Alimentation')" class="cat-pill" id="pill-Alimentation">Alimentation</button>
                <button onclick="ouvrirRayon('Resto')" class="cat-pill" id="pill-Resto">Resto</button>
                <button onclick="ouvrirRayon('Quincaillerie')" class="cat-pill" id="pill-Quincaillerie">Quincaillerie</button>
                <button onclick="ouvrirRayon('Électronique')" class="cat-pill" id="pill-Électronique">Électro</button>
                <button onclick="ouvrirRayon('Services')" class="cat-pill" id="pill-Services">Services</button>
            </div>
            <div id="liste-produits" class="space-y-6"></div>
        </div>
    </section>

    <nav class="fixed bottom-8 left-6 right-6 bg-slate-900/95 backdrop-blur-lg rounded-[32px] shadow-2xl p-4 flex justify-around items-center z-50 border border-white/10">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-500 flex flex-col items-center gap-1 transition-all"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-slate-400 flex flex-col items-center gap-1 transition-all"><i class="fas fa-store text-xl"></i><span class="text-[9px] font-bold uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center -mt-20 border-4 border-slate-900 shadow-2xl pulse-wa active:scale-90"><i class="fab fa-whatsapp text-3xl"></i></a>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbxIWaVqDIBUhkcZ1lGLaywdTANE6LQjKxqpCzk0zN1X_DhWUJZidn4DoxWj4icCP55M/exec";
        let articles = [];
        let triBasEnHaut = true;

        window.onscroll = function() {
            const btn = document.getElementById("btnBackToTop");
            if (document.documentElement.scrollTop > 300) btn.style.display = "flex";
            else btn.style.display = "none";
        };

        function zoom(src) { document.getElementById('imgZoomed').src = src; document.getElementById('modalZoom').style.display = 'flex'; }

        function partagerProduit(nom) {
            const lienAppli = "https://jeandavidkossi-boop.github.io/Coeur-de-march-/"; 
            const texte = `🛍️ *Cœur de Marché Bouaflé*\n\nRegarde cet article : *${nom}*\n\nDisponible ici :\n${lienAppli}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texte)}`, '_blank');
        }

        function trierParPrix() {
            articles.sort((a, b) => triBasEnHaut ? a.prix - b.prix : b.prix - a.prix);
            triBasEnHaut = !triBasEnHaut;
            const activePill = document.querySelector('.cat-pill.active');
            if(activePill) ouvrirRayon(activePill.innerText.trim().replace('Électro', 'Électronique'));
        }

        async function chargerDonnees() {
            try {
                const reponse = await fetch(urlScript);
                const donnees = await reponse.json();
                articles = donnees.map(p => ({
                    ...p,
                    prix: parseFloat(String(p.prix).replace(/[^0-9]/g, "")) || 0,
                    statut: String(p.statut).toUpperCase(),
                    certifie: String(p.certifie).toUpperCase()
                }));

                const certifiés = articles.filter(p => p.certifie === "OUI" && p.statut === "OK");
                document.getElementById('carrousel-une').innerHTML = certifiés.map(p => `
                    <div class="min-w-[140px] relative bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100" onclick="zoom('${p.image}')">
                        ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                        <img src="${p.image}" class="w-full h-28 object-cover">
                        <div class="p-3 text-center text-[9px] font-bold uppercase text-slate-800 truncate">${p.nom}</div>
                    </div>`).join('');

                const video = articles.find(p => p.certifie === "OUI" && String(p.image).includes('youtube'));
                if (video) {
                    let videoID = video.image.includes('v=') ? video.image.split('v=')[1].split('&')[0] : video.image.split('/').pop();
                    document.getElementById('zone-video').innerHTML = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${videoID}" allowfullscreen></iframe></div>`;
                }
            } catch (erreur) { console.error("Erreur :", erreur); }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btnA = document.getElementById('btn-accueil');
            const btnB = document.getElementById('btn-boutique');
            if (id === 'accueil') {
                btnA.className = 'text-orange-500 flex flex-col items-center gap-1 transition-all';
                btnB.className = 'text-slate-400 flex flex-col items-center gap-1 transition-all';
            } else {
                btnA.className = 'text-slate-400 flex flex-col items-center gap-1 transition-all';
                btnB.className = 'text-orange-500 flex flex-col items-center gap-1 transition-all';
            }
        }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            
            // Correction pour le nom court dans la barre rapide
            let searchName = nomRayon === 'Électro' ? 'Électronique' : nomRayon;
            const activePill = document.getElementById('pill-' + searchName);
            if(activePill) activePill.classList.add('active');

            const filtrés = articles.filter(p => String(p.rayon).trim().toLowerCase() === String(searchName).trim().toLowerCase() && p.statut === "OK");
            document.getElementById('compteur-articles').innerText = filtrés.length + " pépites trouvées";

            document.getElementById('liste-produits').innerHTML = filtrés.map(p => {
                let stockHTML = "";
                if(p.stock && !isNaN(p.stock)) {
                    let couleur = p.stock < 5 ? 'bg-red-500' : 'bg-green-500';
                    stockHTML = `<div class="w-full bg-slate-100 h-1.5 rounded-full mt-3"><div class="${couleur} h-full rounded-full transition-all" style="width: ${Math.min(p.stock*10, 100)}%"></div></div><p class="text-[8px] font-bold mt-1.5 text-slate-400">Encore ${p.stock} disponible(s)</p>`;
                }

                return `
                <div class="bg-white rounded-[32px] shadow-xl p-4 flex gap-5 border border-slate-50 relative overflow-hidden group">
                    ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                    <div class="relative">
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-24 h-24 rounded-[24px] object-cover shadow-md group-hover:scale-105 transition-transform">
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="stars-gold"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                            <h4 class="font-black uppercase text-slate-900 text-xs leading-tight mb-1">${p.nom}</h4>
                            <p class="text-slate-400 text-[9px] italic line-clamp-2">${p.description || ''}</p>
                            ${p.commentaire ? `<div class="zone-temoignage"><p class="bulle-avis">"${p.commentaire}"</p></div>` : ''}
                        </div>
                        <div class="flex items-end justify-between mt-3">
                            <p class="text-orange-600 font-black text-sm">${p.prix.toLocaleString()} FCFA</p>
                            <button onclick="partagerProduit('${p.nom}')" class="text-slate-300 hover:text-blue-500 transition-colors"><i class="fas fa-share-nodes text-sm"></i></button>
                        </div>
                        ${stockHTML}
                    </div>
                    <div class="flex flex-col gap-3 justify-center">
                        <a href="tel:${p.telephone || '2250576326645'}" class="btn-call"><i class="fas fa-phone-alt"></i></a>
                        <a href="https://wa.me/2250576326645?text=Commander : ${p.nom}" class="bg-green-50 text-green-600 w-10 h-10 rounded-2xl flex items-center justify-center pulse-wa shadow-sm"><i class="fab fa-whatsapp text-xl"></i></a>
                    </div>
                </div>`}).join('');
        }

        function retourRayons() {
            docume
