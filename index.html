<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur de Marché Bouaflé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 24px; width: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #modalZoom img { max-width: 95%; max-height: 85vh; border-radius: 20px; border: 2px solid white; }
        .btn-call { background: linear-gradient(135deg, #f97316, #ea580c); color: white; width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .badge-promo { position: absolute; top: 12px; left: -5px; background: #ef4444; color: white; font-size: 9px; font-weight: 800; padding: 4px 12px; border-radius: 0 20px 20px 0; text-transform: uppercase; z-index: 10; }
        .cat-pill { white-space: nowrap; background: white; padding: 8px 18px; border-radius: 16px; font-size: 11px; font-weight: 700; border: 1px solid #e2e8f0; color: #475569; }
        .cat-pill.active { background: #4c1d95; color: white; border-color: #4c1d95; }
        .pulse-wa { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="pb-32 text-slate-800">

    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>

    <header class="bg-purple-900 pt-10 pb-14 rounded-b-[60px] shadow-2xl text-center border-b-4 border-orange-500 relative">
        <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-2xl overflow-hidden">
            <img src="IMG-20260115-WA0005.jpg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-white text-2xl font-black uppercase italic tracking-tighter">Cœur de Marché</h1>
        <p class="text-orange-400 text-[10px] font-bold tracking-widest uppercase italic">Bouaflé • Marahoué</p>
    </header>

    <section id="accueil" class="active px-5 -mt-10">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl border border-slate-100 mb-8 relative z-10">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="inputRecherche" onkeyup="rechercherProduit(event)" placeholder="Rechercher..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 px-11 text-xs outline-none focus:ring-2 focus:ring-purple-600">
                    <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                </div>
                <button onclick="trierParPrix()" class="bg-white border border-slate-200 text-purple-900 w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm"><i class="fas fa-sliders-h"></i></button>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-slate-900 font-black text-xs uppercase mb-4 px-2">À la Une</h3>
            <div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 text-xs italic text-gray-400">Chargement des offres...</div>
        </div>

        <div class="mb-10">
            <h3 class="text-slate-900 font-black text-xs uppercase mb-4 px-2">En Vedette</h3>
            <div id="zone-video" class="bg-white p-2 rounded-[32px] shadow-xl border border-slate-50 min-h-[200px] flex items-center justify-center">
                <p class="italic text-xs text-slate-400 text-center">Vidéo du jour...</p>
            </div>
        </div>
    </section>

    <section id="boutique" class="px-5 mt-10">
        <div id="vue-rayons">
            <h2 class="text-slate-900 font-black text-xl mb-8 uppercase italic text-center">Nos Marchés</h2>
            <div class="grid grid-cols-2 gap-4 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors text-orange-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beauté')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-sparkles text-pink-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Beauté</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-seedling text-green-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt text-blue-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-red-500 flex flex-col items-center"><i class="fas fa-shopping-basket text-red-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Alimentation</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-yellow-500 flex flex-col items-center"><i class="fas fa-utensils text-yellow-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Resto</p></button>
                <button onclick="ouvrirRayon('Quincaillerie')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-slate-700 flex flex-col items-center"><i class="fas fa-hammer text-slate-700 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Quincaillerie</p></button>
                <button onclick="ouvrirRayon('Électronique')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-cyan-500 flex flex-col items-center"><i class="fas fa-plug text-cyan-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Électronique</p></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-6 rounded-[35px] shadow-lg border-b-4 border-purple-600 flex flex-col items-center"><i class="fas fa-concierge-bell text-purple-600 text-2xl mb-2"></i><p class="text-[9px] font-bold uppercase">Services & Taxi</p></button>
            </div>
        </div>

        <div id="vue-produits" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <button onclick="retourRayons()" class="text-slate-900 font-bold text-xs flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl"><i class="fas fa-arrow-left"></i> Rayons</button>
                <p id="compteur-articles" class="text-[10px] font-bold text-slate-400 italic"></p>
            </div>
            <div id="liste-produits" class="space-y-6"></div>
        </div>
    </section>

    <nav class="fixed bottom-8 left-6 right-6 bg-slate-900/95 backdrop-blur-lg rounded-[32px] shadow-2xl p-4 flex justify-around items-center z-50 border border-white/10">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-500 flex flex-col items-center gap-1"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-bold uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-slate-400 flex flex-col items-center gap-1"><i class="fas fa-store text-xl"></i><span class="text-[9px] font-bold uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center -mt-20 border-4 border-slate-900 shadow-2xl pulse-wa"><i class="fab fa-whatsapp text-3xl"></i></a>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbxIWaVqDIBUhkcZ1lGLaywdTANE6LQjKxqpCzk0zN1X_DhWUJZidn4DoxWj4icCP55M/exec";
        let articles = [];
        let triBasEnHaut = true;

        function zoom(src) { document.getElementById('imgZoomed').src = src; document.getElementById('modalZoom').style.display = 'flex'; }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-accueil').className = id === 'accueil' ? 'text-orange-500 flex flex-col items-center gap-1' : 'text-slate-400 flex flex-col items-center gap-1';
            document.getElementById('btn-boutique').className = id === 'boutique' ? 'text-orange-500 flex flex-col items-center gap-1' : 'text-slate-400 flex flex-col items-center gap-1';
        }

        async function chargerDonnees() {
            try {
                const reponse = await fetch(urlScript);
                const donnees = await reponse.json();
                articles = donnees.map(p => ({
                    ...p,
                    prix: parseFloat(String(p.prix).replace(/[^0-9]/g, "")) || 0,
                    statut: String(p.statut).toUpperCase(),
                    certifie: String(p.certifie).toUpperCase()
                }));

                const certifiés = articles.filter(p => p.certifie === "OUI" && p.statut === "OK");
                document.getElementById('carrousel-une').innerHTML = certifiés.map(p => `
                    <div class="min-w-[140px] relative bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100" onclick="zoom('${p.image}')">
                        ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                        <img src="${p.image}" class="w-full h-28 object-cover">
                        <div class="p-3 text-center text-[9px] font-bold uppercase text-slate-800 truncate">${p.nom}</div>
                    </div>`).join('');
            } catch (e) { console.error(e); }
        }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtrés = articles.filter(p => String(p.rayon).trim().toLowerCase() === nomRayon.toLowerCase() && p.statut === "OK");
            document.getElementById('compteur-articles').innerText = filtrés.length + " pépites trouvées";
            document.getElementById('liste-produits').innerHTML = filtrés.map(p => `
                <div class="bg-white rounded-[32px] shadow-xl p-4 flex gap-5 border border-slate-50 relative">
                    ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
                    <img src="${p.image}" onclick="zoom('${p.image}')" class="w-24 h-24 rounded-[24px] object-cover shadow-md">
                    <div class="flex-1">
                        <h4 class="font-black uppercase text-slate-900 text-xs mb-1">${p.nom}</h4>
                        <p class="text-orange-600 font-black text-sm">${p.prix.toLocaleString()} FCFA</p>
                        <a href="https://wa.me/2250576326645?text=Commander : ${p.nom}" class="mt-2 inline-block bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold">Commander</a>
                    </div>
                </div>`).join('');
        }

        function retourRayons() {
            document.getElementById('vue-rayons').classList.remove('hidden');
            document.getElementById('vue-produits').classList.add('hidden');
        }

        function rechercherProduit(event) {
            const saisie = document.getElementById('inputRecherche').value.toLowerCase();
            if (saisie.length > 1) {
                switchTab('boutique');
                document.getElementById('vue-rayons').classList.add('hidden');
                document.getElementById('vue-produits').classList.remove('hidden');
                const filtrés = articles.filter(p => p.nom.toLowerCase().includes(saisie) && p.statut === "OK");
                document.getElementById('liste-produits').innerHTML = filtrés.map(p => `<div class="p-4 bg-white rounded-2xl shadow mb-2">${p.nom} - ${p.prix} FCFA</div>`).join('');
            }
        }

        window.onload = chargerDonnees;
    </script>
</body>
    </html>
