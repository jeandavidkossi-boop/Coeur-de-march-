        <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbx6OPL8H6X_KVsCWwIZjXPWMzSdxVnS01b56bx36O5m3XWf1z_YGgJgDBx3I98PExc/exec";
        const appLink = "https://jeandavidkossi-boop.github.io/Coeur-de-march-/";
        let articles = []; 
        let panier = [];
        const cleanTxt = (t) => String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

        async function chargerDonnees() {
            try {
                const r = await fetch(urlScript); 
                articles = await r.json();
                
                // Mise à jour de la bande-annonce
                const ann = articles.find(p => cleanTxt(p.nom) === "annonce");
                if(ann) document.getElementById('texteBandeAnnonce').innerText = ann.description;
                
                // Produits à la Une (Certifiés)
                const cert = articles.filter(p => cleanTxt(p.certifie) === "oui" && cleanTxt(p.statut) === "ok");
                document.getElementById('carrousel-une').innerHTML = cert.map(p => {
                    const escNom = p.nom.replace(/'/g, "\\'");
                    return `<div class="min-w-[160px] bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100 flex flex-col mr-4 relative">
                        <div class="absolute top-2 right-2 bg-orange-600 text-white text-[9px] font-black px-2 py-1 rounded-lg z-10">${p.prix} F</div>
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-full h-28 object-cover" onerror="this.src='1769121566036.png'">
                        <div class="p-3">
                            <h4 class="text-purple-900 text-[10px] font-black uppercase truncate">${p.nom}</h4>
                            <p class="text-blue-600 text-[8px] font-bold">${p.quartier || 'Bouafle'}</p>
                            <button onclick="ajouterAuPanier('${escNom}', '${p.prix}')" class="w-full mt-2 bg-purple-900 text-white text-[8px] font-black py-2 rounded-xl">AJOUTER</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { console.error("Erreur de chargement :", e); }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id); 
            if(target) target.classList.add('active');
            if(id === 'boutique') retourRayons();
            
            document.getElementById('btn-accueil').className = id === 'accueil' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
            document.getElementById('btn-boutique').className = id === 'boutique' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
        }

        function ouvrirRayonDepuisAccueil(n) { switchTab('boutique'); ouvrirRayon(n); }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtres = articles.filter(p => cleanTxt(p.rayon) === cleanTxt(nomRayon) && cleanTxt(p.statut) === "ok");
            document.getElementById('compteur-articles').innerText = filtres.length + " article(s)";
            document.getElementById('liste-produits').innerHTML = filtres.length === 0 ? `<p class="text-center p-10 text-gray-400 text-[10px]">Aucun produit ici.</p>` :
                filtres.map(p => {
                    const escNom = p.nom.replace(/'/g, "\\'");
                    const textePartage = encodeURIComponent("Regarde ce produit sur Coeur de Marche : *" + p.nom + "* à " + p.prix + " F !\nLien : " + appLink);
                    return `<div class="bg-white rounded-[25px] shadow-md p-4 border border-gray-50 flex gap-4">
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-24 h-24 rounded-2xl object-cover shadow-sm" onerror="this.src='1769121566036.png'">
                        <div class="flex-1">
                            <h4 class="font-black uppercase text-purple-900 text-[10px] mb-1">${p.nom}</h4>
                            <p class="text-orange-600 font-black text-sm">${p.prix} F</p>
                            <p class="text-gray-500 text-[7px] italic mt-1 leading-tight">${p.description || ''}</p>
                            <p class="text-blue-600 text-[7px] font-bold mt-1 uppercase">${p.quartier || 'Bouafle'}</p>
                            <div class="flex gap-2 mt-2">
                                <a href="tel:${p.telephone}" class="w-8 h-8 rounded-lg bg-orange-500 text-white flex items-center justify-center"><i class="fas fa-phone-alt text-xs"></i></a>
                                <button onclick="ajouterAuPanier('${escNom}', '${p.prix}')" class="bg-orange-500 text-white px-3 rounded-lg text-[10px] font-black"><i class="fas fa-cart-plus"></i></button>
                                <a href="https://wa.me/?text=${textePartage}" class="w-8 h-8 rounded-lg bg-green-500 text-white flex items-center justify-center"><i class="fas fa-share-alt text-xs"></i></a>
                                <a href="https://wa.me/2250576326645?text=Commande: ${encodeURIComponent(p.nom)}" class="btn-action-order h-8 rounded-lg text-[7px]">DIRECT</a>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            window.scrollTo(0,0);
        }

        function retourRayons() { 
            document.getElementById('vue-rayons').classList.remove('hidden'); 
            document.getElementById('vue-produits').classList.add('hidden'); 
        }
        
        function rechercherProduit() {
            const s = document.getElementById('inputRecherche').value;
            if (s.length > 1) {
                switchTab('boutique'); 
                document.getElementById('vue-rayons').classList.add('hidden'); 
                document.getElementById('vue-produits').classList.remove('hidden');
                const f = articles.filter(p => cleanTxt(p.nom).includes(cleanTxt(s)) && cleanTxt(p.statut) === "ok");
                document.getElementById('compteur-articles').innerText = f.length + " résultat(s)";
                document.getElementById('liste-produits').innerHTML = f.map(p => {
                    const escNom = p.nom.replace(/'/g, "\\'");
                    return `<div class="bg-white rounded-2xl shadow p-3 flex items-center gap-3">
                        <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover" onerror="this.src='1769121566036.png'">
                        <div class="flex-1 text-[8px] font-black uppercase text-purple-900">${p.nom} - ${p.prix} F</div>
                        <button onclick="ajouterAuPanier('${escNom}', '${p.prix}')" class="bg-orange-500 text-white p-2 rounded-lg"><i class="fas fa-plus"></i></button>
                    </div>`;
                }).join('');
            }
        }

        function zoom(s) { document.getElementById('imgZoomed').src = s; document.getElementById('modalZoom').style.display = 'flex'; }
        
        function ajouterAuPanier(n, p) { 
            panier.push({ nom: n, prix: p }); 
            document.getElementById('btn-panier-flottant').classList.remove('hidden'); 
            document.getElementById('count-panier').innerText = panier.length; 
        }

        function ouvrirPanier() {
            document.getElementById('modalPanier').style.display = 'flex'; 
            let t = 0;
            document.getElementById('contenuPanier').innerHTML = panier.map((item, i) => {
                t += parseInt(item.prix.toString().replace(/\s/g, ''));
                return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="text-[10px] uppercase font-black text-purple-900">${item.nom} - ${item.prix} F</div>
                    <button onclick="supprimerDuPanier(${i})" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>`;
            }).join('');
            document.getElementById('totalPanier').innerText = t.toLocaleString() + " F";
        }

        function fermerPanier() { document.getElementById('modalPanier').style.display = 'none'; }
        
        function supprimerDuPanier(i) {
            panier.splice(i, 1);
            if (panier.length === 0) { 
                fermerPanier(); 
                document.getElementById('btn-panier-flottant').classList.add('hidden'); 
            } else { 
                ouvrirPanier(); 
                document.getElementById('count-panier').innerText = panier.length; 
            }
        }

        function envoyerPanierWhatsApp() {
            let m = "Bonjour Cœur de Marché, voici ma commande :\n\n";
            let t = 0;
            panier.forEach(i => {
                m += "- " + i.nom + " (" + i.prix + " F)\n";
                t += parseInt(i.prix.toString().replace(/\s/g, ''));
            });
            m += "\n*Total : " + t.toLocaleString() + " F*";
            window.location.href = "https://wa.me/2250576326645?text=" + encodeURIComponent(m);
        }

        function lancerMicro() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Votre navigateur ne supporte pas la recherche vocale.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    
    recognition.onstart = () => {
        // Change l'icône du micro pour montrer qu'on écoute
        const icon = document.querySelector('.fa-microphone');
        if(icon) icon.className = 'fas fa-spinner fa-spin text-purple-900';
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        // Met le texte dans la barre de recherche
        const input = document.getElementById('inputRecherche');
        if(input) {
            input.value = transcript;
            // Lance la recherche automatiquement
            rechercherProduit();
        }
    };

    recognition.onerror = () => {
        alert("Désolé, je n'ai pas bien entendu. Réessayez.");
    };

    recognition.onend = () => {
        // Remet l'icône normale
        const icon = document.querySelector('.fa-spinner');
        if(icon) icon.className = 'fas fa-microphone text-purple-900';
    };

    recognition.start();
        }
