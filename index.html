<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coeur de Marche Bouafle</title>
    <link rel="canonical" href="https://jeandavidkossi-boop.github.io/Coeur-de-march-/">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4c1d95">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee-container { background: #6b21a8; color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 11px; font-weight: 700; border-bottom: 2px solid #f97316; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        #modalZoom img { max-width: 95%; max-height: 90vh; border-radius: 10px; border: 2px solid white; object-fit: contain; }
        .bubble-cat { min-width: 85px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .bubble-icon { width: 55px; height: 55px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb; color: #6b21a8; font-size: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="pb-32 text-gray-900">

    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>

    <header class="bg-purple-900 pt-8 rounded-b-[40px] shadow-2xl text-center">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-2 flex items-center justify-center border-2 border-orange-100 overflow-hidden">
            <img src="1769121566036.png" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=CMB'">
        </div>
        <h1 class="text-white text-2xl font-black uppercase italic tracking-wider">Coeur de Marche</h1>
        <p class="text-orange-400 text-[10px] font-bold uppercase italic mb-4">Bouafle - Marahoue</p>
        <div class="marquee-container"><span class="marquee-text" id="texteBandeAnnonce">Chargement du marché en cours...</span></div>
    </header>

    <section id="accueil" class="active px-4 mt-6">
        <div class="bg-white p-5 rounded-[30px] shadow-xl border border-gray-100 mb-6 flex gap-2">
            <input type="text" id="inputRecherche" onkeyup="if(event.key==='Enter') rechercherProduit()" placeholder="Rechercher un produit..." class="flex-1 bg-gray-100 border-none rounded-xl py-3 px-4 text-xs outline-none">
            <button onclick="lancerMicro()" class="bg-purple-900 text-white w-12 h-12 rounded-xl flex items-center justify-center"><i class="fas fa-microphone text-lg" id="iconMicro"></i></button>
        </div>
        
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-8 px-2">
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Vivrier')"><div class="bubble-icon"><i class="fas fa-leaf"></i></div><span class="text-[11px] font-black uppercase">Vivrier</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Beaute')"><div class="bubble-icon"><i class="fas fa-magic"></i></div><span class="text-[11px] font-black uppercase">Beaute</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Resto')"><div class="bubble-icon"><i class="fas fa-utensils"></i></div><span class="text-[11px] font-black uppercase">Resto</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Mode')"><div class="bubble-icon"><i class="fas fa-tshirt"></i></div><span class="text-[11px] font-black uppercase">Mode</span></div>
        </div>

        <div class="mb-8">
            <h3 class="text-purple-900 font-black text-xs uppercase mb-4 px-2 flex items-center gap-2"><i class="fas fa-fire text-orange-500"></i> À la Une de Bouaflé</h3>
            <div id="carrousel-une" class="flex gap-5 overflow-x-auto no-scrollbar pb-4 px-1"></div>
        </div>
    </section>

    <section id="boutique" class="px-4 mt-8">
        <div id="vue-rayons">
            <h2 class="text-purple-900 font-black text-xl mb-6 uppercase italic text-center underline decoration-orange-500 underline-offset-8">Nos Marches</h2>
            <div class="grid grid-cols-2 gap-4 pb-12" id="grille-rayons">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors text-orange-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beaute')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-magic text-pink-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Beaute</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-leaf text-green-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt text-blue-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Alimentation')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-red-500 flex flex-col items-center"><i class="fas fa-shopping-basket text-red-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Alimentation</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-orange-400 flex flex-col items-center"><i class="fas fa-utensils text-orange-400 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Resto</p></button>
                <button onclick="ouvrirRayon('Electromenager')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-gray-500 flex flex-col items-center"><i class="fas fa-plug text-gray-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Electro.</p></button>
                <button onclick="ouvrirRayon('Electronique')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-indigo-500 flex flex-col items-center"><i class="fas fa-laptop text-indigo-600 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Electronique</p></button>
                <button onclick="ouvrirRayon('Sante')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-red-400 flex flex-col items-center"><i class="fas fa-heartbeat text-red-400 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Sante</p></button>
                <button onclick="ouvrirRayon('Immobilier')" class="bg-white p-5 rounded-3xl shadow-lg border-b-4 border-yellow-800 flex flex-col items-center"><i class="fas fa-home text-yellow-800 mb-2 text-xl"></i><p class="text-[11px] font-black uppercase">Immo.</p></button>
            </div>
        </div>
        <div id="vue-produits" class="hidden">
            <button onclick="retourRayons()" class="mb-4 text-orange-600 font-black text-xs uppercase flex items-center gap-2"><i class="fas fa-chevron-left"></i> Retour aux Marches</button>
            <p id="compteur-articles" class="text-[10px] font-bold text-gray-400 mb-4 px-2 italic"></p>
            <div id="liste-produits" class="space-y-6"></div>
        </div>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 bg-white rounded-full shadow-2xl p-4 flex justify-around items-center z-50 border border-gray-100">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-600 flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[10px] font-black uppercase">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-gray-400 flex flex-col items-center"><i class="fas fa-store text-xl"></i><span class="text-[10px] font-black uppercase">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center -mt-14 border-4 border-white shadow-lg"><i class="fab fa-whatsapp text-2xl"></i></a>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbx6OPL8H6X_KVsCWwIZjXPWMzSdxVnS01b56bx36O5m3XWf1z_YGgJgDBx3I98PExc/exec";
        let articles = [];
        const cleanTxt = (t) => String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

        async function chargerDonnees() {
            try {
                const r = await fetch(urlScript); articles = await r.json();
                const ann = articles.find(p => cleanTxt(p.nom) === "annonce");
                if(ann) document.getElementById('texteBandeAnnonce').innerText = ann.description;
                
                const cert = articles.filter(p => cleanTxt(p.certifie) === "oui" && cleanTxt(p.statut) === "ok");
                document.getElementById('carrousel-une').innerHTML = cert.map(p => {
                    const escNom = p.nom.replace(/'/g, "\\'");
                    return `<div class="min-w-[190px] bg-white rounded-[30px] shadow-lg overflow-hidden border border-gray-100 flex flex-col relative mr-4">
                        <div class="absolute top-3 right-3 bg-orange-600 text-white text-[11px] font-black px-3 py-1 rounded-full z-10 shadow-md">${p.prix} F</div>
                        <div class="h-40 w-full overflow-hidden">
                            <img src="${p.image}" onclick="zoom('${p.image}')" class="w-full h-full object-cover" onerror="this.src='1769121566036.png'">
                        </div>
                        <div class="p-4">
                            <h4 class="text-purple-900 text-[13px] font-black uppercase truncate mb-1">${p.nom}</h4>
                            <p class="text-blue-600 text-[10px] font-bold mb-3"><i class="fas fa-map-marker-alt"></i> ${p.quartier || 'Bouafle'}</p>
                            <button onclick="ajouterAuPanier('${escNom}', '${p.prix}')" class="w-full bg-purple-900 text-white text-[11px] font-black py-3 rounded-xl uppercase">Ajouter</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        function ouvrirRayon(nomRayon) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtres = articles.filter(p => cleanTxt(p.rayon) === cleanTxt(nomRayon) && cleanTxt(p.statut) === "ok");
            document.getElementById('compteur-articles').innerText = filtres.length + " article(s) trouvé(s)";
            document.getElementById('liste-produits').innerHTML = filtres.map(p => {
                const escNom = p.nom.replace(/'/g, "\\'");
                return `<div class="bg-white rounded-[30px] shadow-lg p-5 border border-gray-50 flex gap-5">
                    <img src="${p.image}" onclick="zoom('${p.image}')" class="w-28 h-28 rounded-2xl object-cover shadow-sm border border-gray-100" onerror="this.src='1769121566036.png'">
                    <div class="flex-1">
                        <h4 class="font-black uppercase text-purple-900 text-[14px] leading-tight mb-1">${p.nom}</h4>
                        <p class="text-orange-600 font-black text-lg mb-2">${p.prix} F</p>
                        <p class="text-gray-600 text-[11px] leading-snug mb-2">${p.description || ''}</p>
                        <p class="text-blue-600 text-[10px] font-bold uppercase italic mb-3"><i class="fas fa-map-marker-alt"></i> ${p.quartier || 'Bouafle'}</p>
                        <div class="flex gap-2">
                            <a href="tel:${p.telephone}" class="w-11 h-11 rounded-xl bg-orange-500 text-white flex items-center justify-center shadow-md"><i class="fas fa-phone-alt"></i></a>
                            <a href="https://wa.me/2250576326645?text=Je commande: ${encodeURIComponent(p.nom)}" class="h-11 rounded-xl text-[10px] font-black uppercase bg-green-500 text-white flex-1 flex items-center justify-center shadow-md">Commander</a>
                        </div>
                    </div>
                </div>`;
            }).join('');
            window.scrollTo(0,0);
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id); if(target) target.classList.add('active');
            if(id === 'boutique') retourRayons();
            document.getElementById('btn-accueil').className = id === 'accueil' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
            document.getElementById('btn-boutique').className = id === 'boutique' ? 'text-orange-600 flex flex-col items-center' : 'text-gray-400 flex flex-col items-center';
        }

        function retourRayons() { document.getElementById('vue-rayons').classList.remove('hidden'); document.getElementById('vue-produits').classList.add('hidden'); }
        function zoom(s) { document.getElementById('imgZoomed').src = s; document.getElementById('modalZoom').style.display = 'flex'; }
        function ouvrirRayonDepuisAccueil(n) { switchTab('boutique'); ouvrirRayon(n); }
        function lancerMicro() { /* Logique micro... */ }
        window.onload = chargerDonnees;
    </script>
</body>
    </html>
