<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coeur de Marche Bouafle</title>
    <link rel="canonical" href="https://jeandavidkossi-boop.github.io/Coeur-de-march-/">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; scroll-behavior: smooth; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee-container { background: #6b21a8; color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 700; border-bottom: 2px solid #f97316; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        #modalZoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #modalZoom img { max-width: 90%; max-height: 80vh; border-radius: 15px; border: 3px solid white; }
        .btn-action-order { background: #22c55e; color: white; padding: 0 15px; height: 42px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; flex: 1; }
        .bubble-cat { min-width: 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .bubble-icon { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #f3f4f6; color: #6b21a8; font-size: 18px; }
    </style>
</head>
<body class="pb-32 text-gray-900" onload="chargerDonnees()">
    <div id="modalZoom" onclick="this.style.display='none'"><img id="imgZoomed" src=""></div>
    
    <div id="modalPanier" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 16px;">
        <div class="bg-white w-full max-w-md rounded-[30px] overflow-hidden flex flex-col max-h-[80vh]">
            <div class="bg-purple-900 p-6 text-white flex justify-between items-center text-sm font-black italic">
                <span>MON PANIER</span><button onclick="fermerPanier()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="contenuPanier" class="p-6 overflow-y-auto flex-1 space-y-4"></div>
            <div class="p-6 border-t border-gray-100 bg-gray-50">
                <div class="flex justify-between items-center mb-4 text-purple-900 font-black"><span>TOTAL</span><span id="totalPanier" class="text-xl">0 F</span></div>
                <button onclick="envoyerPanierWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-3">Envoyer sur WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="btn-panier-flottant" class="hidden fixed bottom-[100px] right-[20px] z-80" onclick="ouvrirPanier()">
        <div class="bg-orange-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl relative border-4 border-white">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="count-panier" class="absolute -top-1 -right-1 bg-purple-900 text-white text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black">0</span>
        </div>
    </div>

    <header class="bg-purple-900 pt-8 rounded-b-[40px] shadow-2xl text-center">
        <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-2 flex items-center justify-center overflow-hidden"><img src="1769121566036.png" class="w-full h-full object-contain"></div>
        <h1 class="text-white text-xl font-black uppercase italic tracking-wider">Coeur de Marche</h1>
        <p class="text-orange-400 text-[8px] font-bold uppercase italic mb-4">Bouafle - Marahoue</p>
        <div class="marquee-container"><span class="marquee-text" id="texteBandeAnnonce">Bienvenue à Bouaflé...</span></div>
    </header>

    <section id="accueil" class="active px-4 mt-6">
        <div class="bg-white p-5 rounded-[30px] shadow-xl border border-gray-100 mb-4 flex gap-2">
            <input type="text" id="inputRecherche" onkeyup="if(event.key==='Enter') rechercherProduit()" placeholder="Rechercher..." class="flex-1 bg-gray-100 border-none rounded-xl py-3 px-4 text-[10px] outline-none">
            <button onclick="rechercherProduit()" class="bg-purple-900 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-search"></i></button>
        </div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar mb-8 px-2">
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Vivrier')"><div class="bubble-icon"><i class="fas fa-leaf"></i></div><span class="text-[7px] font-black uppercase">Vivrier</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Beaute')"><div class="bubble-icon"><i class="fas fa-magic"></i></div><span class="text-[7px] font-black uppercase">Beaute</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Mode')"><div class="bubble-icon"><i class="fas fa-tshirt"></i></div><span class="text-[7px] font-black uppercase">Mode</span></div>
            <div class="bubble-cat" onclick="ouvrirRayonDepuisAccueil('Resto')"><div class="bubble-icon"><i class="fas fa-utensils"></i></div><span class="text-[7px] font-black uppercase">Resto</span></div>
        </div>
        <div class="mb-8">
            <h3 class="text-purple-900 font-black text-[10px] uppercase mb-3 px-2">🔥 À la Une</h3>
            <div id="carrousel-une" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 px-1"></div>
        </div>
    </section>

    <section id="boutique" class="px-4 mt-8 pb-20">
        <div id="vue-rayons">
            <h2 class="text-purple-900 font-black text-center mb-6 uppercase italic">Nos Marchés</h2>
            <div class="grid grid-cols-2 gap-3 pb-12">
                <button onclick="ouvrirRayon('Mercerie')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-500 flex flex-col items-center"><i class="fas fa-scissors mb-2"></i><p class="text-[8px] font-black uppercase">Mercerie</p></button>
                <button onclick="ouvrirRayon('Beaute')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-pink-500 flex flex-col items-center"><i class="fas fa-magic mb-2"></i><p class="text-[8px] font-black uppercase">Beaute</p></button>
                <button onclick="ouvrirRayon('Vivrier')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-green-500 flex flex-col items-center"><i class="fas fa-leaf mb-2"></i><p class="text-[8px] font-black uppercase">Vivrier</p></button>
                <button onclick="ouvrirRayon('Mode')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-blue-500 flex flex-col items-center"><i class="fas fa-tshirt mb-2"></i><p class="text-[8px] font-black uppercase">Mode</p></button>
                <button onclick="ouvrirRayon('Resto')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-orange-300 flex flex-col items-center"><i class="fas fa-utensils mb-2"></i><p class="text-[8px] font-black uppercase">Resto</p></button>
                <button onclick="ouvrirRayon('Services')" class="bg-white p-4 rounded-3xl shadow-md border-b-4 border-purple-500 flex flex-col items-center"><i class="fas fa-concierge-bell mb-2"></i><p class="text-[8px] font-black uppercase">Services</p></button>
            </div>
        </div>
        <div id="vue-produits" class="hidden">
            <button onclick="retourRayons()" class="mb-4 text-orange-600 font-black text-[10px] uppercase"><i class="fas fa-chevron-left"></i> Retour</button>
            <div id="liste-produits" class="space-y-4"></div>
        </div>
    </section>
        <nav class="fixed bottom-6 left-6 right-6 bg-white rounded-full shadow-2xl p-3 flex justify-around items-center z-[90]">
        <button onclick="switchTab('accueil')" id="btn-accueil" class="text-orange-600 flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-[8px]">Accueil</span></button>
        <button onclick="switchTab('boutique')" id="btn-boutique" class="text-gray-400 flex flex-col items-center"><i class="fas fa-store text-xl"></i><span class="text-[8px]">Boutique</span></button>
        <a href="https://wa.me/2250576326645" class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp text-2xl"></i></a>
        <button onclick="installerApp()" class="text-orange-500 flex flex-col items-center"><i class="fas fa-download text-xl"></i><span class="text-[8px]">Installer</span></button>
    </nav>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbx6OPL8H6X_KVsCWwIZjXPWMzSdxVnS01b56bx36O5m3XWf1z_YGgJgDBx3I98PExc/exec";
        let articles = [], panier = [];
        const cleanTxt = (t) => String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

        async function chargerDonnees() {
            try {
                const r = await fetch(urlScript); articles = await r.json();
                const ann = articles.find(p => cleanTxt(p.nom) === "annonce");
                if(ann) document.getElementById('texteBandeAnnonce').innerText = ann.description;
                
                const cert = articles.filter(p => cleanTxt(p.certifie) === "oui" && cleanTxt(p.statut) === "ok");
                document.getElementById('carrousel-une').innerHTML = cert.map(p => `
                    <div class="min-w-[160px] bg-white rounded-3xl shadow-lg p-3 relative">
                        <div class="absolute top-2 right-2 bg-orange-600 text-white text-[9px] px-2 py-1 rounded-lg z-10">${p.prix} F</div>
                        <img src="${p.image}" onclick="zoom('${p.image}')" class="w-full h-28 object-cover rounded-2xl" onerror="this.src='1769121566036.png'">
                        <h4 class="text-purple-900 text-[10px] font-black uppercase mt-2 truncate">${p.nom}</h4>
                        <button onclick="ajouterAuPanier('${p.nom.replace(/'/g, "\\'")}', '${p.prix}')" class="w-full mt-2 bg-purple-900 text-white text-[8px] font-black py-2 rounded-xl uppercase">Ajouter</button>
                    </div>`).join('');
            } catch (e) { console.log(e); }
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'boutique') retourRayons();
            document.getElementById('btn-accueil').style.color = id === 'accueil' ? '#ea580c' : '#9ca3af';
            document.getElementById('btn-boutique').style.color = id === 'boutique' ? '#ea580c' : '#9ca3af';
        }

        function ouvrirRayon(nom) {
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const filtres = articles.filter(p => cleanTxt(p.rayon) === cleanTxt(nom) && cleanTxt(p.statut) === "ok");
            document.getElementById('liste-produits').innerHTML = filtres.map(p => `
                <div class="bg-white rounded-3xl shadow p-4 flex gap-4">
                    <img src="${p.image}" class="w-20 h-20 rounded-xl object-cover" onerror="this.src='1769121566036.png'">
                    <div class="flex-1">
                        <h4 class="font-black text-purple-900 text-[10px] uppercase">${p.nom}</h4>
                        <p class="text-orange-600 font-black">${p.prix} F</p>
                        <button onclick="ajouterAuPanier('${p.nom.replace(/'/g, "\\'")}', '${p.prix}')" class="mt-2 bg-orange-500 text-white px-4 py-1 rounded-lg text-[10px] font-black uppercase">Acheter</button>
                    </div>
                </div>`).join('');
        }

        function rechercherProduit() {
            const val = document.getElementById('inputRecherche').value;
            if(val.length < 2) return;
            switchTab('boutique');
            document.getElementById('vue-rayons').classList.add('hidden');
            document.getElementById('vue-produits').classList.remove('hidden');
            const f = articles.filter(p => cleanTxt(p.nom).includes(cleanTxt(val)));
            document.getElementById('liste-produits').innerHTML = f.map(p => `<div class="bg-gray-50 p-3 rounded-xl border mb-2 flex justify-between"><span>${p.nom}</span><b>${p.prix} F</b></div>`).join('');
        }

        function ajouterAuPanier(n, p) { panier.push({ nom: n, prix: p }); document.getElementById('btn-panier-flottant').classList.remove('hidden'); document.getElementById('count-panier').innerText = panier.length; }
        function ouvrirPanier() {
            document.getElementById('modalPanier').style.display = 'flex'; let t = 0;
            document.getElementById('contenuPanier').innerHTML = panier.map((item, i) => {
                t += parseInt(item.prix.toString().replace(/\s/g, ''));
                return `<div class="flex justify-between p-2 border-b"><span>${item.nom}</span><button onclick="supprimerDuPanier(${i})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
            }).join('');
            document.getElementById('totalPanier').innerText = t.toLocaleString() + " F";
        }
        function supprimerDuPanier(i) { panier.splice(i, 1); if(panier.length === 0) fermerPanier(); else ouvrirPanier(); document.getElementById('count-panier').innerText = panier.length; }
        function envoyerPanierWhatsApp() {
            let m = "Bonjour, ma commande :\n"; panier.forEach(i => m += "- " + i.nom + " (" + i.prix + " F)\n");
            window.location.href = "https://wa.me/2250576326645?text=" + encodeURIComponent(m);
        }
        function retourRayons() { document.getElementById('vue-rayons').classList.remove('hidden'); document.getElementById('vue-produits').classList.add('hidden'); }
        function zoom(s) { document.getElementById('imgZoomed').src = s; document.getElementById('modalZoom').style.display = 'flex'; }
        function fermerPanier() { document.getElementById('modalPanier').style.display = 'none'; }
        function ouvrirRayonDepuisAccueil(n) { switchTab('boutique'); ouvrirRayon(n); }
        function installerApp() { alert("Allez dans le menu de votre navigateur pour installer l'application."); }
    </script>
</body>
</html>
